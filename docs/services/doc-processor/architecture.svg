  <text x="720" y="318" fill="#94a3b8" font-size="9" text-anchor="middle">optional</text>
</g>

<g class="box-optional">
  <rect x="620" y="380" width="200" height="60" rx="6" fill="#0f172a"/>
  <rect x="620" y="380" width="200" height="60" rx="6"
        fill="rgba(15, 23, 42, 0.7)" stroke="#bb9af7" stroke-width="1.5"/>
  <text x="720" y="402" fill="white" font-size="11" font-weight="600" text-anchor="middle">local-deep-researcher</text>
  <text x="720" y="418" fill="#94a3b8" font-size="9" text-anchor="middle">optional</text>
</g>

<g class="box-optional">
