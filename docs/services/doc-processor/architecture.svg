<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 620">
<defs>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <marker id="arrowhead-solid" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
  </marker>
  <marker id="arrowhead-dashed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
  </marker>
</defs>

<rect width="880" height="620" fill="url(#grid)"/>
<text x="100" y="36" fill="#94a3b8" font-size="11" font-weight="600" text-anchor="middle">UPSTREAM (deps)</text>
<text x="460" y="36" fill="#94a3b8" font-size="11" font-weight="600" text-anchor="middle">FOCUS</text>
<text x="720" y="36" fill="#94a3b8" font-size="11" font-weight="600" text-anchor="middle">DOWNSTREAM (consumers)</text>
<line x1="260" y1="110" x2="360" y2="330" stroke="#64748b" stroke-width="1.5"  marker-end="url(#arrowhead-solid)"><title>required · http://globals:&lt;port&gt;</title></line>
<line x1="560" y1="330" x2="620" y2="110" stroke="#64748b" stroke-width="1.5"  marker-end="url(#arrowhead-solid)"><title>required · kong declares docling in depends_on.required</title></line>
<line x1="560" y1="330" x2="620" y2="210" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="2,3" marker-end="url(#arrowhead-solid)"><title>optional · backend lists docling as optional dep</title></line>
<line x1="560" y1="330" x2="620" y2="310" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="2,3" marker-end="url(#arrowhead-solid)"><title>optional · jupyterhub lists docling as optional dep</title></line>
<line x1="560" y1="330" x2="620" y2="410" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="2,3" marker-end="url(#arrowhead-solid)"><title>optional · local-deep-researcher lists docling as optional dep</title></line>
<line x1="560" y1="330" x2="620" y2="510" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="2,3" marker-end="url(#arrowhead-solid)"><title>optional · open-webui lists docling as optional dep</title></line>
<g class="box-required">
  <rect x="60" y="80" width="200" height="60" rx="6" fill="#0f172a"/>
  <rect x="60" y="80" width="200" height="60" rx="6"
        fill="rgba(15, 23, 42, 0.7)" stroke="#f7768e" stroke-width="1.5"/>
  <text x="160" y="102" fill="white" font-size="11" font-weight="600" text-anchor="middle">globals</text>
  <text x="160" y="118" fill="#94a3b8" font-size="9" text-anchor="middle">required</text>
</g>

<g class="box-focus">
  <rect x="360" y="270" width="200" height="120" rx="6" fill="#0f172a"/>
  <rect x="360" y="270" width="200" height="120" rx="6"
        fill="rgba(15, 23, 42, 0.7)" stroke="#7aa2f7" stroke-width="1.5"/>
  <text x="460" y="294" fill="white" font-size="14" font-weight="600" text-anchor="middle">DOC-PROCESSOR</text>
  <text x="460" y="314" fill="#94a3b8" font-size="9" text-anchor="middle">media · (aggregate)</text>
</g>

