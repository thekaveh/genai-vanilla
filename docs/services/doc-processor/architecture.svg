        fill="rgba(15, 23, 42, 0.7)" stroke="#bb9af7" stroke-width="1.5"/>
  <text x="720" y="202" fill="white" font-size="11" font-weight="600" text-anchor="middle">backend</text>
  <text x="720" y="218" fill="#94a3b8" font-size="9" text-anchor="middle">optional</text>
</g>

