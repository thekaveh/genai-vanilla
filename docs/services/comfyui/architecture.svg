<g class="box-optional">
  <rect x="620" y="480" width="200" height="60" rx="6" fill="#0f172a"/>
  <rect x="620" y="480" width="200" height="60" rx="6"
        fill="rgba(15, 23, 42, 0.7)" stroke="#bb9af7" stroke-width="1.5"/>
  <text x="720" y="502" fill="white" font-size="11" font-weight="600" text-anchor="middle">jupyterhub</text>
