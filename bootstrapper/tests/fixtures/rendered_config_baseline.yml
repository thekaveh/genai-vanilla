name: genai
networks:
  backend-network:
    driver: bridge
    name: genai-network
services:
  airflow-dag-processor:
    build:
      args:
        BASE_IMAGE: apache/airflow:3.2.2
      context: '{REPO_ROOT}/services/airflow/build'
      dockerfile: Dockerfile
    command:
    - airflow
    - dag-processor
    container_name: genai-airflow-dag-processor
    depends_on:
      airflow-init:
        condition: service_completed_successfully
        required: true
    deploy:
      replicas: 0
    environment:
      AIRFLOW_UID: '50000'
      AIRFLOW__API__SECRET_KEY: ''
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:@supabase-db:5432/airflow
      AIRFLOW__FAB__AUTH_BACKENDS: airflow.providers.fab.auth_manager.api.auth.backend.basic_auth
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 1m30s
      test:
      - CMD-SHELL
      - airflow jobs check --job-type DagProcessorJob --hostname "$$(hostname)"
      timeout: 10s
    image: genai-airflow:local
    networks:
      backend-network: null
    restart: unless-stopped
    volumes:
    - bind: {}
      source: '{REPO_ROOT}/services/airflow/dags'
      target: /opt/airflow/dags
      type: bind
    - source: airflow-logs
      target: /opt/airflow/logs
      type: volume
      volume: {}
  airflow-init:
    build:
      args:
        BASE_IMAGE: apache/airflow:3.2.2
      context: '{REPO_ROOT}/services/airflow/build'
      dockerfile: Dockerfile
    command:
    - bash
    - /scripts/init-airflow.sh
    container_name: genai-airflow-init
    depends_on:
      supabase-db:
        condition: service_healthy
        required: true
    deploy:
      replicas: 0
    environment:
      AIRFLOW_ADMIN_PASSWORD: ''
      AIRFLOW_DB_PASSWORD: ''
      AIRFLOW_DB_USER: airflow
      AIRFLOW_UID: '50000'
      AIRFLOW__API__SECRET_KEY: ''
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:@supabase-db:5432/airflow
      AIRFLOW__FAB__AUTH_BACKENDS: airflow.providers.fab.auth_manager.api.auth.backend.basic_auth
      GRAPH_DB_PASSWORD: neo4j_password
      GRAPH_DB_USER: neo4j
      LITELLM_MASTER_KEY: ''
      MINIO_ROOT_PASSWORD: ''
      MINIO_ROOT_USER: minioadmin
      MINIO_SOURCE: container
      NEO4J_GRAPH_DB_SOURCE: container
      REDIS_PASSWORD: redis_password
      SPARK_SOURCE: disabled
      SUPABASE_DB_NAME: postgres
      SUPABASE_DB_PASSWORD: password
      SUPABASE_DB_USER: supabase_admin
      WEAVIATE_SOURCE: container
    image: genai-airflow:local
    networks:
      backend-network: null
    volumes:
    - bind: {}
      source: '{REPO_ROOT}/services/airflow/dags'
      target: /opt/airflow/dags
      type: bind
    - bind: {}
      read_only: true
      source: '{REPO_ROOT}/services/airflow/init/scripts'
      target: /scripts
      type: bind
  airflow-scheduler:
    build:
      args:
        BASE_IMAGE: apache/airflow:3.2.2
      context: '{REPO_ROOT}/services/airflow/build'
      dockerfile: Dockerfile
    command:
    - airflow
    - scheduler
    container_name: genai-airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
        required: true
    deploy:
      replicas: 0
    environment:
      AIRFLOW_UID: '50000'
      AIRFLOW__API__SECRET_KEY: ''
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:@supabase-db:5432/airflow
      AIRFLOW__FAB__AUTH_BACKENDS: airflow.providers.fab.auth_manager.api.auth.backend.basic_auth
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 1m30s
      test:
      - CMD-SHELL
      - airflow jobs check --job-type SchedulerJob --hostname "$$(hostname)"
      timeout: 10s
    image: genai-airflow:local
    networks:
      backend-network: null
    restart: unless-stopped
    volumes:
    - bind: {}
      source: '{REPO_ROOT}/services/airflow/dags'
      target: /opt/airflow/dags
      type: bind
    - source: airflow-logs
      target: /opt/airflow/logs
      type: volume
      volume: {}
  airflow-webserver:
    build:
      args:
        BASE_IMAGE: apache/airflow:3.2.2
      context: '{REPO_ROOT}/services/airflow/build'
      dockerfile: Dockerfile
    command:
    - airflow
    - api-server
    container_name: genai-airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
        required: true
    deploy:
      replicas: 0
    environment:
      AIRFLOW_UID: '50000'
      AIRFLOW__API__SECRET_KEY: ''
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:@supabase-db:5432/airflow
      AIRFLOW__FAB__AUTH_BACKENDS: airflow.providers.fab.auth_manager.api.auth.backend.basic_auth
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 1m0s
      test:
      - CMD
      - curl
      - -fsS
      - http://localhost:8080/api/v2/monitor/health
      timeout: 10s
    image: genai-airflow:local
    networks:
      backend-network: null
    ports:
    - mode: ingress
      protocol: tcp
      published: '63060'
      target: 8080
    restart: unless-stopped
    volumes:
    - bind: {}
      source: '{REPO_ROOT}/services/airflow/dags'
      target: /opt/airflow/dags
      type: bind
    - source: airflow-logs
      target: /opt/airflow/logs
      type: volume
      volume: {}
  backend:
    build:
      args:
        BASE_IMAGE: python:3.12
      context: '{REPO_ROOT}/services/backend/app'
      dockerfile: Dockerfile
    container_name: genai-backend
    depends_on:
      kong-api-gateway:
        condition: service_started
        required: true
      litellm:
        condition: service_healthy
        required: true
      redis:
        condition: service_started
        required: true
      supabase-db-init:
        condition: service_completed_successfully
        required: true
      supabase-realtime:
        condition: service_started
        required: true
      supabase-storage:
        condition: service_started
        required: true
      weaviate-init:
        condition: service_completed_successfully
        required: true
    deploy:
      replicas: 1
    environment:
      COMFYUI_BASE_URL: http://comfyui:18188
      COMFYUI_ENABLED: 'true'
      DATABASE_URL: postgresql://supabase_admin:password@supabase-db:5432/postgres
      DOCLING_ENDPOINT: ''
      HERMES_API_KEY: ''
      HERMES_ENDPOINT: ''
      KONG_URL: http://kong-api-gateway:8000
      LANGMEM_AUTO_CONSOLIDATE: 'true'
      LANGMEM_CONSOLIDATION_INTERVAL: '86400'
      LANGMEM_EMBEDDING_MODEL: ''
      LANGMEM_ENABLED: 'true'
      LANGMEM_EXTRACTION_MODEL: ''
      LANGMEM_MAX_FACTS_PER_USER: '1000'
      LANGMEM_NAMESPACE: default
      LIGHTRAG_API_KEY: ''
      LIGHTRAG_ENDPOINT: ''
      LITELLM_API_KEY: ''
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_DEFAULT_MODEL: ''
      LITELLM_EMBEDDING_MODEL: ollama/nomic-embed-text
      N8N_API_KEY: ''
      N8N_BASE_URL: http://n8n:5678
      NEO4J_PASSWORD: neo4j_password
      NEO4J_URI: bolt://neo4j-graph-db:7687
      NEO4J_USER: neo4j
      PROJECT_NAME: genai
      RAY_ADDRESS: ''
      RAY_DASHBOARD_URL: ''
      REDIS_URL: redis://:redis_password@redis:6379/0
      STT_ENDPOINT: ''
      SUPABASE_ANON_KEY: ''
      SUPABASE_SERVICE_KEY: ''
      TTS_ENDPOINT: ''
      WEAVIATE_ENABLED: 'true'
      WEAVIATE_URL: http://weaviate:8080
    extra_hosts:
    - host.docker.internal=
    networks:
      backend-network: null
    ports:
    - mode: ingress
      protocol: tcp
      published: '63080'
      target: 8000
    restart: unless-stopped
    volumes:
    - bind: {}
      source: '{REPO_ROOT}/services/backend/app/app'
      target: /app
      type: bind
    - source: backend-data
      target: /app/data
      type: volume
      volume: {}
    - source: weaviate-shared-config
      target: /shared
      type: volume
      volume: {}
  cadvisor:
    container_name: genai-cadvisor
    deploy:
      replicas: 0
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    networks:
      backend-network: null
    ports:
    - mode: ingress
      protocol: tcp
      published: '63007'
      target: 8080
    restart: unless-stopped
    volumes:
    - bind: {}
      read_only: true
      source: /
      target: /rootfs
      type: bind
    - bind: {}
      read_only: true
      source: /var/run/docker.sock
      target: /var/run/docker.sock
      type: bind
    - bind: {}
      read_only: true
      source: /sys
      target: /sys
      type: bind
    - bind: {}
      read_only: true
      source: /var/lib/docker/
      target: /var/lib/docker
      type: bind
    - bind: {}
      read_only: true
      source: /dev/disk/
      target: /dev/disk
      type: bind
  comfyui:
    container_name: genai-comfyui
    depends_on:
      redis:
        condition: service_started
        required: true
      supabase-db-init:
        condition: service_completed_successfully
        required: true
      supabase-storage:
        condition: service_started
        required: true
    deploy:
      replicas: 1
    environment:
      AUTO_UPDATE: 'false'
      COMFYUI_ARGS: --listen
      COMFYUI_PORT_HOST: '8188'
      COMFYUI_UPLOAD_TO_SUPABASE: 'true'
      DISABLE_NATPMP: '1'
      ENABLE_QUICKTUNNEL: 'false'
      SERVERLESS: 'false'
      SUPABASE_ANON_KEY: ''
      SUPABASE_STORAGE_BUCKET: comfyui-images
      SUPABASE_URL: http://kong-api-gateway:8000/comfyui
      WEB_ENABLE_AUTH: 'false'
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 2m0s
      test:
      - CMD
      - curl
      - -f
      - http://localhost:18188/system_stats
      timeout: 10s
    image: ghcr.io/ai-dock/comfyui:v2-cpu-22.04-v0.2.7
    labels:
      com.genai.category: ai
      com.genai.dependencies: litellm,supabase-storage
      com.genai.service: image-generation
    networks:
      backend-network: null
    platform: linux/amd64
    ports:
    - mode: ingress
      protocol: tcp
      published: '63041'
      target: 18188
    restart: unless-stopped
    volumes:
    - source: comfyui-models
      target: /opt/ComfyUI/models
      type: volume
      volume: {}
    - source: comfyui-output
      target: /opt/ComfyUI/output
      type: volume
      volume: {}
    - source: comfyui-input
      target: /opt/ComfyUI/input
      type: volume
      volume: {}
    - source: comfyui-custom-nodes
      target: /opt/ComfyUI/custom_nodes
      type: volume
      volume: {}
    - bind: {}
      source: '{HOME}/Documents/ComfyUI/models'
      target: /host_models
      type: bind
  comfyui-catalog-init:
    build:
      context: '{REPO_ROOT}/services/comfyui/catalog-init'
      dockerfile: Dockerfile
    container_name: genai-comfyui-catalog-init
    depends_on:
      supabase-db-init:
        condition: service_completed_successfully
        required: true
    deploy:
      replicas: 1
    environment:
      COMFYUI_CUSTOM_MODELS_FILE: /custom-models.yaml
      COMFYUI_USER_MODELS: ''
      PGDATABASE: postgres
      PGHOST: supabase-db
      PGPASSWORD: password
      PGPORT: '5432'
      PGUSER: postgres
    networks:
      backend-network: null
    restart: 'no'
    volumes:
    - bind: {}
      read_only: true
      source: '{REPO_ROOT}/services/comfyui/catalog-init/scripts'
      target: /scripts
      type: bind
    - bind: {}
      read_only: true
      source: '{REPO_ROOT}/services/comfyui/custom-models.yaml'
      target: /custom-models.yaml
      type: bind
    - bind: {}
      read_only: true
      source: '{REPO_ROOT}/bootstrapper/utils'
      target: /catalog
      type: bind
  comfyui-init:
    container_name: genai-comfyui-init
    depends_on:
      comfyui-catalog-init:
        condition: service_completed_successfully
        required: true
      ollama-pull:
        condition: service_completed_successfully
        required: true
      supabase-db-init:
        condition: service_completed_successfully
        required: true
    deploy:
      replicas: 1
    entrypoint:
    - /scripts/download_models.sh
    environment:
      COMFYUI_HOST_URL: http://comfyui:18188
      COMFYUI_MODELS_PATH: /models
      IS_LOCAL_COMFYUI: 'false'
      PGDATABASE: postgres
      PGHOST: supabase-db
      PGPASSWORD: password
      PGPORT: '5432'
      PGUSER: supabase_admin
    extra_hosts:
    - host.docker.internal=
    image: alpine:latest
    networks:
      backend-network: null
    restart: 'no'
    volumes:
    - bind: {}
      source: '{REPO_ROOT}/services/comfyui/init/scripts'
      target: /scripts
      type: bind
    - source: comfyui-models
      target: /models
      type: volume
      volume: {}
  grafana:
    container_name: genai-grafana
    depends_on:
      prometheus:
        condition: service_healthy
        required: true
    deploy:
      replicas: 0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
      GF_SERVER_ROOT_URL: http://grafana.localhost
      GF_USERS_ALLOW_SIGN_UP: 'false'
      PROMETHEUS_ENDPOINT: http://prometheus:9090
    healthcheck:
      interval: 30s
      retries: 3
      start_period: 30s
      test:
      - CMD-SHELL
      - wget -q -O- http://localhost:3000/api/health | grep -q ok
      timeout: 10s
    image: grafana/grafana:11.4.3
    networks:
      backend-network: null
    ports:
    - mode: ingress
      protocol: tcp
      published: '63008'
      target: 3000
    restart: unless-stopped
    volumes:
    - source: grafana-data
      target: /var/lib/grafana
      type: volume
      volume: {}
    - bind: {}
      read_only: true
      source: '{REPO_ROOT}/services/grafana/config/grafana.ini'
      target: /etc/grafana/grafana.ini
      type: bind
    - bind: {}
      read_only: true
      source: '{REPO_ROOT}/services/grafana/config/provisioning'
      target: /etc/grafana/provisioning
      type: bind
  hermes:
    command:
    - gateway
    - run
    container_name: genai-hermes
    depends_on:
      hermes-init:
        condition: service_completed_successfully
        required: true
      litellm:
        condition: service_healthy
        required: true
    deploy:
      replicas: 0
      resources:
        limits:
          cpus: 2
          memory: '4294967296'
    environment:
      ANTHROPIC_API_KEY: ''
      API_SERVER_CORS_ORIGINS: '*'
      API_SERVER_ENABLED: 'true'
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_KEY: ''
      HERMES_DASHBOARD: 'true'
      HERMES_DASHBOARD_HOST: 0.0.0.0
      HERMES_DASHBOARD_PORT: '9119'
      HERMES_DASHBOARD_TUI: '1'
      HERMES_GID: '10000'
      HERMES_UID: '10000'
      LITELLM_MASTER_KEY: ''
      OPENAI_API_KEY: ''
      OPENROUTER_API_KEY: ''
    extra_hosts:
    - host.docker.internal=
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 1m0s
      test:
      - CMD-SHELL
      - 'curl --fail --silent --show-error -H "Authorization: Bearer $$API_SERVER_KEY"
        http://127.0.0.1:8642/v1/models >/dev/null'
      timeout: 10s
    image: nousresearch/hermes-agent:latest
    labels:
      com.genai.agent: hermes
      com.genai.category: ai
      com.genai.service: ai-agent
    networks:
      backend-network: null
    ports:
    - mode: ingress
      protocol: tcp
      published: '63061'
      target: 8642
    - mode: ingress
      protocol: tcp
      published: '63062'
      target: 9119
    restart: unless-stopped
    volumes:
    - source: hermes-data
      target: /opt/data
      type: volume
      volume: {}
  hermes-init:
    container_name: genai-hermes-init
    depends_on:
      litellm:
        condition: service_healthy
        required: true
    deploy:
      replicas: 0
    entrypoint:
    - /scripts/init-hermes.sh
    environment:
      COMFYUI_INTERNAL_URL: ''
      HERMES_API_KEY: ''
      HERMES_CONTEXT_LENGTH: '65536'
      HERMES_DEFAULT_MODEL: ''
      HERMES_GID: '10000'
      HERMES_UID: '10000'
      LIGHTRAG_API_KEY: ''
      LIGHTRAG_INTERNAL_URL: ''
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_MASTER_KEY: ''
      SEARXNG_INTERNAL_URL: ''
      STT_INTERNAL_URL: ''
      TTS_INTERNAL_URL: ''
    image: alpine:latest
    labels:
      com.genai.agent: hermes
      com.genai.category: ai
      com.genai.service: hermes-init
    networks:
      backend-network: null
    restart: 'no'
    volumes:
    - source: hermes-data
      target: /opt/data
      type: volume
      volume: {}
    - bind: {}
      read_only: true
      source: '{REPO_ROOT}/services/hermes/init/scripts'
      target: /scripts
      type: bind
    - bind: {}
      read_only: true
      source: '{REPO_ROOT}/services/hermes/init/templates'
      target: /templates
      type: bind
  jupyterhub:
    build:
      args:
        BASE_IMAGE: jupyter/datascience-notebook:python-3.11
      context: '{REPO_ROOT}/services/jupyterhub/build'
      dockerfile: Dockerfile
    command:
    - start-notebook.sh
    - --ServerApp.allow_origin=*
    - --ServerApp.allow_remote_access=True
    - --ServerApp.disable_check_xsrf=False
    container_name: genai-jupyterhub
    depends_on:
      litellm:
        condition: service_healthy
        required: true
      redis:
        condition: service_healthy
        required: true
      supabase-db-init:
        condition: service_completed_successfully
        required: true
    deploy:
      replicas: 1
    environment:
      BACKEND_API_URL: http://backend:8000
      COMFYUI_BASE_URL: http://comfyui:18188
      DATABASE_URL: postgresql://supabase_admin:password@supabase-db:5432/postgres
      DOCLING_ENDPOINT: ''
      GRANT_SUDO: 'yes'
      HERMES_API_KEY: ''
      HERMES_ENDPOINT: ''
      JUPYTER_ALLOW_ORIGIN: '*'
      JUPYTER_ENABLE_LAB: 'yes'
      JUPYTER_TOKEN: ''
      LITELLM_API_KEY: ''
      LITELLM_BASE_URL: http://litellm:4000
      N8N_BASE_URL: http://n8n:5678
      NEO4J_PASSWORD: neo4j_password
      NEO4J_URI: bolt://neo4j-graph-db:7687
      NEO4J_USER: neo4j
      RAY_ADDRESS: ''
      REDIS_URL: redis://:redis_password@redis:6379/3
      SEARXNG_URL: http://searxng:8080
      STT_ENDPOINT: ''
      SUPABASE_ANON_KEY: ''
      SUPABASE_SERVICE_KEY: ''
      SUPABASE_URL: http://kong-api-gateway:8000
      TTS_ENDPOINT: ''
      WEAVIATE_URL: http://weaviate:8080
    extra_hosts:
    - host.docker.internal=
    healthcheck:
      interval: 30s
      retries: 3
      start_period: 30s
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8888/api
      timeout: 10s
    labels:
      com.genai.category: application
      com.genai.service: jupyterhub
      com.genai.tier: app
    networks:
      backend-network: null
    ports:
    - mode: ingress
      protocol: tcp
      published: '63081'
      target: 8888
    restart: unless-stopped
    volumes:
    - source: jupyterhub-data
      target: /home/jovyan/work
      type: volume
      volume: {}
    - bind: {}
      read_only: true
      source: '{REPO_ROOT}/services/jupyterhub/build/notebooks'
      target: /home/jovyan/notebooks
      type: bind
    - read_only: true
      source: weaviate-shared-config
      target: /shared
      type: volume
      volume: {}
  kong-api-gateway:
    container_name: genai-kong-api-gateway
    depends_on:
      redis:
        condition: service_started
        required: true
      supabase-api:
        condition: service_started
        required: true
      supabase-auth:
        condition: service_started
        required: true
      supabase-meta:
        condition: service_started
        required: true
      supabase-realtime:
        condition: service_started
        required: true
      supabase-storage:
        condition: service_started
        required: true
    environment:
      DASHBOARD_PASSWORD: kong_password
      DASHBOARD_USERNAME: kong_admin
      KONG_DATABASE: 'off'
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      KONG_DNS_NOT_FOUND_TTL: '1'
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_DNS_STALE_TTL: '4'
      KONG_NGINX_HTTP_UPSTREAM_KEEPALIVE: '16'
      KONG_NGINX_HTTP_UPSTREAM_KEEPALIVE_REQUESTS: '100'
      KONG_NGINX_HTTP_UPSTREAM_KEEPALIVE_TIMEOUT: 60s
      KONG_NGINX_PROXY_CHUNKED_TRANSFER_ENCODING: 'on'
      KONG_NGINX_PROXY_KEEPALIVE_TIMEOUT: '300'
      KONG_NGINX_PROXY_PROXY_BUFFERING: 'off'
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
