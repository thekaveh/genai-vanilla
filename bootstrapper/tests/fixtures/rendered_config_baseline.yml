name: genai
services:
  backend:
    build:
      context: /Users/kaveh/repos/genai-vanilla/.claude/worktrees/configuration-modularization/services/backend/app
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: python:3.12
    container_name: genai-backend
    depends_on:
      kong-api-gateway:
        condition: service_started
        required: true
      litellm:
        condition: service_healthy
        required: true
      redis:
        condition: service_started
        required: true
      supabase-db-init:
        condition: service_completed_successfully
        required: true
      supabase-realtime:
        condition: service_started
        required: true
      supabase-storage:
        condition: service_started
        required: true
      weaviate-init:
        condition: service_completed_successfully
        required: true
    deploy:
      replicas: 1
    environment:
      COMFYUI_BASE_URL: http://comfyui:18188
      COMFYUI_ENABLED: "true"
      DATABASE_URL: postgresql://supabase_admin:password@supabase-db:5432/postgres
      DOCLING_ENDPOINT: ""
      HERMES_API_KEY: ""
      HERMES_ENDPOINT: ""
      KONG_URL: http://kong-api-gateway:8000
      LANGMEM_AUTO_CONSOLIDATE: "true"
      LANGMEM_CONSOLIDATION_INTERVAL: "86400"
      LANGMEM_EMBEDDING_MODEL: '# Embedding model for pgvector fallback (empty = use stack default)'
      LANGMEM_ENABLED: "true"
      LANGMEM_EXTRACTION_MODEL: '# LiteLLM model identifier for fact extraction (e.g. ollama/qwen3.6:latest); empty = pick highest-priority active content model from public.llms'
      LANGMEM_MAX_FACTS_PER_USER: "1000"
      LANGMEM_NAMESPACE: default
      LITELLM_API_KEY: ""
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_DEFAULT_MODEL: ""
      LITELLM_EMBEDDING_MODEL: ollama/nomic-embed-text
      N8N_BASE_URL: http://n8n:5678
      NEO4J_PASSWORD: neo4j_password
      NEO4J_URI: bolt://neo4j-graph-db:7687
      NEO4J_USER: neo4j
      PROJECT_NAME: genai
      REDIS_URL: redis://:redis_password@redis:6379/0
      STT_ENDPOINT: ""
      SUPABASE_ANON_KEY: ""
      SUPABASE_SERVICE_KEY: ""
      TTS_ENDPOINT: ""
      WEAVIATE_ENABLED: "true"
      WEAVIATE_URL: http://weaviate:8080
    extra_hosts:
      - host.docker.internal=host-gateway
    networks:
      backend-network: null
    ports:
      - mode: ingress
        target: 8000
        published: "63016"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /Users/kaveh/repos/genai-vanilla/.claude/worktrees/configuration-modularization/services/backend/app/app
        target: /app
        bind: {}
      - type: volume
        source: backend-data
        target: /app/data
        volume: {}
      - type: volume
        source: weaviate-shared-config
        target: /shared
        volume: {}
  comfyui:
    container_name: genai-comfyui
    depends_on:
      redis:
        condition: service_started
        required: true
      supabase-db-init:
        condition: service_completed_successfully
        required: true
      supabase-storage:
        condition: service_started
        required: true
    deploy:
      replicas: 1
    environment:
      AUTO_UPDATE: "false"
      COMFYUI_ARGS: --listen
      COMFYUI_PORT_HOST: "8188"
      COMFYUI_UPLOAD_TO_SUPABASE: "true"
      DISABLE_NATPMP: "1"
      ENABLE_QUICKTUNNEL: "false"
      SERVERLESS: "false"
      SUPABASE_ANON_KEY: ""
      SUPABASE_STORAGE_BUCKET: comfyui-images
      SUPABASE_URL: http://kong-api-gateway:8000/comfyui
      WEB_ENABLE_AUTH: "false"
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:18188/system_stats
      timeout: 10s
      interval: 30s
      retries: 5
      start_period: 2m0s
    image: ghcr.io/ai-dock/comfyui:v2-cpu-22.04-v0.2.7
    labels:
      com.genai.category: ai
      com.genai.dependencies: litellm,supabase-storage
      com.genai.service: image-generation
    networks:
      backend-network: null
    platform: linux/amd64
    ports:
      - mode: ingress
        target: 18188
        published: "63018"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: volume
        source: comfyui-models
        target: /opt/ComfyUI/models
        volume: {}
      - type: volume
        source: comfyui-output
        target: /opt/ComfyUI/output
        volume: {}
      - type: volume
        source: comfyui-input
        target: /opt/ComfyUI/input
        volume: {}
      - type: volume
        source: comfyui-custom-nodes
        target: /opt/ComfyUI/custom_nodes
        volume: {}
      - type: bind
        source: /Users/kaveh/Documents/ComfyUI/models
        target: /host_models
        bind: {}
  comfyui-init:
    container_name: genai-comfyui-init
    depends_on:
      ollama-pull:
        condition: service_completed_successfully
        required: true
      supabase-db-init:
        condition: service_completed_successfully
        required: true
    deploy:
      replicas: 1
    entrypoint:
      - /scripts/download_models.sh
    environment:
      COMFYUI_HOST_URL: http://comfyui:18188
      COMFYUI_MODEL_SET: minimal
      COMFYUI_MODELS_PATH: /models
      IS_LOCAL_COMFYUI: "false"
      PGDATABASE: postgres
      PGHOST: supabase-db
      PGPASSWORD: password
      PGPORT: "5432"
      PGUSER: supabase_admin
    extra_hosts:
      - host.docker.internal=host-gateway
    image: alpine:latest
    networks:
      backend-network: null
    restart: "no"
    volumes:
      - type: bind
        source: /Users/kaveh/repos/genai-vanilla/.claude/worktrees/configuration-modularization/services/comfyui/init/scripts
        target: /scripts
        bind: {}
      - type: volume
        source: comfyui-models
        target: /models
        volume: {}
  hermes:
    command:
      - gateway
      - run
    container_name: genai-hermes
    depends_on:
      hermes-init:
        condition: service_completed_successfully
        required: true
      litellm:
        condition: service_healthy
        required: true
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: 2
          memory: "4294967296"
    environment:
      ANTHROPIC_API_KEY: ""
      API_SERVER_CORS_ORIGINS: '*'
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_KEY: ""
      HERMES_DASHBOARD: "true"
      HERMES_DASHBOARD_HOST: 0.0.0.0
      HERMES_DASHBOARD_PORT: "9119"
      HERMES_DASHBOARD_TUI: "1"
      HERMES_GID: "10000"
      HERMES_UID: "10000"
      LITELLM_MASTER_KEY: ""
      OPENAI_API_KEY: ""
      OPENROUTER_API_KEY: ""
    extra_hosts:
      - host.docker.internal=host-gateway
    healthcheck:
      test:
        - CMD-SHELL
        - 'curl --fail --silent --show-error -H "Authorization: Bearer $$API_SERVER_KEY" http://127.0.0.1:8642/v1/models >/dev/null'
      timeout: 10s
      interval: 30s
      retries: 5
      start_period: 1m0s
    image: nousresearch/hermes-agent:latest
    labels:
      com.genai.agent: hermes
      com.genai.category: ai
      com.genai.service: ai-agent
    networks:
      backend-network: null
    ports:
      - mode: ingress
        target: 8642
        published: "63028"
        protocol: tcp
      - mode: ingress
        target: 9119
        published: "63029"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: volume
        source: hermes-data
        target: /opt/data
        volume: {}
  hermes-init:
    container_name: genai-hermes-init
    depends_on:
      litellm:
        condition: service_healthy
        required: true
    deploy:
      replicas: 1
    entrypoint:
      - /scripts/init-hermes.sh
    environment:
      COMFYUI_INTERNAL_URL: ""
      HERMES_API_KEY: ""
      HERMES_CONTEXT_LENGTH: "65536"
      HERMES_DEFAULT_MODEL: ""
      HERMES_GID: "10000"
      HERMES_UID: "10000"
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_MASTER_KEY: ""
      SEARXNG_INTERNAL_URL: ""
      STT_INTERNAL_URL: ""
      TTS_INTERNAL_URL: ""
    image: alpine:latest
    labels:
      com.genai.agent: hermes
      com.genai.category: ai
      com.genai.service: hermes-init
    networks:
      backend-network: null
    restart: "no"
    volumes:
      - type: volume
        source: hermes-data
        target: /opt/data
        volume: {}
      - type: bind
        source: /Users/kaveh/repos/genai-vanilla/.claude/worktrees/configuration-modularization/services/hermes/init/scripts
        target: /scripts
        read_only: true
        bind: {}
      - type: bind
        source: /Users/kaveh/repos/genai-vanilla/.claude/worktrees/configuration-modularization/services/hermes/init/templates
        target: /templates
        read_only: true
        bind: {}
  jupyterhub:
