      - -fsS
      - http://localhost:8080/
      timeout: 10s
      interval: 30s
      retries: 5
      start_period: 1m0s
    image: apache/zeppelin:0.12.0
    networks:
      backend-network: null
    ports:
    - mode: ingress
      target: 8080
      published: '63084'
      protocol: tcp
    restart: unless-stopped
    volumes:
    - type: bind
      source: '{REPO_ROOT}/services/zeppelin/notebooks'
      target: /notebook
      bind: {}
    - type: volume
      source: zeppelin-logs
      target: /logs
      volume: {}
