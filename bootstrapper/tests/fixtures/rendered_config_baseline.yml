      SUPABASE_SERVICE_KEY: ''
      SUPABASE_URL: http://kong-api-gateway:8000
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 30s
      test:
      - CMD-SHELL
      - node -e 'require("net").createConnection({port:3000,host:"localhost"},()=>process.exit(0)).on("error",()=>process.exit(1))'
      timeout: 10s
    image: supabase/studio:latest
    networks:
      backend-network: null
    ports:
    - mode: ingress
      protocol: tcp
      published: '63017'
      target: 3000
    restart: unless-stopped
  tei-reranker:
    command:
    - --model-id=mixedbread-ai/mxbai-rerank-base-v1
    - --revision=main
    - --max-client-batch-size=32
    - --port=80
    container_name: genai-tei-reranker
    deploy:
      replicas: 0
      resources:
        limits:
          cpus: 2
          memory: '4294967296'
    environment:
      HF_HOME: /data
      TEI_RERANKER_ENDPOINT: ''
    extra_hosts:
    - host.docker.internal=
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 2m0s
      test:
      - CMD
      - curl
      - -fs
      - http://localhost/health
      timeout: 5s
    image: __TEI_RERANKER_CPU_IMAGE__
    networks:
      backend-network: null
    ports:
    - mode: ingress
      protocol: tcp
      published: '63031'
      target: 80
    restart: unless-stopped
    volumes:
    - source: tei-reranker-data
      target: /data
      type: volume
      volume: {}
  weaviate:
    container_name: genai-weaviate
    depends_on:
      litellm:
        condition: service_healthy
        required: true
      supabase-db:
        condition: service_healthy
        required: true
      weaviate-init:
        condition: service_completed_successfully
        required: true
    deploy:
      replicas: 1
    entrypoint:
    - /scripts/configure-weaviate.sh
    - /bin/weaviate
    - --host
    - 0.0.0.0
    - --port
    - '8080'
    - --scheme
    - http
    environment:
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      CLIP_INFERENCE_API: http://multi2vec-clip:8080
      CLUSTER_HOSTNAME: weaviate
      DEFAULT_VECTORIZER_MODULE: text2vec-openai
      ENABLE_MODULES: text2vec-openai,text2vec-ollama,multi2vec-clip,generative-openai,generative-ollama
      OPENAI_APIKEY: ''
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      PROMETHEUS_MONITORING_ENABLED: 'true'
      QUERY_DEFAULTS_LIMIT: '25'
      RAFT_BOOTSTRAP_EXPECT: '1'
      RAFT_JOIN: weaviate
    expose:
    - '2112'
    extra_hosts:
    - host.docker.internal=
    healthcheck:
      interval: 10s
      retries: 5
      test:
      - CMD
      - wget
      - --spider
      - -q
      - http://localhost:8080/v1/.well-known/ready
      timeout: 5s
    image: cr.weaviate.io/semitechnologies/weaviate:1.27.5
    networks:
      backend-network: null
    ports:
    - mode: ingress
      protocol: tcp
      published: '63026'
      target: 8080
    - mode: ingress
      protocol: tcp
      published: '63027'
      target: 50051
    restart: unless-stopped
    volumes:
    - source: weaviate-data
      target: /var/lib/weaviate
      type: volume
      volume: {}
    - source: weaviate-shared-config
      target: /shared
      type: volume
      volume: {}
    - bind: {}
      source: '{REPO_ROOT}/services/weaviate/init/scripts'
      target: /scripts
      type: bind
  weaviate-init:
    container_name: genai-weaviate-init
    depends_on:
      litellm:
        condition: service_healthy
        required: true
      supabase-db:
        condition: service_healthy
        required: true
    deploy:
      replicas: 1
    entrypoint:
    - /scripts/init-weaviate.sh
    environment:
      LITELLM_API_KEY: ''
      LITELLM_BASE_URL: http://litellm:4000
      PGDATABASE: postgres
      PGHOST: supabase-db
      PGPASSWORD: password
      PGPORT: '5432'
      PGUSER: supabase_admin
    extra_hosts:
    - host.docker.internal=
    image: alpine:latest
    networks:
      backend-network: null
    restart: 'no'
    volumes:
    - bind: {}
      source: '{REPO_ROOT}/services/weaviate/init/scripts'
      target: /scripts
      type: bind
    - source: weaviate-shared-config
      target: /shared
      type: volume
      volume: {}
  zeppelin:
    container_name: genai-zeppelin
    depends_on:
      spark-init:
        condition: service_completed_successfully
        required: true
      spark-master:
        condition: service_healthy
        required: true
    deploy:
      replicas: 0
    environment:
      SPARK_MASTER: spark://spark-master:7077
      SPARK_SUBMIT_OPTIONS: --conf spark.hadoop.fs.s3a.endpoint=http://minio:9000
        --conf spark.hadoop.fs.s3a.access.key=minioadmin --conf spark.hadoop.fs.s3a.secret.key=
        --conf spark.hadoop.fs.s3a.path.style.access=true --conf spark.eventLog.enabled=true
        --conf spark.eventLog.dir=s3a://spark-history/
      ZEPPELIN_JDBC_POSTGRES_PASSWORD: password
      ZEPPELIN_JDBC_POSTGRES_URL: jdbc:postgresql://supabase-db:5432/postgres
      ZEPPELIN_JDBC_POSTGRES_USER: supabase_admin
      ZEPPELIN_LOG_DIR: /logs
      ZEPPELIN_NOTEBOOK_DIR: /notebook
      ZEPPELIN_PORT: '8080'
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 1m0s
      test:
      - CMD
      - curl
      - -fsS
      - http://localhost:8080/
      timeout: 10s
    image: apache/zeppelin:0.12.0
    networks:
      backend-network: null
    ports:
    - mode: ingress
      protocol: tcp
      published: '63084'
      target: 8080
    restart: unless-stopped
    volumes:
    - bind: {}
      source: '{REPO_ROOT}/services/zeppelin/notebooks'
      target: /notebook
      type: bind
    - source: zeppelin-logs
      target: /logs
      type: volume
      volume: {}
