# GenAI Vanilla Stack - Complete Service Configuration Matrix
# This file defines all services and their SOURCE-based variations

# Services with SOURCE-based configuration variations
# These services can run in different modes based on SOURCE environment variables
source_configurable:
  
  # LLM engine = the upstream Ollama instance LiteLLM forwards to.
  # The LiteLLM gateway itself is mandatory (see the `litellm:` block below);
  # this selects the optional Ollama upstream. Cloud providers are
  # independent toggles and can be enabled alongside any Ollama source;
  # use `LLM_PROVIDER_SOURCE=none` for cloud-only setups (the no-upstream
  # guard in services/source_validator.py refuses to launch when both
  # Ollama is `none` AND every cloud provider is disabled).
  #
  # NOTE on the `OLLAMA_ENDPOINT:` key below: the YAML key name is historical;
  # at runtime, _generate_llm_provider_config() reads this value, applies
  # host.docker.internal substitution, and writes it to the env var
  # `LITELLM_OLLAMA_UPSTREAM` (consumed by the LiteLLM config template only).
  llm_provider:
    # Containerized CPU-only Ollama
    ollama-container-cpu:
      scale: 1
      environment:
        OLLAMA_ENDPOINT: "http://ollama:11434"
      deploy: {}
      extra_hosts: []

    # Containerized GPU-accelerated Ollama
    ollama-container-gpu:
      scale: 1
      environment:
        OLLAMA_ENDPOINT: "http://ollama:11434"
        NVIDIA_VISIBLE_DEVICES: "all"
      deploy:
        resources:
          reservations:
            devices:
              - driver: nvidia
                capabilities: [gpu]
      extra_hosts: []

    # Local Ollama running on host machine
    ollama-localhost:
      scale: 0
      environment:
        OLLAMA_ENDPOINT: "http://host.docker.internal:11434"
      deploy: {}
      extra_hosts:
        - "host.docker.internal:host-gateway"

    # External Ollama service
    ollama-external:
      scale: 0
      environment:
        OLLAMA_ENDPOINT: "${LLM_PROVIDER_EXTERNAL_URL}"
      deploy: {}
      extra_hosts: []

    # No local engine — LiteLLM serves cloud providers only.
    # At least one cloud_*_SOURCE must be `enabled` for the bootstrapper to start.
    none:
      scale: 0
      environment:
        OLLAMA_ENDPOINT: ""
      deploy: {}
      extra_hosts: []

  # LiteLLM gateway — mandatory core service. Always-on. Single source.
  # The wizard renders this as a locked tile (no source toggle).
  litellm:
    container:
      scale: 1
      environment: {}
      deploy: {}
      extra_hosts: []

  # Cloud LLM providers — independent multi-enable toggles. Each provider
  # contributes its API key to LiteLLM's model_list at config-render time.
  cloud_openai:
    enabled:
      scale: 0   # informational; no compose service backs this
      environment:
        LITELLM_OPENAI_ENABLED: "true"
      deploy: {}
      extra_hosts: []
    disabled:
      scale: 0
      environment:
        LITELLM_OPENAI_ENABLED: "false"
      deploy: {}
      extra_hosts: []

  cloud_anthropic:
    enabled:
      scale: 0
      environment:
        LITELLM_ANTHROPIC_ENABLED: "true"
      deploy: {}
      extra_hosts: []
    disabled:
      scale: 0
      environment:
        LITELLM_ANTHROPIC_ENABLED: "false"
      deploy: {}
      extra_hosts: []

  cloud_openrouter:
    enabled:
      scale: 0
      environment:
        LITELLM_OPENROUTER_ENABLED: "true"
      deploy: {}
      extra_hosts: []
    disabled:
      scale: 0
      environment:
        LITELLM_OPENROUTER_ENABLED: "false"
      deploy: {}
      extra_hosts: []

  comfyui:
    # Containerized CPU-only ComfyUI
    container-cpu:
      scale: 1
      environment:
        COMFYUI_ARGS: "--listen --cpu"
        COMFYUI_ENDPOINT: "http://comfyui:18188"
        AUTO_UPDATE: "false"
        WEB_ENABLE_AUTH: "false"
        ENABLE_QUICKTUNNEL: "false"
        SERVERLESS: "false"
        IS_LOCAL_COMFYUI: "false"
        COMFYUI_LOCAL_MODELS_PATH: "./empty"
      deploy: {}
      extra_hosts: []
      
    # Containerized GPU-accelerated ComfyUI
    container-gpu:
      scale: 1
      environment:
        COMFYUI_ARGS: "--listen --force-fp16"
        COMFYUI_ENDPOINT: "http://comfyui:18188"
        AUTO_UPDATE: "true"
        NVIDIA_VISIBLE_DEVICES: "all"
        NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
        WEB_ENABLE_AUTH: "false"
        ENABLE_QUICKTUNNEL: "false"
        SERVERLESS: "false"
        IS_LOCAL_COMFYUI: "false"
        COMFYUI_LOCAL_MODELS_PATH: "./empty"
      deploy:
        resources:
          reservations:
            devices:
              - driver: nvidia
                count: 1
                capabilities: [gpu]
          limits:
            cpus: "${PROD_ENV_COMFYUI_CPUS:-2}"
            memory: "${PROD_ENV_COMFYUI_MEM_LIMIT:-4g}"
      extra_hosts: []
      
    # Local ComfyUI running on host machine
    localhost:
      scale: 0
      environment:
        COMFYUI_ENDPOINT: "http://host.docker.internal:8000"
        IS_LOCAL_COMFYUI: "true"
        COMFYUI_LOCAL_MODELS_PATH: "${COMFYUI_LOCAL_MODELS_PATH:-~/Documents/ComfyUI/models}"
      deploy: {}
      extra_hosts:
        - "host.docker.internal:host-gateway"
        
    # External ComfyUI service
    external:
      scale: 0
      environment:
        COMFYUI_ENDPOINT: "http://external.comfyui.provider.com"  # Configure external endpoint
      deploy: {}
      extra_hosts: []
    
    # Disabled - no ComfyUI
    disabled:
      scale: 0
      environment:
        COMFYUI_ENDPOINT: "http://comfyui:18188"  # Default for dependent services
        IS_LOCAL_COMFYUI: "false"
      deploy: {}
      extra_hosts: []

  weaviate:
    # Containerized Weaviate
    container:
      scale: 1
      environment:
        QUERY_DEFAULTS_LIMIT: 25
        AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
        PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
        # Vectorizers/generators route through the LiteLLM gateway
        # (text2vec-openai, generative-openai). text2vec-ollama is left
        # enabled for backward compatibility with collections that haven't
        # been migrated yet, but is no longer the default.
        DEFAULT_VECTORIZER_MODULE: 'text2vec-openai'
        ENABLE_MODULES: 'text2vec-openai,text2vec-ollama,multi2vec-clip,generative-openai,generative-ollama'
        CLUSTER_HOSTNAME: 'weaviate'
        OPENAI_APIKEY: "${LITELLM_MASTER_KEY:-}"
        CLIP_INFERENCE_API: 'http://multi2vec-clip:8080'
        WEAVIATE_URL: "http://weaviate:8080"
        # text2vec-openai uses LITELLM_BASE_URL (set per-collection at runtime).
      deploy: {}
      extra_hosts: []  # Will inherit from ollama if needed
    
    # Local Weaviate running on host machine
    localhost:
      scale: 0
      environment:
        WEAVIATE_URL: "http://host.docker.internal:8080"
      deploy: {}
      extra_hosts:
        - "host.docker.internal:host-gateway"
    
    # Disabled - no vector database
    disabled:
      scale: 0
      environment:
        WEAVIATE_URL: ""
      deploy: {}
      extra_hosts: []

  multi2vec-clip:
    # CPU-only CLIP processing
    container-cpu:
      scale: 1
      environment:
        ENABLE_CUDA: "0"
      deploy: {}
      extra_hosts: []
      
    # GPU-accelerated CLIP processing
    container-gpu:
      scale: 1
      environment:
        ENABLE_CUDA: "1"
      deploy:
        resources:
          reservations:
            devices:
              - driver: nvidia
                capabilities: [gpu]
      extra_hosts: []
    
    # Disabled - no CLIP processing
    disabled:
      scale: 0
      environment:
        ENABLE_CUDA: "0"
      deploy: {}
      extra_hosts: []

  stt_provider:
    # Speaches CPU — one container exposes BOTH /v1/audio/transcriptions and
    # /v1/audio/speech (OpenAI-compatible). If TTS also picks speaches, the
    # bootstrapper dedupes to a single running container. The compose service
    # owns the real env wiring (PRELOAD_MODELS, HF_TOKEN, …) — only the
    # bootstrapper-managed STT_ENDPOINT is set here.
    speaches-container-cpu:
      scale: 1
      environment:
        STT_ENDPOINT: "http://speaches:8000"
      deploy: {}
      extra_hosts: []

    # Speaches GPU — CUDA build of the same image, same dual-purpose API
    speaches-container-gpu:
      scale: 1
      environment:
        STT_ENDPOINT: "http://speaches:8000"
      deploy:
        resources:
          reservations:
            devices:
              - driver: nvidia
                count: 1
                capabilities: [gpu]
      extra_hosts: []

    # GPU-accelerated Parakeet (NVIDIA NeMo) — CC-BY-4.0, SOTA for EN/EU
    parakeet-container-gpu:
      scale: 1
      environment:
        STT_ENDPOINT: "http://parakeet-gpu:8000"
        PARAKEET_DEVICE: "${PARAKEET_GPU_DEVICE:-cuda}"
        PARAKEET_COMPUTE_TYPE: "${PARAKEET_GPU_COMPUTE_TYPE:-float16}"
        PARAKEET_MODEL: "${PARAKEET_MODEL:-nvidia/parakeet-tdt-0.6b-v3}"
        NVIDIA_VISIBLE_DEVICES: "${NVIDIA_VISIBLE_DEVICES:-all}"
        HF_TOKEN: "${HUGGING_FACE_HUB_TOKEN}"
      deploy:
        resources:
          reservations:
            devices:
              - driver: nvidia
                count: 1
                capabilities: [gpu]
      extra_hosts: []

    # Local Parakeet on host (Mac with MLX or Linux with CPU/GPU)
    parakeet-localhost:
      scale: 0
      environment:
        STT_ENDPOINT: "${PARAKEET_LOCALHOST_URL:-http://host.docker.internal:63022}"
      deploy: {}
      extra_hosts:
        - "host.docker.internal:host-gateway"

    # whisper.cpp on host — first-class Apple Silicon (Metal + Core ML / ANE)
    whisper-cpp-localhost:
      scale: 0
      environment:
        STT_ENDPOINT: "${WHISPER_CPP_LOCALHOST_URL:-http://host.docker.internal:63025}"
      deploy: {}
      extra_hosts:
        - "host.docker.internal:host-gateway"

    # Disabled
    disabled:
      scale: 0
      environment:
        STT_ENDPOINT: ""
      deploy: {}
      extra_hosts: []

  # TTS Provider Service
  tts_provider:
    # Speaches CPU — see stt_provider above for full detail. Same container
    # serves /v1/audio/speech (Kokoro / Piper voices). Real env wiring is in
    # compose (PRELOAD_MODELS et al.).
    speaches-container-cpu:
      scale: 1
      environment:
        TTS_ENDPOINT: "http://speaches:8000"
      deploy: {}
      extra_hosts: []

    # Speaches GPU
    speaches-container-gpu:
      scale: 1
      environment:
        TTS_ENDPOINT: "http://speaches:8000"
      deploy:
        resources:
          reservations:
            devices:
              - driver: nvidia
                count: 1
                capabilities: [gpu]
      extra_hosts: []

    # Chatterbox (Resemble AI) — MIT, voice-cloning, OpenAI-compatible
    # /v1/audio/speech. Spiritual XTTS successor with permissive licensing.
    # Real env wiring (DEVICE, USE_MULTILINGUAL_MODEL, …) lives in compose.
    chatterbox-container-gpu:
      scale: 1
      environment:
        TTS_ENDPOINT: "http://chatterbox:4123"
      deploy:
        resources:
          reservations:
            devices:
              - driver: nvidia
                count: 1
                capabilities: [gpu]
      extra_hosts: []

    # Chatterbox natively on host (macOS MPS / Linux MPS or CPU). Default
    # port matches CHATTERBOX_PORT (container variant) for symmetry — only
    # one of the two is ever running, so they share a port slot.
    chatterbox-localhost:
      scale: 0
      environment:
        TTS_ENDPOINT: "${CHATTERBOX_LOCALHOST_URL:-http://host.docker.internal:63027}"
      deploy: {}
      extra_hosts:
        - "host.docker.internal:host-gateway"

    # Disabled
    disabled:
      scale: 0
      environment:
        TTS_ENDPOINT: ""
      deploy: {}
      extra_hosts: []

  # Document Processor Service (Docling)
  doc_processor:
    # GPU-accelerated Docling (NVIDIA) for document processing
    docling-container-gpu:
      scale: 1
      environment:
        DOCLING_ENDPOINT: "http://docling-gpu:8000"
        DOCLING_DEVICE: "${DOCLING_GPU_DEVICE:-cuda}"
        NVIDIA_VISIBLE_DEVICES: "${NVIDIA_VISIBLE_DEVICES:-all}"
        HF_TOKEN: "${HUGGING_FACE_HUB_TOKEN}"
      deploy:
        resources:
          reservations:
            devices:
              - driver: nvidia
                count: 1
                capabilities: [gpu]
      extra_hosts: []

    # Local Docling on host (any platform with Python)
    docling-localhost:
      scale: 0
      environment:
        DOCLING_ENDPOINT: "${DOCLING_LOCALHOST_URL:-http://host.docker.internal:63021}"
      deploy: {}
      extra_hosts:
        - "host.docker.internal:host-gateway"

    # Disabled
    disabled:
      scale: 0
      environment:
        DOCLING_ENDPOINT: ""
      deploy: {}
      extra_hosts: []

  # OpenClaw AI Agent Service
  openclaw:
    # Containerized OpenClaw gateway
    container:
      scale: 1
      environment:
        OPENCLAW_ENDPOINT: "http://openclaw-gateway:18789"
      deploy: {}
      extra_hosts: []

    # Local OpenClaw on host (requires Node.js 22+ and npm install -g openclaw)
    localhost:
      scale: 0
      environment:
        OPENCLAW_ENDPOINT: "${OPENCLAW_LOCALHOST_URL:-http://host.docker.internal:63024}"
      deploy: {}
      extra_hosts:
        - "host.docker.internal:host-gateway"

    # Disabled
    disabled:
      scale: 0
      environment:
        OPENCLAW_ENDPOINT: ""
      deploy: {}
      extra_hosts: []

  # OpenClaw Initialization
  openclaw-init:
    # Containerized OpenClaw initialization (auto-managed by openclaw)
    container:
      scale: 1
      environment: {}
      deploy: {}
      extra_hosts: []

    # Disabled - skip initialization
    disabled:
      scale: 0
      environment: {}
      deploy: {}
      extra_hosts: []

  n8n:
    # Containerized n8n
    container:
      scale: 1
      environment:
        STT_ENDPOINT: "${STT_ENDPOINT}"
        TTS_ENDPOINT: "${TTS_ENDPOINT}"
        DOCLING_ENDPOINT: "${DOCLING_ENDPOINT}"
      deploy: {}
      extra_hosts: []
    # Disabled - no n8n
    disabled:
      scale: 0
      environment: {}
      deploy: {}
      extra_hosts: []

  searxng:
    # Containerized SearxNG
    container:
      scale: 1
    # Disabled - no search engine
    disabled:
      scale: 0


  neo4j-graph-db:
    # Containerized Neo4j
    container:
      scale: 1
      environment:
        NEO4J_URI: "bolt://neo4j-graph-db:7687"
      deploy: {}
      extra_hosts: []
    
    # Local Neo4j running on host machine
    localhost:
      scale: 0
      environment:
        NEO4J_URI: "bolt://host.docker.internal:7687"
      deploy: {}
      extra_hosts:
        - "host.docker.internal:host-gateway"
    
    # Disabled - no graph database
    disabled:
      scale: 0
      environment:
        NEO4J_URI: ""
      deploy: {}
      extra_hosts: []

  # Supabase Database
  supabase-db:
    # Containerized Supabase DB (only option)
    container:
      scale: 1
      environment: {}
      deploy: {}
      extra_hosts: []

  # Supabase Database Init
  supabase-db-init:
    # Containerized DB initialization
    container:
      scale: 1
      environment: {}
      deploy: {}
      extra_hosts: []
    
    # Disabled - skip initialization
    disabled:
      scale: 0
      environment: {}
      deploy: {}
      extra_hosts: []

  # Supabase Meta
  supabase-meta:
    # Containerized Meta service
    container:
      scale: 1
      environment: {}
      deploy: {}
      extra_hosts: []
    
    # Disabled - no Meta service
    disabled:
      scale: 0
      environment: {}
      deploy: {}
      extra_hosts: []

  # Supabase Storage
  supabase-storage:
    # Containerized Storage service
    container:
      scale: 1
      environment: {}
      deploy: {}
      extra_hosts: []
    
    # Disabled - no Storage service
    disabled:
      scale: 0
      environment: {}
      deploy: {}
      extra_hosts: []

  # Supabase Auth
  supabase-auth:
    # Containerized Auth service
    container:
      scale: 1
      environment: {}
      deploy: {}
      extra_hosts: []
    
    # Disabled - no Auth service
    disabled:
      scale: 0
      environment: {}
      deploy: {}
      extra_hosts: []

  # Supabase API (PostgREST)
  supabase-api:
    # Containerized API service
    container:
      scale: 1
      environment: {}
      deploy: {}
      extra_hosts: []
    
    # Disabled - no API service
    disabled:
      scale: 0
      environment: {}
      deploy: {}
      extra_hosts: []

  # Supabase Realtime
  supabase-realtime:
    # Containerized Realtime service
    container:
      scale: 1
      environment: {}
      deploy: {}
      extra_hosts: []
    
    # Disabled - no Realtime service
    disabled:
      scale: 0
      environment: {}
      deploy: {}
      extra_hosts: []

  # Supabase Studio
  supabase-studio:
    # Containerized Studio service
    container:
      scale: 1
      environment: {}
      deploy: {}
      extra_hosts: []
    
    # Disabled - no Studio service
    disabled:
      scale: 0
      environment: {}
      deploy: {}
      extra_hosts: []

  # Redis Cache
  redis:
    # Containerized Redis (only option)
    container:
      scale: 1
      environment: {}
      deploy: {}
      extra_hosts: []

  # Kong API Gateway
  kong-api-gateway:
    # Containerized Kong (only option)
    container:
      scale: 1
      environment: {}
      deploy: {}
      extra_hosts: []

  # n8n Init
  n8n-init:
    # Containerized n8n initialization
    container:
      scale: 1
      environment: {}
      deploy: {}
      extra_hosts: []
    
    # Disabled - skip initialization
    disabled:
      scale: 0
      environment: {}
      deploy: {}
      extra_hosts: []

  # Ollama Model Puller
  ollama-pull:
    # Containerized model puller (auto-managed by llm-provider)
    container:
      scale: 1
      environment: {}
      deploy: {}
      extra_hosts: []
    
    # Disabled - skip model pulling
    disabled:
      scale: 0
      environment: {}
      deploy: {}
      extra_hosts: []

  # Weaviate Initialization
  weaviate-init:
    # Containerized Weaviate initialization (auto-managed by weaviate)
    container:
      scale: 1
      environment: {}
      deploy: {}
      extra_hosts: []
    
    # Disabled - skip initialization
    disabled:
      scale: 0
      environment: {}
      deploy: {}
      extra_hosts: []

  # ComfyUI Initialization
  comfyui-init:
    # Containerized ComfyUI initialization (auto-managed by comfyui)
    container:
      scale: 1
      environment: {}
      deploy: {}
      extra_hosts: []
    
    # Disabled - skip initialization
    disabled:
      scale: 0
      environment: {}
      deploy: {}
      extra_hosts: []

  # Open WebUI
  open-web-ui:
    # Containerized Open WebUI (adaptive service)
    container:
      scale: 1
      environment:
        # Open WebUI talks to the LiteLLM gateway via its OpenAI-compatible
        # client (OPENAI_API_BASE_URLS / OPENAI_API_KEYS, set in compose).
        OPENAI_API_BASE_URLS: "http://litellm:4000/v1"
        OPENAI_API_KEYS: "${LITELLM_MASTER_KEY}"
        COMFYUI_BASE_URL: "${COMFYUI_ENDPOINT:-http://comfyui:18188}"
        STT_ENDPOINT: "${STT_ENDPOINT}"
        TTS_ENDPOINT: "${TTS_ENDPOINT}"
        DOCLING_ENDPOINT: "${DOCLING_ENDPOINT}"
      deploy: {}
      extra_hosts: []  # Will inherit from comfyui

    # Disabled - no Open WebUI
    disabled:
      scale: 0
      environment: {}
      deploy: {}
      extra_hosts: []

  # Local Deep Researcher
  local-deep-researcher:
    # Containerized Local Deep Researcher (adaptive service)
    container:
      scale: 1
      environment:
        # All LLM access through the LiteLLM gateway.
        LITELLM_BASE_URL: "http://litellm:4000"
        LITELLM_API_KEY: "${LITELLM_MASTER_KEY}"
        STT_ENDPOINT: "${STT_ENDPOINT}"
        TTS_ENDPOINT: "${TTS_ENDPOINT}"
        DOCLING_ENDPOINT: "${DOCLING_ENDPOINT}"
      deploy: {}
      extra_hosts: []

    # Disabled - no Local Deep Researcher
    disabled:
      scale: 0
      environment: {}
      deploy: {}
      extra_hosts: []

# Services that adapt their configuration based on other services
# These services modify their environment variables based on dependency sources
adaptive_services:
  
  ollama-pull:
    adapts_to: llm_provider
    # Scales to 1 when llm_provider is containerized (ollama-container-cpu or ollama-container-gpu).
    # Bypasses LiteLLM intentionally — model pulls hit Ollama's /api/pull directly.
    environment_adaptation:
      OLLAMA_HOST_URL: "${LITELLM_OLLAMA_UPSTREAM}"
    extra_hosts_adaptation: "inherit from llm_provider"
    
  comfyui-init:
    adapts_to: comfyui
    # Scales to 1 when comfyui is enabled (handles both local and containerized ComfyUI)
    environment_adaptation:
      COMFYUI_HOST_URL: "${COMFYUI_ENDPOINT}"
    extra_hosts_adaptation: "inherit from comfyui"
    
  backend:
    adapts_to: [llm_provider, weaviate, stt_provider, tts_provider, doc_processor]
    # Always scales to 1 (enabled by default)
    environment_adaptation:
      LITELLM_BASE_URL: "http://litellm:4000"
      LITELLM_API_KEY: "${LITELLM_MASTER_KEY}"
      WEAVIATE_URL: "http://weaviate:8080"
      STT_ENDPOINT: "${STT_ENDPOINT}"
      TTS_ENDPOINT: "${TTS_ENDPOINT}"
      DOCLING_ENDPOINT: "${DOCLING_ENDPOINT}"
    extra_hosts_adaptation: "inherit from llm_provider"

  weaviate-init:
    adapts_to: llm_provider
    # Scales with weaviate (inherits WEAVIATE_SCALE)
    environment_adaptation:
      LITELLM_BASE_URL: "http://litellm:4000"
      LITELLM_API_KEY: "${LITELLM_MASTER_KEY}"
    extra_hosts_adaptation: "inherit from llm_provider"

  n8n:
    adapts_to: [stt_provider, tts_provider, doc_processor]
    # Scales to 1 when enabled
    environment_adaptation:
      STT_ENDPOINT: "${STT_ENDPOINT}"
      TTS_ENDPOINT: "${TTS_ENDPOINT}"
      DOCLING_ENDPOINT: "${DOCLING_ENDPOINT}"
    extra_hosts_adaptation: "inherit from stt_provider, tts_provider, doc_processor"

  # JupyterHub Data Science IDE
  jupyterhub:
    adapts_to: [llm_provider, weaviate, neo4j-graph-db, comfyui, stt_provider, tts_provider, doc_processor]
    # Always scales to 0 or 1 based on SOURCE
    environment_adaptation:
      LITELLM_BASE_URL: "http://litellm:4000"
      LITELLM_API_KEY: "${LITELLM_MASTER_KEY}"
      WEAVIATE_URL: "http://weaviate:8080"
      NEO4J_URI: "bolt://neo4j-graph-db:7687"
      COMFYUI_BASE_URL: "${COMFYUI_ENDPOINT}"
      STT_ENDPOINT: "${STT_ENDPOINT}"
      TTS_ENDPOINT: "${TTS_ENDPOINT}"
      DOCLING_ENDPOINT: "${DOCLING_ENDPOINT}"
    extra_hosts_adaptation: "inherit from llm_provider"

# Service dependency relationships for proper startup ordering
dependencies:
  data_tier:
    - supabase-db
    - redis
    - neo4j-graph-db
  init_tier:
    - supabase-db-init
    - llm-catalog-init
    - litellm-init
    - ollama-pull
    - comfyui-init
    - weaviate-init
    - n8n-init
  core_services:
    - supabase-meta
    - supabase-storage
    - supabase-auth
    - supabase-api
    - supabase-realtime
    - litellm
    - ollama
    - comfyui
    - parakeet
    - xtts
    - docling
    - weaviate
    - multi2vec-clip
    - searxng
    - n8n
    - n8n-worker
    - openclaw-gateway
  app_tier:
    - kong-api-gateway
    - supabase-studio
    - local-deep-researcher
    - open-web-ui
    - backend
    - jupyterhub

# Service dependency relationships
# Defines which services require other services to function properly
service_dependencies:
  # n8n requires weaviate for vector operations and AI workflow nodes
  n8n:
    requires: [weaviate]
    optional: [parakeet]
    error_message: "n8n disabled: requires weaviate for vector operations and AI workflow nodes. Enable weaviate (WEAVIATE_SOURCE=container) to use n8n workflows with vector capabilities"
    info_message: "n8n enabled - will connect to available optional services (parakeet)"

  # n8n-worker also requires weaviate (inherits from n8n)
  n8n-worker:
    requires: [weaviate]
    error_message: "n8n-worker disabled: requires weaviate for vector operations"
    
  # Backend has optional dependencies - will connect if available
  backend:
    optional: [neo4j-graph-db, searxng, n8n, weaviate, parakeet, xtts, docling]
    info_message: "Backend enabled - will connect to available optional services (neo4j, searxng, n8n, weaviate, parakeet, xtts, docling)"
  
  # Open WebUI has optional dependencies - will connect if available
  open-web-ui:
    optional: [weaviate, local-deep-researcher, parakeet, xtts, docling]
    info_message: "Open WebUI enabled - will connect to available optional services (weaviate, local-deep-researcher, parakeet, xtts, docling)"

  # Local Deep Researcher has optional dependencies - will connect if available
  local-deep-researcher:
    optional: [neo4j-graph-db, searxng, n8n, weaviate, parakeet, xtts, docling]
    info_message: "Local Deep Researcher enabled - will connect to available optional services (neo4j, searxng, n8n, weaviate, parakeet, xtts, docling)"

  # JupyterHub has optional dependencies - will connect if available
  jupyterhub:
    optional: [neo4j-graph-db, searxng, n8n, weaviate, comfyui, parakeet, xtts, docling]
    info_message: "JupyterHub enabled - will connect to available optional services (neo4j, searxng, n8n, weaviate, comfyui, parakeet, xtts, docling)"

  # OpenClaw has optional dependencies - uses LLM provider if available
  openclaw-gateway:
    optional: [ollama]
    info_message: "OpenClaw enabled - will connect to available LLM providers (ollama, anthropic, openai)"
