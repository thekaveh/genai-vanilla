# Dependabot configuration for genai-vanilla.
# Reference:
#   https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Design notes (see docs/security/2026-05-14-dependabot-remediation-report.md §7):
# - Only active manifests are listed in `directories:`. Retired top-level paths
#   (tts-provider/, doc-processor/, stt-provider/, graph-db/, jupyterhub/, backend/,
#   local-deep-researcher/, open-webui-init/) are implicitly NOT scanned, which
#   prevents future deletions from accumulating phantom alerts.
# - Groups collapse what would be one PR per CVE into a small weekly digest.
# - GitHub Actions ecosystem is enabled proactively even though no workflows
#   exist today, so future workflow files are tracked from day one.

version: 2

updates:
  - package-ecosystem: pip
    directories:
      - "/bootstrapper"
      - "/services/docling/provider/localhost"
      - "/services/docling/provider/gpu"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      patches:
        update-types: ["patch"]
      minors:
        update-types: ["minor"]
      security-only:
        applies-to: security-updates
        patterns: ["*"]
    commit-message:
      prefix: "deps"
      include: "scope"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      actions:
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "ci"
