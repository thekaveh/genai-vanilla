# Dependabot configuration for atlas.
# Reference:
#   https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Design notes (May 2026 remediation, see git history for details):
# - Only active manifests are listed in `directories:`. Retired top-level paths
#   (tts-provider/, doc-processor/, stt-provider/, graph-db/, jupyterhub/, backend/,
#   local-deep-researcher/, open-webui-init/) are implicitly NOT scanned, which
#   prevents future deletions from accumulating phantom alerts.
# - Groups collapse what would be one PR per CVE into a small weekly digest.
# - GitHub Actions ecosystem keeps the actions/checkout / actions/setup-python /
#   astral-sh/setup-uv pins in .github/workflows/services-lint.yml in sync with
#   the upstream majors.

version: 2

updates:
  - package-ecosystem: pip
    directories:
      - "/bootstrapper"
      - "/services/docling/provider/localhost"
      - "/services/docling/provider/gpu"
      - "/services/jupyterhub/build"
      - "/services/backend/app/app"
      - "/services/parakeet/provider/gpu"
      - "/services/parakeet/provider/mlx"
      - "/services/airflow/build"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      patches:
        update-types: ["patch"]
      minors:
        update-types: ["minor"]
      security-only:
        applies-to: security-updates
        patterns: ["*"]
    ignore:
      # torch + PyG family is coupled to the `--find-links` wheel-index URL
      # in services/jupyterhub/build/requirements.txt (currently
      # `https://data.pyg.org/whl/torch-2.4.0+cpu.html`). Each torch
      # minor/major bump requires (a) a matching PyG wheel-index URL change
      # AND (b) compatible torch-scatter / torch-sparse / torch-cluster /
      # torch-spline-conv / torch_geometric versions from the new index.
      # Auto-bumping torch leaves these stranded — PR #39 (2026-06-05)
      # bumped torch 2.4 -> 2.12 against a 2.4-only wheel index. Manual
      # coordination required; surface the bump from `pip list --outdated`
      # when ready to migrate the whole family in one PR.
      - dependency-name: "torch"
      - dependency-name: "torchvision"
      - dependency-name: "torchaudio"
      - dependency-name: "torchmetrics"
      - dependency-name: "torchao"
      - dependency-name: "torch-scatter"
      - dependency-name: "torch-sparse"
      - dependency-name: "torch-cluster"
      - dependency-name: "torch-spline-conv"
      - dependency-name: "torch_geometric"
      # apache-airflow-providers-apache-spark 6.0.0 dropped the bundled
      # pyspark dependency from the default install (now requires the
      # `[pyspark]` extra). A bare bump silently breaks the sample DAG's
      # Spark Connect smoke step. PR #47 (2026-06-05) was opened against
      # >=5.4.0 -> >=6.0.2 and closed unmerged for exactly this reason.
      # Bump only when coordinated with a corresponding `[pyspark]` extra
      # update in services/airflow/build/requirements.txt.
      - dependency-name: "apache-airflow-providers-apache-spark"
      # `groq` is coupled to `langchain-groq>=0.1.5`, which transitively
      # constrains `groq>=0.30.0,<1`. A Dependabot group PR (early 2026-06)
      # bumped groq alone to 1.4.0 and silently broke the backend's docker
      # build because langchain-groq could no longer resolve. The pin in
      # services/backend/app/app/requirements.txt holds groq inside the
      # langchain-groq window; bump only when langchain-groq releases a
      # version that accepts groq>=1.x. See PR #87.
      - dependency-name: "groq"
      # Six Airflow providers (relaxed in PR #87 to match upstream
      # constraints-3.2.2). Each pin floor matches the version listed in
      # constraints-${AIRFLOW_VERSION}/constraints-${PYTHON_MAJOR_MINOR}.txt;
      # Dependabot bumping above that floor produces a doomed PR because
      # `pip install --constraint <constraints-3.2.2>` can't satisfy the
      # new requirement. Apache-spark is already covered above (PR #47);
      # the rest are tracked here until the Airflow version bumps and the
      # constraint floors move with it.
      - dependency-name: "apache-airflow-providers-amazon"
      - dependency-name: "apache-airflow-providers-postgres"
      - dependency-name: "apache-airflow-providers-redis"
      - dependency-name: "apache-airflow-providers-common-sql"
      - dependency-name: "apache-airflow-providers-neo4j"
      - dependency-name: "apache-airflow-providers-openai"
      - dependency-name: "apache-airflow-providers-fab"
      - dependency-name: "apache-airflow-providers-weaviate"
      # pyspark is exact-pinned to the Spark image tag (currently 4.1.2)
      # in services/airflow/build/requirements.txt. The Spark Connect
      # protocol couples client and server tightly — bumping pyspark
      # above the server's version produces a protobuf/gRPC skew that
      # breaks every DAG cell with an opaque deserialization error. Bump
      # only in lockstep with services/spark/service.yml::images.default
      # (the SPARK_IMAGE pin).
      - dependency-name: "pyspark"
      # fastapi >=0.136 pulls starlette 1.x, whose new internal
      # `_IncludedRouter` class trips prometheus-fastapi-instrumentator
      # (its routing iterator assumes every router has a `.path` attr).
      # Hold the floor below 0.136 until the upstream instrumentator
      # ships a fix. See PR #88 CI failure on fastapi 0.137.0 +
      # starlette 1.3.1 + prometheus-fastapi-instrumentator 8.0.0.
      - dependency-name: "fastapi"
    commit-message:
      prefix: "deps"
      include: "scope"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      actions:
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "ci"
