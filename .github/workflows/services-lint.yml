name: services-lint

# Lints and tests the per-service modular configuration layout.
#
# Gates:
#   - manifest validator (8 cross-manifest checks)
#   - unit tests (loader, validator, assembler, hooks, validate_fragments CLI)
#   - compose merge (`docker compose -f docker-compose.yml config -q`)
#   - byte-equivalence vs the golden baseline at
#     bootstrapper/tests/fixtures/rendered_config_baseline.yml
#   - source-permutation matrix (every SOURCE value × compose config)
#   - docs-drift gate (`bootstrapper.docs.regen --all --check`)
#   - audit scripts: doc-links, compose source-deps, docs structure,
#     Kong routes, research schema

on:
  pull_request:
    # Every required-checks-eligible file must appear here, or a PR
    # touching only that file deadlocks: no job runs ⇒ no status posts
    # ⇒ required-check rule never satisfies. PR #48 hit exactly this on
    # a .github/dependabot.yml-only change.
    paths:
      - "services/**"
      - "docs/**"
      - "scripts/**"
      - "docker-compose.yml"
      - "bootstrapper/**"
      - ".env.example"
      - ".gitignore"
      - ".gitattributes"
      - "README.md"
      - "SECURITY.md"
      - "LICENSE"
      - "start.sh"
      - "stop.sh"
      - ".github/workflows/services-lint.yml"
      - ".github/dependabot.yml"
  push:
    branches: [main]

# Principle-of-least-privilege: this is a read-only lint/test workflow;
# none of the jobs need write access to the repo, PRs, or packages.
permissions:
  contents: read

jobs:
  lint:
    name: Manifest lint + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          # Pin uv so CI is deterministic. With no version, setup-uv installs
          # the latest uv at run time, whose resolver/lock semantics can shift
          # under us and silently flip a `uv lock --locked` check. Bump
          # deliberately; keep in sync with the Dockerfile `uv==` pins.
          version: "0.11.19"

      - name: Sync dependencies
        working-directory: bootstrapper
        run: uv sync --group dev

      - name: Run unit tests (loader, validator, assembler, hooks, CLI)
        working-directory: bootstrapper
        run: uv run pytest tests/ -q --ignore=tests/test_fragment_equivalence.py --ignore=tests/test_source_permutations.py

      - name: Lint manifests
        working-directory: bootstrapper
        run: uv run python -m tools.validate_fragments

      - name: Backend unit tests (ray client/routes)
        working-directory: services/backend/app/app
        # The backend suite stubs `ray` in-process, so only main.py's
        # import closure is needed — NOT the full requirements.txt
        # (which build-validation already pip-installs in Docker).
        run: |
          uv venv .ci-venv
          # Pins mirror services/backend/app/app/requirements.txt's floors.
          # If you bump a floor there, bump it here too — the inline list
          # does NOT read requirements.txt (per
          # project_ci_inline_install_bypass memory). fastapi<0.137 cap:
          # >=0.136 pulls starlette 1.x, whose `_IncludedRouter` breaks
          # prometheus-fastapi-instrumentator's route iterator (PR #88).
          # pytest-asyncio omitted intentionally — backend tests in
          # services/backend/app/app/tests/ contain no asyncio markers
          # (Ray client + routes are tested with httpx + sync stubs).
          VIRTUAL_ENV=$PWD/.ci-venv uv pip install \
            'pytest>=9.1.0' \
            'fastapi>=0.110.0,<0.137' \
            'httpx>=0.27.0' \
            'pydantic>=2.6.0' \
            'asyncpg>=0.29.0' \
            'storage3>=0.7.0' \
            'prometheus-fastapi-instrumentator>=7.0.0' \
            'python-multipart>=0.0.9' \
            'pyyaml>=6.0'
          .ci-venv/bin/python -m pytest tests/ -q

  compose-equivalence:
    name: Compose merge + byte-equivalence + source-permutation matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          # Pin uv so CI is deterministic. With no version, setup-uv installs
          # the latest uv at run time, whose resolver/lock semantics can shift
          # under us and silently flip a `uv lock --locked` check. Bump
          # deliberately; keep in sync with the Dockerfile `uv==` pins.
          version: "0.11.19"

      - name: Sync dependencies
        working-directory: bootstrapper
        run: uv sync --group dev

      - name: Materialize .env from .env.example
        # Compose interpolation reads .env at the project root. The matrix
        # tests then override one SOURCE var at a time in a tmp file.
        run: cp .env.example .env

      - name: Compose merge sanity (docker compose config -q)
        run: docker compose --env-file .env -f docker-compose.yml config -q

      - name: Byte-equivalence test vs golden baseline
        working-directory: bootstrapper
        run: uv run pytest tests/test_fragment_equivalence.py -q

      - name: Source-permutation matrix (every SOURCE value × compose config)
        working-directory: bootstrapper
        run: uv run pytest tests/test_source_permutations.py -q

  audit-scripts:
    name: Docs drift + audit scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          # Pin uv so CI is deterministic. With no version, setup-uv installs
          # the latest uv at run time, whose resolver/lock semantics can shift
          # under us and silently flip a `uv lock --locked` check. Bump
          # deliberately; keep in sync with the Dockerfile `uv==` pins.
          version: "0.11.19"

      - name: Sync dependencies
        working-directory: bootstrapper
        run: uv sync --group dev

      - name: Materialize .env from .env.example
        # check-compose-source-deps.py invokes `docker compose config` to
        # render the merged shape across all per-service fragments (the
        # top-level docker-compose.yml is a thin `include:`-only shell).
        # Without .env present, compose interpolation fails and the
        # script falls through to a raw parse that sees zero edges,
        # producing spurious "missing dependency" failures.
        run: cp .env.example .env

      - name: Docs drift gate (regen --all --check)
        # Per CLAUDE.md: gates that committed READMEs / SVGs / HTMLs match
        # what the regenerator would emit from the manifests' data_flow.calls.
        run: PYTHONPATH=bootstrapper uv run --project bootstrapper python -m bootstrapper.docs.regen --all --check

      - name: Internal markdown link validator
        run: uv run --project bootstrapper python scripts/check_doc_links.py

      - name: Compose source-deps audit
        run: uv run --project bootstrapper python scripts/check-compose-source-deps.py

      - name: Docs-drift structural audit
        run: uv run --project bootstrapper python scripts/check-docs-drift.py

      - name: Kong route baseline-defaults audit
        run: uv run --project bootstrapper python scripts/check-kong-routes.py

      - name: Research schema validator
        run: uv run --project bootstrapper python scripts/validate_research_schema.py --all

      - name: Track-membership audit
        run: uv run --project bootstrapper python scripts/check-track-membership.py

      - name: Docling localhost-provider lock check
        working-directory: services/docling/provider/localhost
        # Host-run provider (no Dockerfile), so build-validation can't
        # exercise its pins; this catches unsatisfiable bumps and a stale
        # uv.lock at PR time instead of on a user's machine.
        run: uv lock --locked

  build-validation:
    name: Build-validation (Dockerfile + requirements.txt installability)
    runs-on: ubuntu-latest
    # Catches the Pass 12 / Pass 13 class of bug: unsatisfiable pip pins,
    # nonexistent packages, broken Dockerfile syntax. Compose-shape checks
    # never invoke `docker build`, so a broken requirements.txt sails
    # through the other gates. Builds the four highest-churn contexts
    # (airflow, spark, jupyterhub, backend) — NOT every build: context;
    # the GPU images (docling/parakeet) are excluded for runner
    # size/time, and the small init-container contexts
    # (open-webui/litellm/comfyui inits, neo4j, local-deep-researcher)
    # are trivial pip layers that change rarely.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build airflow image
        # apache/airflow:3.2.2 + the 9 providers + pyspark[connect]. Catches
        # unsatisfiable provider floors (Pass 12 saw 3 of these slip past
        # CI before this job was added) and Dockerfile syntax errors.
        run: docker buildx build --load --build-arg BASE_IMAGE=apache/airflow:3.2.2 services/airflow/build/

      - name: Build spark image
        # apache/spark:4.1.2 + hadoop-aws + AWS SDK v2 bundle (Maven
        # downloads). Catches network/version-pin drift in the S3A
        # support layer. Pass 44 caught the missing-jars shipping bug.
        run: docker buildx build --load --build-arg BASE_IMAGE=apache/spark:4.1.2 services/spark/build/


      - name: Build jupyterhub image
        run: docker buildx build --load services/jupyterhub/build/

      - name: Build backend image
        # services/backend/app/Dockerfile pulls FastAPI + LangChain stack.
        run: docker buildx build --load services/backend/app/

      # Small init-container layers. Each is a python:3.12.7-slim base
      # with a one-line `pip install` of pinned packages — typically
      # 15-30s on a cold runner thanks to the shared base layer. Catches
      # the Pass 12 / Pass 13 unsatisfiable-pin class for the
      # cross-service env-write rule (project_litellm_init_env_block_
      # dual_write memory) where a broken init silently no-ops at
      # runtime instead of failing loudly.
      - name: Build litellm-init image
        run: docker buildx build --load services/litellm/init/

      - name: Build open-webui-init image
        run: docker buildx build --load services/open-webui/init/
