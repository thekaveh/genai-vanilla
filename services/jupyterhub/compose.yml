# services/jupyterhub/compose.yml — JupyterHub notebook server
services:
  jupyterhub:
    build:
      context: ./build
      args:
        BASE_IMAGE: ${JUPYTERHUB_IMAGE}
    container_name: ${PROJECT_NAME}-jupyterhub
    restart: unless-stopped
    deploy:
      replicas: ${JUPYTERHUB_SCALE:-1}
    depends_on:
      supabase-db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      litellm:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:${HOST_GATEWAY_IP}"
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      GRANT_SUDO: "yes"
      JUPYTER_TOKEN: ${JUPYTERHUB_TOKEN}
      # VS Code remote-Jupyter connectivity. The Jupyter Server defaults
      # restrict origin and remote access to localhost-only on the
      # container's loopback; VS Code's webview origin and your host-side
      # browser both look "remote" to the container, so without these the
      # initial connect succeeds (token auth) but the websocket upgrade for
      # cell execution gets dropped. Same value is also written to
      # JUPYTER_ALLOW_ORIGIN for forward-compat with image versions that
      # honor that env name; the CLI flags below are the authoritative knob.
      JUPYTER_ALLOW_ORIGIN: ${JUPYTER_ALLOW_ORIGIN:-*}
      DATABASE_URL: postgresql://${SUPABASE_DB_USER}:${SUPABASE_DB_PASSWORD}@supabase-db:5432/${SUPABASE_DB_NAME}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/3
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_API_KEY: ${LITELLM_MASTER_KEY}
      WEAVIATE_URL: ${WEAVIATE_URL:-http://weaviate:8080}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j-graph-db:7687}
      NEO4J_USER: ${GRAPH_DB_USER}
      NEO4J_PASSWORD: ${GRAPH_DB_PASSWORD}
      COMFYUI_BASE_URL: ${COMFYUI_ENDPOINT:-http://comfyui:18188}
      STT_ENDPOINT: ${STT_ENDPOINT}
      TTS_ENDPOINT: ${TTS_ENDPOINT}
      DOCLING_ENDPOINT: ${DOCLING_ENDPOINT}
      # Ray — empty when RAY_SOURCE=disabled. Compose injection is the
      # real seam (runtime_adaptive writes .env only); notebook
      # 07_ray_cluster reads this to decide whether Ray is enabled.
      RAY_ADDRESS: ${RAY_ADDRESS:-}
      # Spark Connect endpoint for notebook 09_spark_connect. Defaults to the
      # in-stack sidecar (needs SPARK_SOURCE != disabled); override to point a
      # notebook at a remote/managed Spark Connect server (e.g. EMR Serverless).
      SPARK_REMOTE: ${SPARK_REMOTE:-sc://spark-connect:15002}
      # Hermes Agent — direct path for `from openai import OpenAI` users.
      # Empty when HERMES_SOURCE=disabled.
      HERMES_ENDPOINT: ${HERMES_ENDPOINT:-}
      HERMES_API_KEY: ${HERMES_API_KEY:-}

      SUPABASE_URL: http://kong-api-gateway:8000
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      N8N_BASE_URL: http://n8n:5678
      SEARXNG_URL: http://searxng:8080
      BACKEND_API_URL: http://backend:8000
    # Override the upstream image's default CMD to add the three ServerApp
    # flags VS Code (and any other remote Jupyter client) needs.
    #
    # Full launch chain after this override (see README §10.3.1):
    #   ENTRYPOINT = /usr/local/bin/startup.sh   (our wrapper; exec "$@")
    #   CMD        = [the list below]
    #   →  startup.sh start-notebook.sh <flags>
    #   →  start-notebook.sh <flags>             (upstream docker-stacks boot)
    #   →  jupyter lab <flags>                   (the three flags land here)
    #
    # GOTCHA: compose's `command:` REPLACES the Dockerfile's CMD, it never
    # extends it. `start-notebook.sh` MUST stay as element 0 of the list —
    # if you drop it, startup.sh will exec the first flag literally and the
    # container will restart-loop with `exec: --ServerApp.allow_origin=...:
    # not found`.
    #
    # Token auth still gates every request, so allow_origin='*' is safe as
    # long as JUPYTERHUB_TOKEN stays secret. README §10.3.2 explains each
    # flag's mechanism in detail.
    command:
      - start-notebook.sh
      - --ServerApp.allow_origin=${JUPYTER_ALLOW_ORIGIN:-*}
      - --ServerApp.allow_remote_access=True
      - --ServerApp.disable_check_xsrf=False
    ports:
      - "${HOST_BIND_IP:-}${JUPYTERHUB_PORT}:8888"
    volumes:
      - jupyterhub-data:/home/jovyan/work
      - ./build/notebooks:/home/jovyan/notebooks:ro
      - weaviate-shared-config:/shared:ro
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/api"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILE:-3}"
    labels:
      - "com.${PROJECT_NAME}.service=jupyterhub"
      - "com.${PROJECT_NAME}.category=application"
      - "com.${PROJECT_NAME}.tier=app"

volumes:
  jupyterhub-data:
    name: ${PROJECT_NAME}-jupyterhub-data
    driver: local
