# services/jupyterhub/compose.yml — JupyterHub notebook server
services:
  jupyterhub:
    build:
      context: ./build
      args:
        BASE_IMAGE: ${JUPYTERHUB_IMAGE}
    container_name: ${PROJECT_NAME}-jupyterhub
    restart: unless-stopped
    deploy:
      replicas: ${JUPYTERHUB_SCALE:-1}
    depends_on:
      supabase-db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      litellm:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:${HOST_GATEWAY_IP}"
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      GRANT_SUDO: "yes"
      JUPYTER_TOKEN: ${JUPYTERHUB_TOKEN}
      DATABASE_URL: postgresql://${SUPABASE_DB_USER}:${SUPABASE_DB_PASSWORD}@supabase-db:5432/${SUPABASE_DB_NAME}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/3
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_API_KEY: ${LITELLM_MASTER_KEY}
      WEAVIATE_URL: ${WEAVIATE_URL:-http://weaviate:8080}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j-graph-db:7687}
      NEO4J_USER: ${GRAPH_DB_USER}
      NEO4J_PASSWORD: ${GRAPH_DB_PASSWORD}
      COMFYUI_BASE_URL: ${COMFYUI_ENDPOINT:-http://comfyui:18188}
      STT_ENDPOINT: ${STT_ENDPOINT}
      TTS_ENDPOINT: ${TTS_ENDPOINT}
      DOCLING_ENDPOINT: ${DOCLING_ENDPOINT}
      # Hermes Agent — direct path for `from openai import OpenAI` users.
      # Empty when HERMES_SOURCE=disabled.
      HERMES_ENDPOINT: ${HERMES_ENDPOINT:-}
      HERMES_API_KEY: ${HERMES_API_KEY:-}

      SUPABASE_URL: http://kong-api-gateway:8000
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      N8N_BASE_URL: http://n8n:5678
      SEARXNG_URL: http://searxng:8080
      BACKEND_API_URL: http://backend:8000
    ports:
      - "${JUPYTERHUB_PORT}:8888"
    volumes:
      - jupyterhub-data:/home/jovyan/work
      - ./build/notebooks:/home/jovyan/notebooks:ro
      - weaviate-shared-config:/shared:ro
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/api"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "com.${PROJECT_NAME}.service=jupyterhub"
      - "com.${PROJECT_NAME}.category=application"
      - "com.${PROJECT_NAME}.tier=app"

volumes:
  jupyterhub-data:
    name: ${PROJECT_NAME}-jupyterhub-data
    driver: local
