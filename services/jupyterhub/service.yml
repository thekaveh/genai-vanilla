# services/jupyterhub/service.yml — JupyterHub data-science notebook
name: jupyterhub
label: "JupyterHub (DS/ML + LLM notebooks)"
category: apps
docs: services/jupyterhub/README.md

containers:
  - jupyterhub

images:
  - var: JUPYTERHUB_IMAGE
    default: "jupyter/datascience-notebook:python-3.11"
    container: jupyterhub

sources:
  var: JUPYTERHUB_SOURCE
  default: container
  options:
    - id: container
      label: "Container"
    - id: disabled
      label: "Disabled"

env:
  - name: JUPYTERHUB_SOURCE
    default: container
  - name: JUPYTERHUB_PORT
    # default removed — computed by services/topology.py slot allocator
  - name: JUPYTERHUB_TOKEN
    default: ""
    secret: true
    description: "Optional. Empty = generate on start."
  - name: JUPYTERHUB_SCALE
    auto_managed: true

depends_on:
  required:
    - supabase
    - redis
    - litellm
  optional: []

rows:
  - display_name: "JupyterHub"
    source_var: JUPYTERHUB_SOURCE
    port_var: JUPYTERHUB_PORT
    scale_var: JUPYTERHUB_SCALE
    alias: jupyter.localhost
    description: "DS/ML and LLM notebooks."

exports: []

# ─────────────────────────────────────────────────────────
# Bootstrapper runtime data (migrated from the legacy
# bootstrapper/service-configs.yml). Slices owned by this
# manifest. Synthesized into the runtime dict by
# bootstrapper/services/sc_synthesizer.py.
# ─────────────────────────────────────────────────────────
runtime_sc:
  jupyterhub:
    container:
      scale: 1
    disabled:
      scale: 0

runtime_adaptive:
  jupyterhub:
    adapts_to:
    - llm_provider
    - weaviate
    - neo4j-graph-db
    - comfyui
    - stt_provider
    - tts_provider
    - doc_processor
    environment_adaptation:
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_API_KEY: ${LITELLM_MASTER_KEY}
      WEAVIATE_URL: http://weaviate:8080
      NEO4J_URI: bolt://neo4j-graph-db:7687
      COMFYUI_BASE_URL: ${COMFYUI_ENDPOINT}
      STT_ENDPOINT: ${STT_ENDPOINT}
      TTS_ENDPOINT: ${TTS_ENDPOINT}
      DOCLING_ENDPOINT: ${DOCLING_ENDPOINT}
    extra_hosts_adaptation: inherit from llm_provider

runtime_deps:
  jupyterhub:
    optional:
    - neo4j-graph-db
    - searxng
    - n8n
    - weaviate
    - comfyui
    - parakeet
    - speaches
    - chatterbox
    - docling
    info_message: JupyterHub enabled - will connect to available optional services
      (neo4j, searxng, n8n, weaviate, comfyui, parakeet, speaches, chatterbox, docling)

data_flow:
  calls:
    - litellm
    - hermes
    - weaviate
    - neo4j
    - minio
    - supabase

