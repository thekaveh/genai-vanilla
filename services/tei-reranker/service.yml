# services/tei-reranker/service.yml
# TEI Reranker — cross-encoder reranker inference for RAG quality lift.
# Default model: mixedbread-ai/mxbai-rerank-base-v1 (arm64-compatible;
# the originally spec'd BGE-reranker-v2-m3 crashed the arm64 candle
# backend on warmup, swapped 2026-06-07 in commit ad7dda0).
# Published image, no build context. Image var resolved per source variant
# in service_config._generate_tei_reranker_config (mirrors DOCLING_GPU_IMAGE).
name: tei-reranker
label: "TEI Reranker (mxbai-rerank-base-v1)"
category: llm
docs: services/tei-reranker/README.md

containers:
  - tei-reranker

images:
  - var: TEI_RERANKER_CPU_IMAGE
    default: "ghcr.io/huggingface/text-embeddings-inference:cpu-1.9"
    container: tei-reranker
    notes: "Used when TEI_RERANKER_SOURCE=container-cpu on amd64 hosts. Compiled with ORT backend (requires ONNX model weights)."
  - var: TEI_RERANKER_CPU_ARM64_IMAGE
    default: "ghcr.io/huggingface/text-embeddings-inference:cpu-arm64-latest"
    container: tei-reranker
    notes: "Used when TEI_RERANKER_SOURCE=container-cpu on arm64 hosts (Apple Silicon). Compiled with candle backend (loads safetensors natively, no ONNX required). Unversioned tag — HF doesn't publish versioned arm64 tags as of 2026-06-06."
  - var: TEI_RERANKER_GPU_IMAGE
    default: "ghcr.io/huggingface/text-embeddings-inference:1.9"
    container: tei-reranker
    notes: "Used when TEI_RERANKER_SOURCE=container-gpu. CUDA host required."

sources:
  var: TEI_RERANKER_SOURCE
  default: disabled
  options:
    - id: container-cpu
      label: "Container (CPU)"
    - id: container-gpu
      label: "Container (GPU, NVIDIA)"
    - id: localhost
      label: "Host (existing TEI rerank on this machine)"
      profiles: [default]
    - id: disabled
      label: "Disabled"

env:
  - name: TEI_RERANKER_SOURCE
    default: disabled
  - name: TEI_RERANKER_PORT
    # default computed by services/topology.py slot allocator
    description: "Host port for the TEI rerank API (in-container listen port is 80)."
  - name: TEI_RERANKER_LOCALHOST_PORT
    default: "63031"
    description: "Host port for the host-installed TEI rerank source variant."
  - name: TEI_RERANKER_MODEL_ID
    default: "mixedbread-ai/mxbai-rerank-base-v1"
  - name: TEI_RERANKER_REVISION
    default: "main"
  - name: TEI_RERANKER_MAX_CLIENT_BATCH_SIZE
    default: 32
  - name: TEI_RERANKER_MEMORY_LIMIT
    default: 4g
  - name: TEI_RERANKER_CPU_LIMIT
    default: "2.0"
  - name: TEI_RERANKER_HF_CACHE_DIR
    default: "/data"
  - name: TEI_RERANKER_SCALE
    auto_managed: true
  - name: TEI_RERANKER_ENDPOINT
    auto_managed: true
    description: "Resolved per TEI_RERANKER_SOURCE. Exposes TEI's rerank endpoint to compatible consumers."
  - name: TEI_RERANKER_IMAGE_RESOLVED
    auto_managed: true
    description: "Image picked per source variant (CPU vs GPU)."

depends_on:
  required: []
  optional: []

rows:
  - display_name: "TEI Reranker"
    source_var: TEI_RERANKER_SOURCE
    port_var: TEI_RERANKER_PORT
    scale_var: TEI_RERANKER_SCALE
    alias: rerank.localhost
    description: "Cross-encoder reranker (default: mxbai-rerank-base-v1) for RAG quality lift."
    localhost_endpoint_var: TEI_RERANKER_ENDPOINT
    localhost_port_var: TEI_RERANKER_LOCALHOST_PORT

exports: []

runtime_sc:
  tei-reranker:
    container-cpu:
      scale: 1
      environment:
        TEI_RERANKER_ENDPOINT: "http://tei-reranker:80"
      deploy: {}
      extra_hosts: []
    container-gpu:
      scale: 1
      environment:
        TEI_RERANKER_ENDPOINT: "http://tei-reranker:80"
      deploy:
        resources:
          reservations:
            devices:
              - driver: nvidia
                count: 1
                capabilities: [gpu]
      extra_hosts: []
    localhost:
      scale: 0
      environment:
        TEI_RERANKER_ENDPOINT: "http://host.docker.internal:${TEI_RERANKER_LOCALHOST_PORT:-63031}"
      deploy: {}
      extra_hosts:
        - host.docker.internal:host-gateway
    disabled:
      scale: 0
      environment:
        TEI_RERANKER_ENDPOINT: ""
      deploy: {}
      extra_hosts: []

data_flow:
  calls: []
