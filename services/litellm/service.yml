# services/litellm/service.yml — LiteLLM gateway + init + catalog sync
#
# The LiteLLM gateway is the mandatory core LLM router. Single source value
# (container); always on. The init containers (litellm-init, llm-catalog-init)
# run once per startup to populate public.llms and render config.yaml.
name: litellm
label: "LiteLLM gateway (LLM router)"
category: llm
docs: docs/services/litellm.md

containers:
  - litellm
  - litellm-init
  - llm-catalog-init

images:
  - var: LITELLM_IMAGE
    default: "ghcr.io/berriai/litellm:v1.83.14-stable.patch.2"
    container: litellm

env:
  - name: LITELLM_SOURCE
    default: container
    description: "Locked. LiteLLM is mandatory; only one source value supported."
  - name: LITELLM_PORT
    # default removed — computed by services/topology.py slot allocator
  - name: LITELLM_INIT_SCALE
    default: 1
    description: "Init container always runs (single value)."
  - name: LITELLM_MASTER_KEY
    default: ""
    secret: true
    description: "Auto-generated by bootstrapper on first run. Doubles as the admin-dashboard password."
  - name: LITELLM_UI_USERNAME
    default: admin
    description: "Admin-dashboard login username at http://litellm.localhost:${KONG_HTTP_PORT}/ui/. Password is LITELLM_MASTER_KEY."
  - name: LITELLM_DB_NAME
    default: litellm
  - name: LITELLM_EMBEDDING_MODEL
    default: "ollama/nomic-embed-text"
    description: "Default embedding model used by weaviate-init when computing collection vectorizers."
  - name: LITELLM_DEFAULT_MODEL
    default: ""
    description: "Optional default chat model passed to LangMem (backend)."
  - name: LITELLM_BASE_URL
    auto_managed: true
    default: "http://litellm:4000"
    description: "In-network URL consumers point at (backend, n8n, jupyterhub, open-webui)."

depends_on:
  required:
    - supabase
    - redis
  optional: []

rows:
  - display_name: "LiteLLM"
    source_var: LITELLM_SOURCE
    port_var: LITELLM_PORT
    alias: litellm.localhost
    description: "Unified LLM gateway — always-on; fronts every provider."
    localhost_endpoint_var: LITELLM_BASE_URL

exports: []

# ─────────────────────────────────────────────────────────
# Bootstrapper runtime data (migrated from the legacy
# bootstrapper/service-configs.yml). Slices owned by this
# manifest. Synthesized into the runtime dict by
# bootstrapper/services/sc_synthesizer.py.
# ─────────────────────────────────────────────────────────
runtime_sc:
  litellm:
    container:
      scale: 1
      environment: {}
      deploy: {}
      extra_hosts: []

