# services/litellm/compose.yml — LiteLLM gateway + catalog/init pipeline
services:
  llm-catalog-init:
    build: ./catalog-init
    container_name: ${PROJECT_NAME}-llm-catalog-init
    restart: "no"
    depends_on:
      supabase-db-init:
        condition: service_completed_successfully
    environment:
      PGHOST: supabase-db
      PGPORT: 5432
      PGDATABASE: ${SUPABASE_DB_NAME}
      PGUSER: ${SUPABASE_DB_USER}
      PGPASSWORD: ${SUPABASE_DB_PASSWORD}
      LLM_PROVIDER_SOURCE: ${LLM_PROVIDER_SOURCE:-ollama-container-cpu}
      LITELLM_OPENAI_ENABLED: ${LITELLM_OPENAI_ENABLED:-false}
      LITELLM_ANTHROPIC_ENABLED: ${LITELLM_ANTHROPIC_ENABLED:-false}
      LITELLM_OPENROUTER_ENABLED: ${LITELLM_OPENROUTER_ENABLED:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_USER_MODELS: ${OPENAI_USER_MODELS:-}
      ANTHROPIC_USER_MODELS: ${ANTHROPIC_USER_MODELS:-}
      OPENROUTER_USER_MODELS: ${OPENROUTER_USER_MODELS:-}
      OLLAMA_USER_MODELS: ${OLLAMA_USER_MODELS:-}
      OLLAMA_CUSTOM_MODELS: ${OLLAMA_CUSTOM_MODELS:-}
      # Auto-import every model on the host's Ollama (or external
      # Ollama) into ``public.llms`` at boot, in addition to whatever
      # is in OLLAMA_USER_MODELS / OLLAMA_CUSTOM_MODELS. Makes the
      # catalog auto-sync with the upstream's ``/api/tags`` so any
      # ``ollama pull <name>`` you do on the host shows up across the
      # stack on the next ``./start.sh`` — no wizard re-run needed.
      # No-op for ``LLM_PROVIDER_SOURCE=ollama-container-*`` (containers
      # are populated by ollama-pull, which already reads
      # OLLAMA_USER_MODELS). Set to ``false`` to keep strict
      # wizard-only control (e.g. to hide private fine-tunes you don't
      # want exposed to every stack consumer).
      OLLAMA_AUTO_IMPORT_LOCAL_MODELS: ${OLLAMA_AUTO_IMPORT_LOCAL_MODELS:-true}
      # Upstream URL the catalog should query for /api/tags. Same env
      # var litellm-init consumes for its config.yaml rendering; the
      # ``${VAR-default}`` form (no colon) preserves empty values
      # (LLM_PROVIDER_SOURCE=none) so we don't accidentally hit a
      # nonexistent upstream.
      LITELLM_OLLAMA_UPSTREAM: ${LITELLM_OLLAMA_UPSTREAM-http://ollama:11434}
    extra_hosts:
      # Required for OLLAMA_AUTO_IMPORT_LOCAL_MODELS=true with
      # LLM_PROVIDER_SOURCE=ollama-localhost — the script needs to
      # reach the operator's host Ollama via host.docker.internal.
      - "host.docker.internal:${HOST_GATEWAY_IP}"
    volumes:
      - ./catalog-init/scripts:/scripts:ro
      # Catalog module mounted as a SIBLING dir, not as a file inside
      # the /scripts mount. Docker's behavior with file-on-dir overlays
      # is platform-dependent and was the root cause of a silent
      # init-chain failure on first launch. Sibling mount is unambiguous.
      - ../../bootstrapper/utils:/catalog:ro
    networks:
      - backend-network

  litellm-init:
    build: ./init
    container_name: ${PROJECT_NAME}-litellm-init
    restart: "no"
    depends_on:
      supabase-db:
        condition: service_healthy
      llm-catalog-init:
        condition: service_completed_successfully
    deploy:
      replicas: ${LITELLM_INIT_SCALE:-1}
    environment:
      PGHOST: supabase-db
      PGPORT: 5432
      PGDATABASE: ${SUPABASE_DB_NAME}
      PGUSER: ${SUPABASE_DB_USER}
      PGPASSWORD: ${SUPABASE_DB_PASSWORD}
      LITELLM_DB_NAME: ${LITELLM_DB_NAME:-litellm}
      # ``${VAR-default}`` (no colon) — fall back to default ONLY when
      # LITELLM_OLLAMA_UPSTREAM is unset. An empty value means "no
      # Ollama upstream" (LLM_PROVIDER_SOURCE=none); the ``:-`` form
      # would silently substitute the default for empty too, breaking
      # cloud-only setups. See .env.example LITELLM_OLLAMA_UPSTREAM.
      LITELLM_OLLAMA_UPSTREAM: ${LITELLM_OLLAMA_UPSTREAM-http://ollama:11434}
      LITELLM_CONFIG_OUT: /litellm-config/config.yaml
      # Hermes Agent passthrough — when HERMES_SOURCE != disabled,
      # services/litellm/init/scripts/init.py appends a hermes-agent model row whose
      # api_base is HERMES_ENDPOINT/v1. Empty/disabled → no row.
      HERMES_SOURCE: ${HERMES_SOURCE:-disabled}
      HERMES_ENDPOINT: ${HERMES_ENDPOINT:-}
    volumes:
      - ./init/scripts:/scripts:ro
      - ../../volumes/litellm:/litellm-config:rw
      # Sibling mount of bootstrapper/utils so /catalog/litellm_settings.py
      # (the shared settings dict) is reachable from init.py. Same
      # rationale as llm-catalog-init's /catalog mount.
      - ../../bootstrapper/utils:/catalog:ro
    networks:
      - backend-network

  litellm:
    image: ${LITELLM_IMAGE:-ghcr.io/berriai/litellm:v1.83.14-stable.patch.2}
    container_name: ${PROJECT_NAME}-litellm
    restart: unless-stopped
    depends_on:
      supabase-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      litellm-init:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:${HOST_GATEWAY_IP}"
    ports:
      - "${LITELLM_PORT:-63030}:4000"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      DATABASE_URL: postgresql://${SUPABASE_DB_USER}:${SUPABASE_DB_PASSWORD}@supabase-db:5432/${LITELLM_DB_NAME:-litellm}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      STORE_MODEL_IN_DB: "True"
      USE_PRISMA_MIGRATE: "True"
      # Admin UI login (http://litellm.localhost:${KONG_HTTP_PORT}/ui/ →
      # http://localhost:${LITELLM_PORT}/ui/). Modern LiteLLM versions
      # require UI_USERNAME + UI_PASSWORD to be set explicitly; the
      # historic "use master key as password" fallback was retired in
      # favour of the V2 login endpoint that calls authenticate_user().
      # We reuse LITELLM_MASTER_KEY as the password so operators only
      # have to remember one secret.
      UI_USERNAME: ${LITELLM_UI_USERNAME:-admin}
      UI_PASSWORD: ${LITELLM_MASTER_KEY}
      # Cloud-provider keys — required at request time. The LiteLLM
      # proxy resolves ``os.environ/OPENAI_API_KEY`` etc. from its
      # config.yaml at request time, so these must be available on the
      # container for routes pointing at cloud upstreams.
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      # Hermes Agent — the `hermes-agent` model_list row (appended by
      # services/litellm/init/scripts/init.py when HERMES_SOURCE != disabled) references
      # ``os.environ/HERMES_API_KEY`` for its bearer token.
      HERMES_API_KEY: ${HERMES_API_KEY:-}
      # NOTE: LITELLM_OPENAI_ENABLED / LITELLM_ANTHROPIC_ENABLED /
      # LITELLM_OPENROUTER_ENABLED are NOT passed here — they're
      # consumed only by ``llm-catalog-init`` to gate which provider
      # rows in public.llms get activated. The LiteLLM proxy's own
      # config comes entirely from /app/config.yaml.
    volumes:
      - ../../volumes/litellm/config.yaml:/app/config.yaml:ro
    # NOTE: 4 uvicorn workers race their own per-worker
    # `_create_database_views()` bootstrap at first boot; expect a
    # one-shot burst of ~11 `relation "<...>" does not exist at character
    # 15` errors in `genai-supabase-db`'s log within a single ~40 ms
    # window, then silent forever. Upstream LiteLLM behaviour, not a
    # bug in this stack — see services/litellm/README.md →
    # "Expected startup noise" for the full diagnosis + verification
    # one-liners.
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "4"]
    healthcheck:
      # LiteLLM's image is python:slim-based — no wget/curl. Probe via Python's
      # stdlib so the check works regardless of installed binaries.
      test: ["CMD", "python", "-c", "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://localhost:4000/health/liveliness', timeout=3).status == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - backend-network
