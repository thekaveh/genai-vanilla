# services/_order.yml
#
# Canonical service order for stable .env.example diffs and the wizard's
# display order. Hand-edited. The loader ignores any file starting with `_`,
# so this file lives next to the service folders without being treated as
# a manifest.
#
# Categories: data | llm | ai | app | infra
order:
  # Globals first — the top of .env.example
  - { name: globals,               category: infra }

  # Data tier
  - { name: supabase,              category: data }
  - { name: redis,                 category: data }
  - { name: minio,                 category: data }
  - { name: neo4j,                 category: data }

  # LLM tier
  - { name: litellm,               category: llm }
  - { name: ollama,                category: llm }
  - { name: cloud-providers,       category: llm }

  # AI tier
  - { name: weaviate,              category: ai }
  - { name: comfyui,               category: ai }
  - { name: parakeet,              category: ai }   # owns STT_PROVIDER_SOURCE
  - { name: tts-provider,          category: ai }   # virtual — owns TTS_PROVIDER_SOURCE
  - { name: speaches,              category: ai }
  - { name: chatterbox,            category: ai }
  - { name: docling,               category: ai }

  # App tier
  - { name: backend,               category: app }
  - { name: open-webui,            category: app }
  - { name: n8n,                   category: app }
  - { name: searxng,               category: app }
  - { name: local-deep-researcher, category: app }
  - { name: jupyterhub,            category: app }
  - { name: openclaw,              category: app }
  - { name: hermes,                category: app }

  # Gateway last
  - { name: kong,                  category: infra }
