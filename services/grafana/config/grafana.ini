# Minimal Grafana overrides — most config lives in env vars on the
# compose service block (GF_*). Settings here are static across runs.

[paths]
provisioning = /etc/grafana/provisioning

[unified_alerting]
enabled = true

[users]
allow_sign_up = false

[analytics]
reporting_enabled = false
check_for_updates = false
check_for_plugin_updates = false
