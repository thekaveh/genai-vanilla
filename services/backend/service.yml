# services/backend/service.yml — FastAPI backend (always-on adaptive)
name: backend
label: "Backend API (FastAPI)"
category: apps
docs: services/backend/README.md

containers:
  - backend

images:
  - var: BACKEND_IMAGE
    default: "python:3.12"
    container: backend

env:
  - name: BACKEND_SOURCE
    default: container
    description: "Adaptive core service; always container. Single-option."
  - name: BACKEND_PORT
    # default removed — computed by services/topology.py slot allocator
  - name: BACKEND_SCALE
    auto_managed: true
    description: "Always 1 (BACKEND_SOURCE is single-valued)."
  - name: LANGMEM_ENABLED
    default: true
  - name: LANGMEM_MEMORY_NAMESPACE
    default: default
  - name: LANGMEM_AUTO_CONSOLIDATE
    default: true
  - name: LANGMEM_CONSOLIDATION_INTERVAL
    default: 86400
  - name: LANGMEM_MAX_FACTS_PER_USER
    default: 1000
  - name: LANGMEM_EXTRACTION_MODEL
    default: ""
    description: "LiteLLM model id (empty = highest-priority active content model from public.llms)."
  - name: LANGMEM_EMBEDDING_MODEL
    default: ""

depends_on:
  # Mirrors services/backend/compose.yml. LiteLLM is gated on service_healthy
  # in compose because backend's startup performs first-call probes against
  # it; Weaviate-init must finish so configure-backend.sh can read the shared
  # config file; Kong is reachable but soft (proxy retries handle the race).
  required:
    - supabase
    - redis
    - litellm
  optional:
    - weaviate
    - kong

rows:
  - display_name: "Backend API"
    source_var: BACKEND_SOURCE
    port_var: BACKEND_PORT
    scale_var: BACKEND_SCALE
    alias: api.localhost
    description: "FastAPI backend (always-on adaptive)."

exports: []

# ─────────────────────────────────────────────────────────
# Bootstrapper runtime data (migrated from the legacy
# bootstrapper/service-configs.yml). Slices owned by this
# manifest. Synthesized into the runtime dict by
# bootstrapper/services/sc_synthesizer.py.
# ─────────────────────────────────────────────────────────
runtime_adaptive:
  backend:
    adapts_to:
    - llm_provider
    - weaviate
    - stt_provider
    - tts_provider
    - doc_processor
    - ray
    - lightrag
    environment_adaptation:
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_API_KEY: ${LITELLM_MASTER_KEY}
      WEAVIATE_URL: http://weaviate:8080
      STT_ENDPOINT: ${STT_ENDPOINT}
      TTS_ENDPOINT: ${TTS_ENDPOINT}
      DOCLING_ENDPOINT: ${DOCLING_ENDPOINT}
      RAY_ADDRESS: ${RAY_ADDRESS}
      LIGHTRAG_ENDPOINT: ${LIGHTRAG_ENDPOINT}
      LIGHTRAG_API_KEY: ${LIGHTRAG_API_KEY}
    extra_hosts_adaptation: inherit from llm_provider

runtime_deps:
  backend:
    optional:
    - neo4j-graph-db
    - searxng
    - n8n
    - weaviate
    - parakeet
    - speaches
    - chatterbox
    - docling
    info_message: Backend enabled - will connect to available optional services (neo4j,
      searxng, n8n, weaviate, parakeet, speaches, chatterbox, docling)

data_flow:
  calls:
    - supabase
    - weaviate
    - litellm
    - comfyui
    - n8n
    - ray
    - local-deep-researcher
    - lightrag

