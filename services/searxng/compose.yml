# services/searxng/compose.yml — SearXNG metasearch
services:
  searxng:
    image: ${SEARXNG_IMAGE}
    container_name: ${PROJECT_NAME}-searxng
    restart: unless-stopped
    deploy:
      replicas: ${SEARXNG_SCALE:-1}
    networks:
      - backend-network
    ports:
      - "${HOST_BIND_IP:-}${SEARXNG_PORT}:8080"
    volumes:
      - ./config:/etc/searxng:rw
      - searxng-data:/var/cache/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:${SEARXNG_PORT}
      - SEARXNG_SECRET=${SEARXNG_SECRET}
      - FORCE_OWNERSHIP=1
    healthcheck:
      # Pass an X-Forwarded-For header so searxng's botdetection trusted-proxy
      # check (searx/botdetection/trusted_proxies.py:141) doesn't fire its
      # one-shot "X-Forwarded-For nor X-Real-IP header is set!" ERROR on the
      # first healthcheck after startup. The body uses 127.0.0.1 (loopback)
      # which limiter.toml's ``pass_ip`` lists, so the healthcheck still
      # bypasses all rate-limiting.
      test: ["CMD", "wget", "--spider", "-q", "--header=X-Forwarded-For: 127.0.0.1", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # No depends_on: searxng runs with `valkey.url: false` in
    # config/settings.yml (no redis/valkey usage) — the old
    # redis:service_healthy gate was pure startup coupling.

volumes:
  searxng-data:
    name: ${PROJECT_NAME}-searxng-data
    driver: local
