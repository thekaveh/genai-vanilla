# services/searxng/service.yml — SearXNG privacy metasearch
name: searxng
label: "SearXNG (privacy metasearch)"
category: media
docs: services/searxng/README.md

containers:
  - searxng

images:
  - var: SEARXNG_IMAGE
    default: "searxng/searxng:latest"
    container: searxng

sources:
  var: SEARXNG_SOURCE
  default: container
  options:
    - id: container
      label: "Container"
    - id: disabled
      label: "Disabled"

env:
  - name: SEARXNG_SOURCE
    default: container
  - name: SEARXNG_PORT
    # default removed — computed by services/topology.py slot allocator
  - name: SEARXNG_SECRET
    default: ""
    secret: true
    description: "Auto-generated by bootstrapper."
  # SEARXNG_PUBLIC_INSTANCE / SEARXNG_ENABLE_METRICS / SEARXNG_DEFAULT_LOCALE
  # were declared here historically but never actually wired:
  # `config/settings.yml` carries literal values for these settings (not
  # `${VAR}` interpolations), and compose's env block doesn't pass them
  # into the SearXNG container. Surfacing them in `.env.example` was a
  # dead promise — an operator flipping `SEARXNG_PUBLIC_INSTANCE=true`
  # believed they'd enabled public-instance hardening but nothing
  # changed. Re-add only as part of a follow-up that templates
  # `settings.yml` at start-up (envsubst init step).
  - name: SEARXNG_SCALE
    auto_managed: true

depends_on:
  # ORDERING-ONLY: settings.yml runs with `valkey.url: false` (no
  # redis/valkey traffic) and the compose-level startup gate was
  # removed as dead coupling. The manifest entry stays because the
  # topology slot allocator derives port positions from depends_on —
  # dropping it renumbers COMFYUI_PORT and every later slot, breaking
  # existing .env files. Treat as display/slot pinning, not a runtime
  # dependency.
  required:
    - redis
  optional: []

exports: []

rows:
  - display_name: "SearxNG"
    source_var: SEARXNG_SOURCE
    port_var: SEARXNG_PORT
    scale_var: SEARXNG_SCALE
    alias: search.localhost
    description: "Privacy-focused metasearch."

# ─────────────────────────────────────────────────────────
# Bootstrapper runtime data (migrated from the legacy
# bootstrapper/service-configs.yml). Slices owned by this
# manifest. Synthesized into the runtime dict by
# bootstrapper/services/sc_synthesizer.py.
# ─────────────────────────────────────────────────────────
runtime_sc:
  searxng:
    container:
      scale: 1
      environment: {}
      deploy: {}
      extra_hosts: []
    disabled:
      scale: 0
      environment: {}
      deploy: {}
      extra_hosts: []

data_flow:
  calls: []

