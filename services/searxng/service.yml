# services/searxng/service.yml — SearXNG privacy metasearch
name: searxng
label: "SearXNG (privacy metasearch)"
category: app
docs: docs/services/searxng.md

containers:
  - searxng

images:
  - var: SEARXNG_IMAGE
    default: "searxng/searxng:latest"
    container: searxng

sources:
  var: SEARXNG_SOURCE
  default: container
  options:
    - id: container
      label: "Container"
    - id: disabled
      label: "Disabled"

env:
  - name: SEARXNG_SOURCE
    default: container
  - name: SEARXNG_PORT
    default: 63014
  - name: SEARXNG_SECRET
    default: ""
    secret: true
    description: "Auto-generated by bootstrapper."
  - name: SEARXNG_PUBLIC_INSTANCE
    default: false
  - name: SEARXNG_ENABLE_METRICS
    default: true
  - name: SEARXNG_DEFAULT_LOCALE
    default: en
  - name: SEARXNG_SCALE
    auto_managed: true

depends_on:
  required: []
  optional: []

exports: []

# ─────────────────────────────────────────────────────────
# Bootstrapper runtime data (migrated from the legacy
# bootstrapper/service-configs.yml). Slices owned by this
# manifest. Synthesized into the runtime dict by
# bootstrapper/services/sc_synthesizer.py.
# ─────────────────────────────────────────────────────────
runtime_sc:
  searxng:
    container:
      scale: 1
      environment: {}
      deploy: {}
      extra_hosts: []
    disabled:
      scale: 0
      environment: {}
      deploy: {}
      extra_hosts: []

