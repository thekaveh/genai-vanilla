# Atlas SearXNG configuration — a THIN override on the image's DEFAULT settings.
#
# We deliberately do NOT fork SearXNG's full settings.yml. A full fork carries
# the entire ~250-engine list, which drifts from whatever SearXNG image we pin:
# engines get their modules removed (→ `Cannot load engine <x>: FileNotFoundError`)
# or their per-engine config API changes (→ `Engine setup was not successful`),
# spamming errors at every startup and breaking again on every image bump.
#
# `use_default_settings` inherits the image's correct, version-matched defaults
# — the full engine list with valid per-engine config, plus
# `server.limiter: false`, `valkey.url: false`, `general.enable_metrics: true`,
# and the `secret_key` placeholder. We override ONLY what the Atlas stack needs.
#
# Runtime values injected via SearXNG-native env vars (set in
# services/searxng/compose.yml — NOT in this file):
#   - server.secret_key  ← ${SEARXNG_SECRET}    (auto-generated into .env)
#   - server.base_url    ← ${SEARXNG_BASE_URL}
# So this file holds no secrets and needs no startup templating.
#
# To re-pin or tweak an individual engine, add a minimal `engines:` entry here
# (SearXNG merges it over the default for that engine), or use the
# `use_default_settings.engines.{remove,keep_only}` knobs below — rather than
# re-forking the whole list. See services/searxng/README.md.
use_default_settings:
  engines:
    # Drop the Tor-only engines from the default set: they require a Tor proxy
    # (none is wired in this stack), so they fail engine setup and log
    # `loading engine <x> failed: set engine to inactive` at every boot.
    remove:
      - ahmia
      - torch

search:
  # JSON output is OFF in the SearXNG default (HTML only). The Atlas backend,
  # n8n, and local-deep-researcher all query SearXNG's JSON search API
  # (`/search?...&format=json`), so it MUST be enabled here.
  formats:
    - html
    - json
