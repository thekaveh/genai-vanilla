# Static scrape config for the GenAI Vanilla stack. Targets that resolve
# to services currently `disabled` simply report UP=0 — cleaner than
# templating this file based on enabled services (which would need an
# init container at boot).

global:
  scrape_interval: 30s
  scrape_timeout: 10s
  external_labels:
    stack: genai-vanilla

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: grafana
    static_configs:
      - targets: ['grafana:3000']

  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: kong
    # Kong Prometheus plugin exposes metrics on the Status API (8100).
    # The compose service is named `kong-api-gateway` (the container has
    # ${PROJECT_NAME}-kong-api-gateway as its container_name, but DNS
    # inside the backend-network uses the compose service id).
    static_configs:
      - targets: ['kong-api-gateway:8100']

  - job_name: litellm
    static_configs:
      - targets: ['litellm:4000']

  - job_name: weaviate
    # Weaviate metrics live on a separate port from the API (2112 vs 8080).
    static_configs:
      - targets: ['weaviate:2112']

  - job_name: n8n
    static_configs:
      - targets: ['n8n:5678']

  # Queue mode offloads executions to the worker, whose worker-server
  # exposes its own /metrics — without this job the execution-data
  # counters (written worker-side) are invisible.
  - job_name: n8n-worker
    static_configs:
      - targets: ['n8n-worker:5678']

  # JupyterHub (the folder/service name is historical; the image we ship is
  # actually single-user `jupyter/datascience-notebook`, not real JupyterHub).
  # Single-user Jupyter Server has no built-in /metrics surface; adding one
  # would require the `jupyter-server-prometheus` extension, which we don't
  # install. Deferred until the multi-user JupyterHub spec lands.
  #
  # Hermes is intentionally omitted for the same reason — it's the third-party
  # `nousresearch/hermes-agent` image which ships no /metrics endpoint. Its
  # API listens on 8642 / dashboard on 9119; instrumenting it would require
  # forking the upstream image.

  - job_name: minio
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ['minio:9000']

  - job_name: backend
    static_configs:
      - targets: ['backend:8000']

  - job_name: postgres-exporter
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: redis-exporter
    static_configs:
      - targets: ['redis-exporter:9121']
