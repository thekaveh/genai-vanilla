# services/prometheus/compose.yml — Prometheus + node-exporter + cAdvisor
services:
  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:v2.55.1}
    container_name: ${PROJECT_NAME}-prometheus
    restart: unless-stopped
    deploy:
      replicas: ${PROMETHEUS_SCALE:-0}
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION_DAYS:-7}d
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --web.enable-lifecycle
    ports:
      - "${HOST_BIND_IP:-}${PROMETHEUS_PORT}:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILE:-3}"
    networks:
      - backend-network

  node-exporter:
    image: ${NODE_EXPORTER_IMAGE:-prom/node-exporter:v1.11.1}
    container_name: ${PROJECT_NAME}-node-exporter
    restart: unless-stopped
    deploy:
      replicas: ${NODE_EXPORTER_SCALE:-0}
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      # Without --path.rootfs the filesystem collector statfs'd the
      # CONTAINER fs — node_filesystem_* (consumed by the
      # containers-and-host dashboard) reported the overlay mount, not
      # the host disks the /:/rootfs:ro bind exists to expose.
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    ports:
      - "${HOST_BIND_IP:-}${NODE_EXPORTER_PORT}:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    logging:
      driver: json-file
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILE:-3}"
    networks:
      - backend-network

  cadvisor:
    image: ${CADVISOR_IMAGE:-gcr.io/cadvisor/cadvisor:v0.55.1}
    container_name: ${PROJECT_NAME}-cadvisor
    restart: unless-stopped
    deploy:
      replicas: ${CADVISOR_SCALE:-0}
    ports:
      - "${HOST_BIND_IP:-}${CADVISOR_PORT}:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    logging:
      driver: json-file
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILE:-3}"
    networks:
      - backend-network

volumes:
  prometheus-data:
    name: ${PROJECT_NAME}-prometheus-data
    driver: local
