# services/docling/service.yml — Docling document processor
name: docling
label: "Docling (document processor)"
category: media
docs: docs/services/doc-processor.md  # docling is the docling-container-gpu / docling-localhost engine behind DOC_PROCESSOR_SOURCE

containers:
  - docling-gpu

images:
  - var: DOCLING_GPU_IMAGE
    default: "pytorch/pytorch:2.5.1-cuda12.4-cudnn9-runtime"
    container: docling-gpu
    notes: "Used as BASE_IMAGE in doc-processor/gpu/Dockerfile."

sources:
  var: DOC_PROCESSOR_SOURCE
  default: disabled
  options:
    - id: disabled
      label: "Disabled"
    - id: docling-localhost
      label: "Host (existing Docling on this machine)"
    - id: docling-container-gpu
      label: "Container (GPU, NVIDIA)"

env:
  - name: DOC_PROCESSOR_SOURCE
    default: disabled
  - name: DOC_PROCESSOR_PORT
    # default removed — computed by services/topology.py slot allocator
  - name: DOCLING_GPU_DEVICE
    default: cuda
  - name: DOCLING_OUTPUT_FORMAT
    default: markdown
  - name: DOCLING_USE_OCR
    default: auto
  - name: DOCLING_TABLE_MODE
    default: accurate
  - name: DOCLING_MAX_FILE_SIZE
    default: 52428800
  - name: DOCLING_ENABLE_FORMULAS
    default: true
  - name: DOCLING_ENABLE_CODE_BLOCKS
    default: true
  - name: DOCLING_CHUNK_SIZE
    default: 512
  - name: DOCLING_CHUNK_OVERLAP
    default: 50
  - name: DOCLING_GPU_SCALE
    auto_managed: true
  - name: DOCLING_ENDPOINT
    auto_managed: true
  - name: DOCLING_LOCALHOST_URL
    default: "http://host.docker.internal:63021"
    description: "Used when DOC_PROCESSOR_SOURCE=docling-localhost. Override to point at a host-installed Docling on a non-default port; the same env var is consumed by Kong's docling.localhost route so both consumers stay in sync."

depends_on:
  required:
    - globals
  optional: []

exports: []

rows:
  - display_name: "Document Processor"
    source_var: DOC_PROCESSOR_SOURCE
    port_var: DOC_PROCESSOR_PORT
    scale_var: DOCLING_GPU_SCALE
    alias: docling.localhost
    description: "Document parsing & extraction."
    localhost_endpoint_var: DOCLING_ENDPOINT

# ─────────────────────────────────────────────────────────
# Bootstrapper runtime data (migrated from the legacy
# bootstrapper/service-configs.yml). Slices owned by this
# manifest. Synthesized into the runtime dict by
# bootstrapper/services/sc_synthesizer.py.
# ─────────────────────────────────────────────────────────
runtime_sc:
  doc_processor:
    docling-container-gpu:
      scale: 1
      environment:
        DOCLING_ENDPOINT: http://docling-gpu:8000
        DOCLING_DEVICE: ${DOCLING_GPU_DEVICE:-cuda}
        NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
        HF_TOKEN: ${HUGGING_FACE_HUB_TOKEN}
      deploy:
        resources:
          reservations:
            devices:
            - driver: nvidia
              count: 1
              capabilities:
              - gpu
      extra_hosts: []
    docling-localhost:
      scale: 0
      environment:
        DOCLING_ENDPOINT: ${DOCLING_LOCALHOST_URL:-http://host.docker.internal:63021}
      deploy: {}
      extra_hosts:
      - host.docker.internal:host-gateway
    disabled:
      scale: 0
      environment:
        DOCLING_ENDPOINT: ''
      deploy: {}
      extra_hosts: []

data_flow:
  calls: []

