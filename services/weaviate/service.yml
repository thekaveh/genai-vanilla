# services/weaviate/service.yml — Weaviate + init + CLIP multimodal
name: weaviate
label: "Weaviate (vector database)"
category: data
docs: services/weaviate/README.md

containers:
  - weaviate
  - weaviate-init
  - multi2vec-clip

images:
  - var: WEAVIATE_IMAGE
    default: "cr.weaviate.io/semitechnologies/weaviate:1.27.5"
    container: weaviate
  - var: WEAVIATE_INIT_IMAGE
    default: "alpine:latest"
    container: weaviate-init
  - var: MULTI2VEC_CLIP_IMAGE
    default: "semitechnologies/multi2vec-clip:sentence-transformers-clip-ViT-B-32"
    container: multi2vec-clip

sources:
  var: WEAVIATE_SOURCE
  default: container
  options:
    - id: container
      label: "Container (in-stack Weaviate)"
    - id: localhost
      label: "Host (existing Weaviate on this machine)"
    - id: disabled
      label: "Disabled"

env:
  - name: WEAVIATE_SOURCE
    default: container
  - name: WEAVIATE_PORT
    # default removed — computed by services/topology.py slot allocator
  - name: WEAVIATE_GRPC_PORT
    # default removed — computed by services/topology.py slot allocator
  - name: WEAVIATE_INIT_SOURCE
    default: container
    description: "Auto-managed by weaviate. Container/disabled."
  - name: MULTI2VEC_CLIP_SOURCE
    default: container-cpu
    description: "Options: container-cpu, container-gpu, disabled. (Effects driven by hook.)"
  - name: WEAVIATE_ENABLE_MODULES
    default: "text2vec-openai,text2vec-ollama,multi2vec-clip,generative-openai,generative-ollama"
  - name: CLIP_INFERENCE_API
    default: "http://multi2vec-clip:8080"
  - name: WEAVIATE_URL
    auto_managed: true
    description: "Resolved per WEAVIATE_SOURCE. Consumed by n8n, backend, jupyterhub."
  - name: WEAVIATE_OLLAMA_ENDPOINT
    default: "http://ollama:11434"
    description: "User-settable. Mirrors what Weaviate's text2vec-ollama vectorizer hits; matches OLLAMA_ENDPOINT for container source, but the user adjusts manually for ollama-localhost/external (consistent with main's behavior)."
  - name: WEAVIATE_LITELLM_BASE_URL
    auto_managed: true
    default: "http://litellm:4000/v1"
    description: "Computed by hook from LITELLM_PORT + BASE_PORT."
  - name: WEAVIATE_LITELLM_API_KEY
    auto_managed: true
    secret: true
    description: "Mirror of LITELLM_MASTER_KEY for Weaviate's vectorizer auth."
  - name: WEAVIATE_SCALE
    auto_managed: true
  - name: WEAVIATE_INIT_SCALE
    auto_managed: true
  - name: CLIP_SCALE
    auto_managed: true
    description: "Computed from MULTI2VEC_CLIP_SOURCE."
  - name: CLIP_ENABLE_CUDA
    auto_managed: true
  - name: CLIP_DEPLOY_RESOURCES
    default: "~"
  - name: WEAVIATE_LOCALHOST_PORT
    default: "8080"
    description: "Host port for the weaviate-localhost source variant. URL is derived at compose-render time as http://host.docker.internal:8080."


depends_on:
  required:
    - supabase
    - litellm
  optional: []

rows:
  - display_name: "Weaviate"
    source_var: WEAVIATE_SOURCE
    port_var: WEAVIATE_PORT
    scale_var: WEAVIATE_SCALE
    alias: weaviate.localhost
    description: "Vector database for semantic search & RAG."
    localhost_endpoint_var: WEAVIATE_URL
    localhost_port_var: WEAVIATE_LOCALHOST_PORT
  - display_name: "Multi2Vec CLIP"
    source_var: MULTI2VEC_CLIP_SOURCE
    scale_var: CLIP_SCALE
    description: "CLIP embeddings for multimodal search."
    # Secondary source: the wizard doesn't prompt for it (the manifest's
    # `sources:` block is for WEAVIATE_SOURCE). Use `./start.sh
    # --multi2vec-clip-source <container-cpu|container-gpu|disabled>`
    # or set MULTI2VEC_CLIP_SOURCE directly in .env.

exports: []

# ─────────────────────────────────────────────────────────
# Bootstrapper runtime data (migrated from the legacy
# bootstrapper/service-configs.yml). Slices owned by this
# manifest. Synthesized into the runtime dict by
# bootstrapper/services/sc_synthesizer.py.
# ─────────────────────────────────────────────────────────
runtime_sc:
  weaviate:
    container:
      scale: 1
      environment:
        QUERY_DEFAULTS_LIMIT: 25
        AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
        PERSISTENCE_DATA_PATH: /var/lib/weaviate
        DEFAULT_VECTORIZER_MODULE: text2vec-openai
        ENABLE_MODULES: text2vec-openai,text2vec-ollama,multi2vec-clip,generative-openai,generative-ollama
        CLUSTER_HOSTNAME: weaviate
        OPENAI_APIKEY: ${LITELLM_MASTER_KEY:-}
        CLIP_INFERENCE_API: http://multi2vec-clip:8080
        WEAVIATE_URL: http://weaviate:8080
      deploy: {}
      extra_hosts: []
    localhost:
      scale: 0
      environment:
        WEAVIATE_URL: http://host.docker.internal:${WEAVIATE_LOCALHOST_PORT:-8080}
      deploy: {}
      extra_hosts:
      - host.docker.internal:host-gateway
    disabled:
      scale: 0
      environment:
        WEAVIATE_URL: ''
      deploy: {}
      extra_hosts: []
  multi2vec-clip:
    container-cpu:
      scale: 1
      environment:
        ENABLE_CUDA: '0'
      deploy: {}
      extra_hosts: []
    container-gpu:
      scale: 1
      environment:
        ENABLE_CUDA: '1'
      deploy:
        resources:
          reservations:
            devices:
            - driver: nvidia
              capabilities:
              - gpu
      extra_hosts: []
    disabled:
      scale: 0
      environment:
        ENABLE_CUDA: '0'
      deploy: {}
      extra_hosts: []
  weaviate-init:
    container:
      scale: 1
      environment: {}
      deploy: {}
      extra_hosts: []
    disabled:
      scale: 0
      environment: {}
      deploy: {}
      extra_hosts: []

runtime_adaptive:
  weaviate-init:
    adapts_to: llm_provider
    environment_adaptation:
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_API_KEY: ${LITELLM_MASTER_KEY}
    extra_hosts_adaptation: inherit from llm_provider

data_flow:
  calls:
    - litellm
    - multi2vec-clip

