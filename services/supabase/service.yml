# services/supabase/service.yml — full Supabase stack (9 containers)
#
# One manifest, one compose fragment, nine containers: eight core Supabase
# services (db, db-init, meta, storage, auth, api, realtime, studio) plus the
# postgres-exporter observability sidecar (scales 1<->0 with PROMETHEUS_SOURCE).
# The Supabase family is treated as a single unit because the containers are
# tightly coupled (same JWT secret, same database, lifecycle-linked via
# depends_on chain through supabase-db-init).
name: supabase
label: "Supabase (db, auth, api, storage, realtime, studio, meta)"
category: data
docs: services/supabase/README.md

containers:
  - supabase-db
  - supabase-db-init
  - supabase-meta
  - supabase-storage
  - supabase-auth
  - supabase-api
  - supabase-realtime
  - supabase-studio
  - postgres-exporter

images:
  - var: SUPABASE_DB_IMAGE
    default: "supabase/postgres:17.4.1.016"
    container: supabase-db
  - var: SUPABASE_DB_INIT_IMAGE
    default: "postgres:15.18-alpine"
    container: supabase-db-init
  - var: SUPABASE_META_IMAGE
    default: "supabase/postgres-meta:v0.88.9"
    container: supabase-meta
  - var: SUPABASE_STORAGE_IMAGE
    default: "supabase/storage-api:v1.22.7"
    container: supabase-storage
  - var: SUPABASE_AUTH_IMAGE
    default: "supabase/gotrue:v2.171.0"
    container: supabase-auth
  - var: SUPABASE_API_IMAGE
    default: "postgrest/postgrest:v12.2.10"
    container: supabase-api
  - var: SUPABASE_REALTIME_IMAGE
    default: "supabase/realtime:v2.33.72"
    container: supabase-realtime
  - var: SUPABASE_STUDIO_IMAGE
    default: "supabase/studio:latest"
    container: supabase-studio
  - var: POSTGRES_EXPORTER_IMAGE
    default: "prometheuscommunity/postgres-exporter:v0.18.1"
    container: postgres-exporter
    notes: "Prometheus exporter sidecar. Scales 1↔0 with PROMETHEUS_SOURCE (gated by _generate_prometheus_config)."

env:
  # DB
  - name: SUPABASE_DB_SOURCE
    default: container
    description: "Single-option (container only). Kept for forward-compat with legacy source-validator."
  - name: SUPABASE_DB_PORT
    # default removed — computed by services/topology.py slot allocator
  - name: SUPABASE_DB_USER
    default: supabase_admin
  - name: SUPABASE_DB_PASSWORD
    default: password
    secret: true
  - name: SUPABASE_DB_NAME
    default: postgres
  - name: SUPABASE_DB_APP_USER
    default: app_user
    description: "Application-tier user (created by supabase-db-init scripts)."
  - name: SUPABASE_DB_APP_PASSWORD
    default: app_password
    secret: true
  # DB init
  - name: SUPABASE_DB_INIT_SOURCE
    default: container
    description: "Auto-managed by supabase-db. Container/disabled."
  # Postgres-exporter sidecar (observability)
  - name: POSTGRES_EXPORTER_PORT
    # default removed — computed by services/topology.py slot allocator
    description: "Host port for postgres-exporter (in-container 9187). Sidecar gated by PROMETHEUS_SOURCE."
  - name: POSTGRES_EXPORTER_SCALE
    auto_managed: true
    description: "Set by _generate_prometheus_config() to 1 when PROMETHEUS_SOURCE=container, 0 otherwise."
  # Meta
  - name: SUPABASE_META_SOURCE
    default: container
  - name: SUPABASE_META_PORT
    # default removed — computed by services/topology.py slot allocator
  # Storage
  - name: SUPABASE_STORAGE_SOURCE
    default: container
  - name: SUPABASE_STORAGE_PORT
    # default removed — computed by services/topology.py slot allocator
  - name: STORAGE_REGION
    default: local
  - name: STORAGE_FILE_SIZE_LIMIT
    default: 52428800
  - name: STORAGE_BACKEND
    default: file
  - name: PROJECT_REF
    default: default
  - name: TENANT_ID
    default: stub
  # Auth (GoTrue)
  - name: SUPABASE_AUTH_SOURCE
    default: container
  - name: SUPABASE_AUTH_PORT
    # default removed — computed by services/topology.py slot allocator
  - name: SUPABASE_JWT_SECRET
    default: ""
    secret: true
    description: "Auto-generated by bootstrapper/generate_supabase_keys.py on first run."
  - name: SUPABASE_ANON_KEY
    default: ""
    secret: true
    description: "Auto-generated."
  - name: SUPABASE_SERVICE_KEY
    default: ""
    secret: true
    description: "Auto-generated."
  # API (PostgREST)
  - name: SUPABASE_API_SOURCE
    default: container
  - name: SUPABASE_API_PORT
    # default removed — computed by services/topology.py slot allocator
  # Realtime
  - name: SUPABASE_REALTIME_SOURCE
    default: container
  - name: SUPABASE_REALTIME_PORT
    # default removed — computed by services/topology.py slot allocator
  # Studio
  - name: SUPABASE_STUDIO_SOURCE
    default: container
  - name: SUPABASE_STUDIO_PORT
    # default removed — computed by services/topology.py slot allocator

depends_on:
  # Root infra — Supabase is the data/auth substrate every other service
  # depends on. Has no upstream service dependencies of its own. (The
  # virtual `globals` manifest is config-only and was removed from this
  # list — depending on it conflated runtime ordering with config metadata.)
  required: []
  optional: []

rows:
  - display_name: "Supabase DB"
    source_var: SUPABASE_DB_SOURCE
    port_var: SUPABASE_DB_PORT
    description: "Postgres database (always-on, container-only)."
  - display_name: "Supabase Meta"
    source_var: SUPABASE_META_SOURCE
    port_var: SUPABASE_META_PORT
    description: "Postgres metadata API."
  - display_name: "Supabase Storage"
    source_var: SUPABASE_STORAGE_SOURCE
    port_var: SUPABASE_STORAGE_PORT
    description: "S3-compatible storage API."
  - display_name: "Supabase Auth"
    source_var: SUPABASE_AUTH_SOURCE
    port_var: SUPABASE_AUTH_PORT
    description: "GoTrue authentication service."
  - display_name: "Supabase API"
    source_var: SUPABASE_API_SOURCE
    port_var: SUPABASE_API_PORT
    description: "PostgREST REST API surface."
  - display_name: "Supabase Realtime"
    source_var: SUPABASE_REALTIME_SOURCE
    port_var: SUPABASE_REALTIME_PORT
    description: "WebSocket replication firehose."
  - display_name: "Supabase Studio"
    source_var: SUPABASE_STUDIO_SOURCE
    port_var: SUPABASE_STUDIO_PORT
    alias: studio.localhost
    description: "Browser UI for the database."

# Supabase exports DB credentials + JWT/ANON/SERVICE keys to half the stack.
# Consumers are listed for documentation; validator only checks closure
# once the consumer manifests exist.
exports: []

