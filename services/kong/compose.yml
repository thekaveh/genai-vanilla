# services/kong/compose.yml — Kong API gateway
services:
  kong-api-gateway:
    container_name: ${PROJECT_NAME}-kong-api-gateway
    image: ${KONG_API_GATEWAY_IMAGE}
    restart: unless-stopped
    ports:
      - ${KONG_HTTP_PORT}:8000/tcp
      - ${KONG_HTTPS_PORT}:8443/tcp
    expose:
      # Kong Status API + /metrics endpoint (Prometheus plugin). Not
      # mapped to a host port — only the in-network Prometheus container
      # scrapes it.
      - "8100"
    volumes:
      - ../../volumes/api/kong-dynamic.yml:/home/kong/kong.yml:ro,z
    depends_on:
      redis:
        condition: service_started
      supabase-auth:
        condition: service_started
      supabase-api:
        condition: service_started
      supabase-realtime:
        condition: service_started
      supabase-storage:
        condition: service_started
      supabase-meta:
        condition: service_started
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      # Tight DNS retry/TTL settings so Kong recovers fast when a
      # service container is restarted (or comes up after Kong). The
      # default ``KONG_DNS_NOT_FOUND_TTL=30s`` means Kong caches a
      # "not-found" verdict for 30 seconds — long enough that an
      # active websocket retry loop (e.g. an open Open WebUI tab
      # reconnecting during ./start.sh) floods the log with DNS
      # errors for ~half a minute every restart. Dropping to 1s keeps
      # the noise window at 1-2 retries and recovery is immediate
      # once the upstream container is registered in the Docker DNS.
      KONG_DNS_NOT_FOUND_TTL: "1"
      KONG_DNS_STALE_TTL: "4"
      # ``pre-function`` is bundled with Kong OSS but disabled by default.
      # We allowlist it so ``kong_config_generator.py`` can use it to
      # auto-redirect ``http://litellm.localhost:${KONG_HTTP_PORT}/`` to
      # ``/ui/`` (LiteLLM's admin dashboard lives at /ui/; the proxy
      # root serves Swagger). Lua snippet lives next to the route.
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth,rate-limiting,pre-function,prometheus
      # Expose the Kong Status API on 8100 so Prometheus can scrape /metrics
      # via the in-cluster `kong-api-gateway:8100` upstream (the compose
      # service id; `kong` alone does not resolve on backend-network).
      # The Status API is internal-only (not mapped to a host port) —
      # only services on the backend-network can reach it.
      KONG_STATUS_LISTEN: 0.0.0.0:8100
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      # SSE-compatible settings
      KONG_NGINX_PROXY_PROXY_BUFFERING: "off"
      KONG_NGINX_PROXY_PROXY_CACHE: "off"
      KONG_NGINX_PROXY_CHUNKED_TRANSFER_ENCODING: "on"
      KONG_NGINX_PROXY_TCP_NOPUSH: "on"
      KONG_NGINX_PROXY_TCP_NODELAY: "on"
      KONG_NGINX_PROXY_KEEPALIVE_TIMEOUT: "300"
      # WebSocket support
      KONG_NGINX_HTTP_UPSTREAM_KEEPALIVE: "16"
      KONG_NGINX_HTTP_UPSTREAM_KEEPALIVE_REQUESTS: "100"
      KONG_NGINX_HTTP_UPSTREAM_KEEPALIVE_TIMEOUT: "60s"
      # Proxy timeouts (in seconds)
      KONG_PROXY_READ_TIMEOUT: "300"
      KONG_PROXY_SEND_TIMEOUT: "300"
      KONG_REDIS_HOST: redis
      KONG_REDIS_PORT: 6379
      KONG_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
    extra_hosts:
      # Kong proxies several aliases (comfyui.localhost, ollama.localhost,
      # graph.localhost, etc.) to host-installed services via
      # ``host.docker.internal``. Docker Desktop maps this automatically;
      # Linux Docker needs the explicit host-gateway entry (bootstrapper
      # fills HOST_GATEWAY_IP with "host-gateway" or the bridge IP for
      # rootless setups).
      - "host.docker.internal:${HOST_GATEWAY_IP}"
    networks:
      - backend-network
