# services/kong/service.yml — Kong API gateway
name: kong
label: "Kong (API gateway)"
category: infra
docs: services/kong/README.md

containers:
  - kong-api-gateway

images:
  - var: KONG_API_GATEWAY_IMAGE
    default: "kong:3.9.0"
    container: kong-api-gateway

env:
  - name: KONG_API_GATEWAY_SOURCE
    default: container
    description: "Single-option (container only)."
  - name: KONG_HTTP_PORT
    # default removed — computed by services/topology.py slot allocator
  - name: KONG_HTTPS_PORT
    # default removed — computed by services/topology.py slot allocator
  - name: DASHBOARD_USERNAME
    default: kong_admin
  - name: DASHBOARD_PASSWORD
    default: kong_password
    secret: true

depends_on:
  required:
    - supabase
    - redis
    - litellm
    - open-webui
    - n8n
    - hermes
    - openclaw
    - jupyterhub
    - backend
    - searxng
    - minio
    - comfyui
    - local-deep-researcher
    - neo4j
    - weaviate
    - tts-provider
    - parakeet
    - docling
    - ollama
  optional: []

exports: []

rows:
  - display_name: "Kong API Gateway"
    source_var: KONG_API_GATEWAY_SOURCE
    port_var: KONG_HTTP_PORT
    description: "Edge gateway routing *.localhost aliases."

# ─────────────────────────────────────────────────────────
# Bootstrapper runtime data (migrated from the legacy
# bootstrapper/service-configs.yml). Slices owned by this
# manifest. Synthesized into the runtime dict by
# bootstrapper/services/sc_synthesizer.py.
# ─────────────────────────────────────────────────────────
runtime_sc:
  kong-api-gateway:
    container:
      scale: 1
      environment: {}
      deploy: {}
      extra_hosts: []

# data_flow.calls for Kong uses the PROXY direction by convention:
# Kong doesn't initiate outbound calls itself — it forwards inbound traffic
# to these backends. Listing them here produces a diagram where Kong is
# correctly shown as the front door for everything it routes to.
data_flow:
  calls:
    - backend
    - open-webui
    - jupyterhub
    - n8n
    - hermes
    - openclaw
    - local-deep-researcher
    - minio
    - supabase
    - weaviate
    - neo4j
    - comfyui
    - searxng
    - stt-provider
    - tts-provider
    - doc-processor
    - litellm
    - ollama

