# services/globals/service.yml — global, non-service-specific env vars
#
# Virtual manifest. Owns vars that don't belong to any one service:
#   - PROJECT_NAME, BASE_PORT, HOST_GATEWAY_IP (infrastructure)
#   - BRAND_* (TUI branding)
# These appear at the top of the assembled .env.example.
name: globals
label: "Globals (project + branding)"
category: infra
docs: docs/CONTRIBUTING-services.md  # virtual; nearest reference doc is the architecture / manifest convention guide
virtual: true
containers: []

env:
  - name: PROJECT_NAME
    default: genai
    description: "Project identifier. Used as container/volume/network name prefix."
  - name: BASE_PORT
    default: 63000
    description: "Base port. Every service's *_PORT derives from this + a fixed offset."
  - name: HOST_GATEWAY_IP
    auto_managed: true
    default: host-gateway
    description: |
      Bootstrapper computes this at runtime based on the runtime (Docker:
      "host-gateway"; Podman: literal gateway IP). If you copy this file to
      .env manually without running ./start.sh, set this to "host-gateway"
      on Linux/macOS Docker, or the real bridge IP on rootless setups.
  # Branding (TUI wizard)
  - name: BRAND_NAME
    default: "GenAI Vanilla Stack"
  - name: BRAND_TAGLINE
    default: "An opinionated, modular, source-configurable AI stack."
  - name: BRAND_VERSION
    default: "0.1.0"
  - name: BRAND_AUTHOR
    default: "Kaveh Razavi"
  - name: BRAND_AUTHOR_EMAIL
    default: "kaveh.razavi@gmail.com"
  - name: BRAND_LICENSE
    default: "Apache License 2.0"
  - name: BRAND_REPO_URL
    default: "https://github.com/thekaveh/genai-vanilla"

  - name: COMPOSE_PROFILES
    auto_managed: true
    default: ""
    description: |
      Docker Compose profile activation list. Rebuilt from scratch on every
      ./start.sh run from the active STT/TTS/doc-processor sources
      (speaches-cpu/-gpu, parakeet-gpu, chatterbox-gpu, docling-gpu/doc-gpu).
      Do not edit by hand — the bootstrapper owns this value.

  # GPU + production-tuning vars — system-wide knobs not owned by any one
  # service. NVIDIA_VISIBLE_DEVICES is read by every GPU-aware container
  # (parakeet, speaches, chatterbox, docling). PROD_ENV_* are deploy.resources
  # caps consumed by backend, comfyui, n8n fragment blocks.
  - name: NVIDIA_VISIBLE_DEVICES
    default: all
    description: "Host-side GPU visibility. Forwarded into every NVIDIA-runtime container."
  - name: PROD_ENV_CPUS
    default: 2
    description: "Default container CPU cap (cores). Per-service overrides below."
  - name: PROD_ENV_MEM_LIMIT
    default: 8g
  - name: PROD_ENV_BACKEND_CPUS
    default: 1
  - name: PROD_ENV_BACKEND_MEM_LIMIT
    default: 2g
  - name: PROD_ENV_N8N_CPUS
    default: 1
  - name: PROD_ENV_N8N_MEM_LIMIT
    default: 2g
  - name: PROD_ENV_COMFYUI_CPUS
    default: 2
  - name: PROD_ENV_COMFYUI_MEM_LIMIT
    default: 4g

  # Migration sentinels
  - name: BOOTSTRAPPER_PORT_LAYOUT_VERSION
    default: 3
    auto_managed: false
    description: "Sentinel updated by bootstrapper/services/migrations. Missing or <N triggers the chained env migrations up to N (v1 port-layout, v2 URL>PORT, v3 COMFYUI model-set). Fresh .env files are already v3-shaped."

depends_on:
  required: []
  optional: []

exports: []

rows: []

# ─────────────────────────────────────────────────────────
# Bootstrapper runtime data (migrated from the legacy
# bootstrapper/service-configs.yml). Slice owned by this
# manifest — stack-wide dependency tiers (data → init → core → app).
# Synthesized into the runtime dict by
# bootstrapper/services/sc_synthesizer.py.
# ─────────────────────────────────────────────────────────
runtime_dependency_tiers:
  data_tier:
  - supabase-db
  - redis
  - neo4j-graph-db
  init_tier:
  - supabase-db-init
  - llm-catalog-init
  - litellm-init
  - ollama-pull
  - comfyui-init
  - weaviate-init
  - n8n-init
  core_services:
  - supabase-meta
  - supabase-storage
  - supabase-auth
  - supabase-api
  - supabase-realtime
  - litellm
  - ollama
  - comfyui
  - parakeet-gpu
  - speaches
  - chatterbox
  - docling-gpu
  - weaviate
  - multi2vec-clip
  - searxng
  - n8n
  - n8n-worker
  - openclaw-gateway
  - hermes
  app_tier:
  - kong-api-gateway
  - supabase-studio
  - local-deep-researcher
  - open-web-ui
  - backend
  - jupyterhub
