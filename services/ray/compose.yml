# services/ray/compose.yml — Ray distributed-compute cluster (head + workers)
services:
  ray-head:
    image: ${RAY_IMAGE:-rayproject/ray:2.55.1}
    container_name: ${PROJECT_NAME}-ray-head
    hostname: ray-head
    restart: unless-stopped
    deploy:
      replicas: ${RAY_HEAD_SCALE:-0}
    shm_size: 4gb
    command:
      - bash
      - -c
      - |
        ray start --head \
          --dashboard-host 0.0.0.0 \
          --port 6379 \
          --ray-client-server-port 10001 \
          --dashboard-port 8265 \
          --block
    ports:
      - "${RAY_DASHBOARD_PORT}:8265"
      - "${RAY_GCS_PORT}:6379"
      - "${RAY_CLIENT_PORT}:10001"
    volumes:
      - ray-tmp:/tmp/ray
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8265/api/version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - backend-network

  ray-worker:
    image: ${RAY_IMAGE:-rayproject/ray:2.55.1}
    restart: unless-stopped
    deploy:
      replicas: ${RAY_WORKER_SCALE:-0}
    shm_size: 4gb
    command:
      - bash
      - -c
      - |
        ray start --address=ray-head:6379 --block
    depends_on:
      ray-head:
        condition: service_healthy
    volumes:
      - ray-tmp-worker:/tmp/ray
    networks:
      - backend-network

volumes:
  ray-tmp:
    name: ${PROJECT_NAME}-ray-tmp
    driver: local
  ray-tmp-worker:
    name: ${PROJECT_NAME}-ray-tmp-worker
    driver: local
