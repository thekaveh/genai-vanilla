# services/ray/compose.yml — Ray distributed-compute cluster (head + workers)
services:
  ray-head:
    image: ${RAY_IMAGE:-rayproject/ray:2.55.1}
    container_name: ${PROJECT_NAME}-ray-head
    hostname: ray-head
    restart: unless-stopped
    deploy:
      replicas: ${RAY_HEAD_SCALE:-0}
    # Ray's object store uses /dev/shm. Default Docker Desktop allocates 64MB;
    # 4GB triggered Ray's "/dev/shm too small, falling back to /tmp/ray" warning
    # on every launch. 8GB satisfies Ray's recommended >30% RAM threshold for
    # most workloads without hard-reserving excessive shared memory.
    shm_size: 8gb
    command:
      - bash
      - -c
      - |
        ray start --head \
          --dashboard-host 0.0.0.0 \
          --port 6379 \
          --ray-client-server-port 10001 \
          --dashboard-port 8265 \
          --block
    ports:
      - "${HOST_BIND_IP:-}${RAY_DASHBOARD_PORT}:8265"
      - "${HOST_BIND_IP:-}${RAY_GCS_PORT}:6379"
      - "${HOST_BIND_IP:-}${RAY_CLIENT_PORT}:10001"
    # No /tmp/ray volume — the rayproject/ray image runs as user ``ray``
    # (UID 1000), but a named Docker volume gets initialized as
    # root:root because the image doesn't pre-create /tmp/ray. The
    # mount would then make /tmp/ray unwritable by ``ray`` and Ray
    # would crash at startup with EACCES on its session dir. Ray's
    # session state is intentionally per-run (re-created on every
    # ``ray start``), so letting it live in the container's writable
    # layer is correct — matches the upstream Ray Docker examples.
    healthcheck:
      # rayproject/ray:2.55.1 ships wget but not curl — use wget so the
      # probe actually succeeds. A curl-based probe silently fails
      # ("command not found"), keeps ray-head unhealthy forever, and
      # blocks every dependent (ray-worker, backend, …) from starting.
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8265/api/version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - backend-network

  ray-worker:
    image: ${RAY_IMAGE:-rayproject/ray:2.55.1}
    restart: unless-stopped
    deploy:
      replicas: ${RAY_WORKER_SCALE:-0}
    # Ray's object store uses /dev/shm. Default Docker Desktop allocates 64MB;
    # 4GB triggered Ray's "/dev/shm too small, falling back to /tmp/ray" warning
    # on every launch. 8GB satisfies Ray's recommended >30% RAM threshold for
    # most workloads without hard-reserving excessive shared memory.
    shm_size: 8gb
    command:
      - bash
      - -c
      - |
        ray start --address=ray-head:6379 --block
    depends_on:
      ray-head:
        condition: service_healthy
    # No /tmp/ray volume — same reasoning as ray-head above (image runs
    # as UID 1000, named volumes default to root:root, Ray needs to
    # write its session dir on every start).
    networks:
      - backend-network
