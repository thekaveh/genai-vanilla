# services/n8n/service.yml — n8n + worker + init
name: n8n
label: "n8n (workflow automation)"
category: agents
docs: services/n8n/README.md

containers:
  - n8n
  - n8n-worker
  - n8n-init

images:
  - var: N8N_IMAGE
    default: "n8nio/n8n:latest"
    container: n8n
  - var: N8N_INIT_IMAGE
    default: "alpine:latest"
    container: n8n-init

sources:
  var: N8N_SOURCE
  default: container
  options:
    - id: container
      label: "Container"
    - id: disabled
      label: "Disabled"

env:
  - name: N8N_SOURCE
    default: container
  - name: N8N_PORT
    # default removed — computed by services/topology.py slot allocator
  - name: N8N_ENCRYPTION_KEY
    default: "your-random-encryption-key"
    secret: true
  - name: N8N_API_KEY
    default: ""
    secret: true
    description: "n8n public-API key (n8n CE issues these only via the UI: Settings → n8n API). Consumed by the backend's /workflows endpoints; while empty those endpoints return 502/401."
  - name: N8N_AUTH_ENABLED
    default: true
  - name: N8N_HOST
    default: "n8n.localhost"
  - name: N8N_PROTOCOL
    default: http
  - name: N8N_EXECUTIONS_MODE
    default: queue
  - name: N8N_COMMUNITY_PACKAGES_ENABLED
    default: true
  - name: N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE
    default: true
  - name: N8N_INIT_SOURCE
    default: container
  - name: N8N_INIT_NODES
    default: "n8n-nodes-comfyui,@ksc1234/n8n-nodes-comfyui-image-to-image,n8n-nodes-mcp"
  # TZ is intentionally NOT declared here. main's .env.example doesn't expose
  # it; n8n's compose has `GENERIC_TIMEZONE: ${TZ:-UTC}` which falls back to
  # UTC when TZ is unset. Declaring TZ on the manifest would force a value
  # into .env.example that doesn't match main's UX (which treats it as an
  # OS-environment passthrough only).
  - name: N8N_SCALE
    auto_managed: true
  - name: N8N_WORKER_SCALE
    auto_managed: true
  - name: N8N_INIT_SCALE
    auto_managed: true

depends_on:
  required:
    - supabase
    - redis
    - litellm
  optional: []

rows:
  - display_name: "n8n"
    source_var: N8N_SOURCE
    port_var: N8N_PORT
    scale_var: N8N_SCALE
    alias: n8n.localhost
    description: "Workflow automation & integrations."

exports: []

# ─────────────────────────────────────────────────────────
# Bootstrapper runtime data (migrated from the legacy
# bootstrapper/service-configs.yml). Slices owned by this
# manifest. Synthesized into the runtime dict by
# bootstrapper/services/sc_synthesizer.py.
# ─────────────────────────────────────────────────────────
runtime_sc:
  n8n:
    container:
      scale: 1
      environment:
        LITELLM_BASE_URL: http://litellm:4000
        LITELLM_API_KEY: ${LITELLM_MASTER_KEY}
        STT_ENDPOINT: ${STT_ENDPOINT}
        TTS_ENDPOINT: ${TTS_ENDPOINT}
        DOCLING_ENDPOINT: ${DOCLING_ENDPOINT}
        N8N_METRICS: 'true'
        N8N_METRICS_PREFIX: 'n8n_'
        N8N_METRICS_INCLUDE_DEFAULT_METRICS: 'true'
        N8N_METRICS_INCLUDE_WORKFLOW_ID_LABEL: 'true'
        N8N_METRICS_INCLUDE_EXECUTION_DATA_METRICS: 'true'
      deploy: {}
      extra_hosts: []
    disabled:
      scale: 0
      environment: {}
      deploy: {}
      extra_hosts: []
  n8n-init:
    container:
      scale: 1
      environment: {}
      deploy: {}
      extra_hosts: []
    disabled:
      scale: 0
      environment: {}
      deploy: {}
      extra_hosts: []

runtime_adaptive:
  n8n:
    adapts_to:
    - stt_provider
    - tts_provider
    - doc_processor
    - lightrag
    - hermes
    environment_adaptation:
      STT_ENDPOINT: ${STT_ENDPOINT}
      TTS_ENDPOINT: ${TTS_ENDPOINT}
      DOCLING_ENDPOINT: ${DOCLING_ENDPOINT}
      LIGHTRAG_ENDPOINT: ${LIGHTRAG_ENDPOINT}
      LIGHTRAG_API_KEY: ${LIGHTRAG_API_KEY}
      # n8n + n8n-worker compose blocks inject these (services/n8n/
      # compose.yml lines ~75-77 / ~138-141). Declaring them here keeps
      # the auto-generated diagram and §N.x dependency tables in sync
      # with the actual runtime wiring; n8n-worker mirrors n8n.
      HERMES_ENDPOINT: ${HERMES_ENDPOINT}
      HERMES_API_KEY: ${HERMES_API_KEY}
    extra_hosts_adaptation: inherit from stt_provider, tts_provider, doc_processor

runtime_deps:
  n8n:
    requires:
    - weaviate
    optional:
    - parakeet
    error_message: 'n8n disabled: requires weaviate for vector operations and AI workflow
      nodes. Enable weaviate (WEAVIATE_SOURCE=container) to use n8n workflows with
      vector capabilities'
    info_message: n8n enabled - will connect to available optional services (parakeet)
  n8n-worker:
    requires:
    - weaviate
    error_message: 'n8n-worker disabled: requires weaviate for vector operations'

data_flow:
  calls:
    - supabase
    # BullMQ queue + session store. n8n runs in EXECUTIONS_MODE=queue
    # with QUEUE_BULL_REDIS_HOST=redis (and n8n-worker mirrors the same
    # block) — a hard runtime call edge, not just an enablement flag.
    - redis
    - weaviate
    # Bundled workflows POST to http://backend:8000 (e.g. /comfyui/generate,
    # langmem-consolidation, research flows) — n8n reaches ComfyUI THROUGH the
    # backend, not directly (n8n<->comfyui is an unwired future pair; see the
    # README Future-pairs note).
    - backend
    - doc-processor
    - hermes
    - litellm
    - stt-provider
    - tts-provider
    - searxng
    - lightrag

