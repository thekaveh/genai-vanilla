# services/n8n/compose.yml — n8n + worker + init
services:
  n8n:
    image: ${N8N_IMAGE}
    container_name: ${PROJECT_NAME}-n8n
    restart: unless-stopped
    depends_on:
      supabase-db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      litellm:
        condition: service_healthy
    deploy:
      replicas: ${N8N_SCALE:-1}
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: supabase-db
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${SUPABASE_DB_NAME}
      DB_POSTGRESDB_USER: ${SUPABASE_DB_USER}
      DB_POSTGRESDB_PASSWORD: ${SUPABASE_DB_PASSWORD}
      DB_POSTGRESDB_SCHEMA: n8n
      DB_SCHEMA: n8n
      N8N_HOST: n8n.localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_PROXY_HOPS: 1
      N8N_PUSH_BACKEND: websocket
      VUE_APP_URL_BASE_API: http://n8n.localhost:${KONG_HTTP_PORT}/
      GENERIC_TIMEZONE: ${TZ:-UTC}
      N8N_EDITOR_BASE_URL: http://n8n.localhost:${KONG_HTTP_PORT}
      N8N_ALLOW_CONNECTIONS_FROM: http://n8n.localhost:${KONG_HTTP_PORT}
      WEBHOOK_URL: http://n8n.localhost:${KONG_HTTP_PORT}/
      NODE_ENV: development
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_AUTH_ENABLED: ${N8N_AUTH_ENABLED:-true}
      N8N_SECURE_COOKIE: false
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: true
      N8N_COMMUNITY_PACKAGES_ENABLED: ${N8N_COMMUNITY_PACKAGES_ENABLED:-true}
      N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE: ${N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE:-true}
      NODE_OPTIONS: --max_old_space_size=512
      EXECUTIONS_MODE: ${N8N_EXECUTIONS_MODE:-queue}
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD}
      QUEUE_BULL_REDIS_DB: 0
      QUEUE_HEALTH_CHECK_ACTIVE: true
      OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS: true
      # LiteLLM gateway — the seeded research workflow's AI-summary node
      # reads $env.LITELLM_BASE_URL / $env.LITELLM_API_KEY (previously
      # undeclared: the node rendered "undefined/v1/chat/completions").
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_API_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_DEFAULT_MODEL: ${LITELLM_DEFAULT_MODEL:-ollama/qwen3.6:latest}
      # STT/TTS/DOC endpoints (available for workflows)
      STT_ENDPOINT: ${STT_ENDPOINT}
      TTS_ENDPOINT: ${TTS_ENDPOINT}
      DOCLING_ENDPOINT: ${DOCLING_ENDPOINT}
      WEAVIATE_URL: ${WEAVIATE_URL:-http://weaviate:8080}
      # Prometheus metrics endpoint — n8n exposes /metrics on its main
      # port (5678) when N8N_METRICS=true. Scraped by the observability
      # bundle's Prometheus when PROMETHEUS_SOURCE=container. The
      # runtime_sc.environment block in services/n8n/service.yml is the
      # source of truth for these defaults; mirror them here so they
      # actually reach the container at startup.
      N8N_METRICS: ${N8N_METRICS:-true}
      N8N_METRICS_PREFIX: ${N8N_METRICS_PREFIX:-n8n_}
      N8N_METRICS_INCLUDE_DEFAULT_METRICS: ${N8N_METRICS_INCLUDE_DEFAULT_METRICS:-true}
      N8N_METRICS_INCLUDE_WORKFLOW_ID_LABEL: ${N8N_METRICS_INCLUDE_WORKFLOW_ID_LABEL:-true}
      # Default-off upstream; without it the Grafana execution-data panel is permanently "No data".
      N8N_METRICS_INCLUDE_EXECUTION_DATA_METRICS: ${N8N_METRICS_INCLUDE_EXECUTION_DATA_METRICS:-true}
      # Hermes Agent — direct path (LiteLLM-routed model is at
      # `hermes-agent`; direct route bypasses the gateway for webhook/dashboard).
      HERMES_ENDPOINT: ${HERMES_ENDPOINT:-}
      HERMES_API_KEY: ${HERMES_API_KEY:-}
      # LightRAG — graph-augmented RAG endpoint (empty when LIGHTRAG_SOURCE=disabled)
      LIGHTRAG_ENDPOINT: ${LIGHTRAG_ENDPOINT:-}
      LIGHTRAG_API_KEY: ${LIGHTRAG_API_KEY:-}
    ports:
      - "${HOST_BIND_IP:-}${N8N_PORT}:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - backend-network
    # Gating ``n8n-worker`` on this healthcheck serialises the TypeORM
    # migrations. Without it, n8n and n8n-worker start together, both
    # try to run ``CreateWorkflowHistoryTable*`` (and friends) against
    # the shared ``n8n`` schema, and one loses on
    # ``pg_type_typname_nsp_index`` (duplicate enum type). n8n then
    # restarts and recovers, but the boot logs scream errors. The
    # ``/healthz`` endpoint returns 200 as soon as n8n's own migration
    # phase finishes — exactly the right gate.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5678/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s
    logging:
      driver: json-file
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILE:-3}"

  n8n-worker:
    image: ${N8N_IMAGE}
    container_name: ${PROJECT_NAME}-n8n-worker
    command: worker
    restart: unless-stopped
    depends_on:
      supabase-db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      litellm:
        condition: service_healthy
      # Wait for n8n's main process to finish its TypeORM migrations
      # before the worker starts running them concurrently. Without
      # this gate, both containers attempt schema migrations against
      # the same n8n schema and one loses on a duplicate-type race
      # (see the n8n service healthcheck comment).
      n8n:
        condition: service_healthy
    deploy:
      replicas: ${N8N_WORKER_SCALE:-1}
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: supabase-db
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${SUPABASE_DB_NAME}
      DB_POSTGRESDB_USER: ${SUPABASE_DB_USER}
      DB_POSTGRESDB_PASSWORD: ${SUPABASE_DB_PASSWORD}
      DB_POSTGRESDB_SCHEMA: n8n
      DB_SCHEMA: n8n
      NODE_ENV: development
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      EXECUTIONS_MODE: ${N8N_EXECUTIONS_MODE:-queue}
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD}
      QUEUE_BULL_REDIS_DB: 0
      QUEUE_HEALTH_CHECK_ACTIVE: true
      # Queue mode means execution-data writes happen HERE, not on the
      # main container — the worker-server serves /metrics when these are
      # set (scraped as the n8n-worker prometheus job).
      N8N_METRICS: ${N8N_METRICS:-true}
      N8N_METRICS_PREFIX: ${N8N_METRICS_PREFIX:-n8n_}
      N8N_METRICS_INCLUDE_DEFAULT_METRICS: ${N8N_METRICS_INCLUDE_DEFAULT_METRICS:-true}
      N8N_METRICS_INCLUDE_WORKFLOW_ID_LABEL: ${N8N_METRICS_INCLUDE_WORKFLOW_ID_LABEL:-true}
      N8N_METRICS_INCLUDE_EXECUTION_DATA_METRICS: ${N8N_METRICS_INCLUDE_EXECUTION_DATA_METRICS:-true}
      # Queue mode runs ALL executions on this worker (the stack defaults
      # to EXECUTIONS_MODE=queue + OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS),
      # so every workflow-facing var the main container exposes must be
      # mirrored here or $env.* resolves to empty exactly where the
      # workflow actually runs. GENERIC_TIMEZONE likewise (n8n docs:
      # set it on workers too, or Date/Schedule nodes skew).
      GENERIC_TIMEZONE: ${TZ:-UTC}
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_API_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_DEFAULT_MODEL: ${LITELLM_DEFAULT_MODEL:-ollama/qwen3.6:latest}
      STT_ENDPOINT: ${STT_ENDPOINT}
      TTS_ENDPOINT: ${TTS_ENDPOINT}
      DOCLING_ENDPOINT: ${DOCLING_ENDPOINT}
      WEAVIATE_URL: ${WEAVIATE_URL:-http://weaviate:8080}
      HERMES_ENDPOINT: ${HERMES_ENDPOINT:-}
      HERMES_API_KEY: ${HERMES_API_KEY:-}
      LIGHTRAG_ENDPOINT: ${LIGHTRAG_ENDPOINT:-}
      LIGHTRAG_API_KEY: ${LIGHTRAG_API_KEY:-}
    volumes:
      - n8n-data:/home/node/.n8n
    logging:
      driver: json-file
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILE:-3}"
    networks:
      - backend-network

  n8n-init:
    image: ${N8N_INIT_IMAGE:-alpine:3.24.1}
    container_name: ${PROJECT_NAME}-n8n-init
    restart: "no"
    depends_on:
      n8n:
        condition: service_started
      litellm:
        condition: service_healthy
    deploy:
      replicas: ${N8N_INIT_SCALE:-1}
    environment:
      N8N_HOST: n8n
      N8N_PORT: 5678
      N8N_INIT_NODES: ${N8N_INIT_NODES:-n8n-nodes-comfyui,@ksc1234/n8n-nodes-comfyui-image-to-image,n8n-nodes-mcp}
    volumes:
      - ./init/scripts:/scripts
      - ./init/config:/config
      - n8n-data:/n8n-data
    networks:
      - backend-network
    entrypoint: ["/scripts/init-n8n.sh"]

volumes:
  n8n-data:
    name: ${PROJECT_NAME}-n8n-data
    driver: local
