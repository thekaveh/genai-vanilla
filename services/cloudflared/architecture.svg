<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 222" font-family="'JetBrains Mono', 'Fira Code', Menlo, Consolas, monospace">
<defs>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <marker id="arrowhead" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
    <polygon points="0 0, 9 3, 0 6" fill="#64748b"/>
  </marker>
  <filter id="focus-glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
    <feFlood flood-color="#fb7185" flood-opacity="0.6"/>
    <feComposite in2="SourceAlpha" operator="in"/>
    <feMerge>
      <feMergeNode/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>
<rect width="920" height="222" fill="#020617"/>
<rect width="920" height="222" fill="url(#grid)"/>
<text x="180" y="36" fill="#94a3b8" font-size="10" font-weight="600" text-anchor="middle" letter-spacing="0.08em">Upstream (calls)</text>
<text x="460" y="36" fill="#94a3b8" font-size="10" font-weight="600" text-anchor="middle" letter-spacing="0.08em">Focus</text>
<text x="740" y="36" fill="#94a3b8" font-size="10" font-weight="600" text-anchor="middle" letter-spacing="0.08em">Downstream (consumers)</text>
<line x1="300" y1="80" x2="360" y2="119" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
<g>
