# services/tts-provider/service.yml — virtual manifest owning TTS_PROVIDER_SOURCE
#
# TTS is engine-agnostic post-XTTS-retirement. The actual engines are
# `services/speaches/` (CPU+GPU, unified with STT) and
# `services/chatterbox/` (GPU, voice-cloning). This virtual manifest is
# the single source-of-truth for which engine is active.
#
# Parallel to how parakeet owns STT_PROVIDER_SOURCE — except here TTS has
# no "primary" engine, so the source toggle lives on a virtual manifest
# rather than on any one container.
name: tts-provider
label: "TTS provider (text-to-speech engine selector)"
category: media
docs: services/tts-provider/README.md
virtual: true
containers: []

sources:
  var: TTS_PROVIDER_SOURCE
  default: speaches-container-cpu
  options:
    - id: speaches-container-cpu
      label: "Speaches (CPU, unified TTS + STT)"
    - id: speaches-container-gpu
      label: "Speaches (GPU, NVIDIA)"
    - id: chatterbox-container-gpu
      label: "Chatterbox (GPU, voice cloning)"
    - id: chatterbox-localhost
      label: "Chatterbox (host install)"
      profiles: [default]
    - id: disabled
      label: "Disabled"

env:
  - name: TTS_PROVIDER_SOURCE
    default: speaches-container-cpu
  - name: TTS_PROVIDER_PORT
    # default removed — computed by services/topology.py slot allocator
    description: "Wizard display slot. Real engine port lives on its own container manifest."
  - name: TTS_PROVIDER_SCALE
    auto_managed: true
    description: "Aggregate scale across all TTS engines. Reserved for future use."
  - name: TTS_ENDPOINT
    auto_managed: true
    description: "Resolved per TTS_PROVIDER_SOURCE. Consumed by n8n, backend, jupyterhub, open-webui, hermes-init (as TTS_INTERNAL_URL — owned by services/hermes/)."
  # OPEN_WEB_UI_TTS_MODEL / OPEN_WEB_UI_TTS_VOICE — moved to services/open-webui/ (Tier 2.G4).
  # Only Open WebUI reads them; they belong in its manifest, not here.

depends_on:
  required:
    - litellm
  optional: []

exports: []

rows:
  - display_name: "TTS Provider"
    source_var: TTS_PROVIDER_SOURCE
    port_var: TTS_PROVIDER_PORT
    scale_var: TTS_PROVIDER_SCALE
    alias: tts.localhost
    description: "Text-to-speech synthesis."
    localhost_endpoint_var: TTS_ENDPOINT
    localhost_port_var: CHATTERBOX_LOCALHOST_PORT

# ─────────────────────────────────────────────────────────
# Bootstrapper runtime data (migrated from the legacy
# bootstrapper/service-configs.yml). Slices owned by this
# manifest. Synthesized into the runtime dict by
# bootstrapper/services/sc_synthesizer.py.
# ─────────────────────────────────────────────────────────
runtime_sc:
  tts_provider:
    speaches-container-cpu:
      scale: 1
      environment:
        TTS_ENDPOINT: http://speaches:8000
      deploy: {}
      extra_hosts: []
    speaches-container-gpu:
      scale: 1
      environment:
        TTS_ENDPOINT: http://speaches:8000
      deploy:
        resources:
          reservations:
            devices:
            - driver: nvidia
              count: 1
              capabilities:
              - gpu
      extra_hosts: []
    chatterbox-container-gpu:
      scale: 1
      environment:
        TTS_ENDPOINT: http://chatterbox:4123
      deploy:
        resources:
          reservations:
            devices:
            - driver: nvidia
              count: 1
              capabilities:
              - gpu
      extra_hosts: []
    chatterbox-localhost:
      scale: 0
      environment:
        TTS_ENDPOINT: http://host.docker.internal:${CHATTERBOX_LOCALHOST_PORT:-63044}
      deploy: {}
      extra_hosts:
      - host.docker.internal:host-gateway
    disabled:
      scale: 0
      environment:
        TTS_ENDPOINT: ''
      deploy: {}
      extra_hosts: []

data_flow:
  calls: []

