# services/comfyui/service.yml — ComfyUI image generation + init
name: comfyui
label: "ComfyUI (image generation)"
category: media
docs: services/comfyui/README.md

containers:
  - comfyui
  - comfyui-init
  - comfyui-catalog-init

images:
  - var: COMFYUI_IMAGE
    default: "ghcr.io/ai-dock/comfyui:v2-cpu-22.04-v0.2.7"
    container: comfyui
    notes: "Use latest-cuda for GPU."
  - var: COMFYUI_INIT_IMAGE
    default: "alpine:latest"
    container: comfyui-init

sources:
  var: COMFYUI_SOURCE
  default: container-cpu
  options:
    - id: container-cpu
      label: "Container (CPU)"
    - id: container-gpu
      label: "Container (GPU, NVIDIA)"
    - id: localhost
      label: "Host (existing ComfyUI on this machine)"
    - id: external
      label: "External (custom URL)"
      requires: [COMFYUI_EXTERNAL_URL]
    - id: disabled
      label: "Disabled"

env:
  - name: COMFYUI_SOURCE
    default: container-cpu
  - name: COMFYUI_INIT_SOURCE
    default: container
  - name: COMFYUI_PORT
    # default removed — computed by services/topology.py slot allocator
  - name: COMFYUI_LOCALHOST_PORT
    default: "8000"
    description: "Host port for the localhost source variant. URL is derived at compose-render time as http://host.docker.internal:8000."
  - name: COMFYUI_EXTERNAL_URL
    default: ""
  - name: COMFYUI_BASE_URL
    default: "http://comfyui:18188"
    description: "In-container default. Runtime value is COMFYUI_ENDPOINT computed by hook."
  - name: COMFYUI_KONG_URL
    default: "http://kong-api-gateway:8000/comfyui"
  - name: COMFYUI_ARGS
    default: "--listen"
  - name: COMFYUI_AUTO_UPDATE
    default: false
  - name: COMFYUI_PLATFORM
    default: "linux/amd64"
  - name: COMFYUI_UPLOAD_TO_SUPABASE
    default: true
  - name: COMFYUI_STORAGE_BUCKET
    default: "comfyui-images"
  - name: COMFYUI_MODELS_PATH
    default: "/opt/ComfyUI/models"
  - name: COMFYUI_OUTPUT_PATH
    default: "/opt/ComfyUI/output"
  - name: COMFYUI_INPUT_PATH
    default: "/opt/ComfyUI/input"
  - name: COMFYUI_CUSTOM_NODES_PATH
    default: "/opt/ComfyUI/custom_nodes"
  - name: COMFYUI_LOCAL_MODELS_PATH
    default: "~/Documents/ComfyUI/models"
  - name: COMFYUI_USER_MODELS
    default: ""
    description: "Comma-separated catalog model names the user picked in the wizard (or via --comfyui-models). Read by services/comfyui/init/scripts/download_models.sh."
  - name: COMFYUI_CUSTOM_MODELS_FILE
    default: "/custom-models.yaml"
    description: "Path inside comfyui-catalog-init to the sidecar custom-models.yaml. Default points at the bind-mounted services/comfyui/custom-models.yaml."
  - name: COMFYUI_INIT_SCALE
    auto_managed: true
  - name: COMFYUI_CATALOG_INIT_SCALE
    auto_managed: true
    description: "Scale for the comfyui-catalog-init container that UPSERTs public.comfyui_models. Follows COMFYUI_INIT_SCALE (0 when ComfyUI is disabled)."
  - name: COMFYUI_SCALE
    auto_managed: true
  - name: COMFYUI_ENDPOINT
    auto_managed: true
    description: "Resolved per COMFYUI_SOURCE. Consumed by backend, open-webui, n8n, jupyterhub."
  - name: COMFYUI_DEPLOY_RESOURCES
    default: "~"
  - name: IS_LOCAL_COMFYUI
    auto_managed: true
    description: "True when COMFYUI_SOURCE=localhost."


depends_on:
  # ComfyUI's real compose gates are supabase-db-init + ollama-pull (i.e.
  # supabase + ollama). The `litellm` entry is retained as part of the
  # canonical-order backbone (see ollama/parakeet for the same
  # convention) — ComfyUI does not call LiteLLM at startup, but listing
  # litellm here pins ComfyUI's row position relative to the LLM block.
  required:
    - supabase
    - litellm
    - ollama
  optional: []

exports: []

rows:
  - display_name: "ComfyUI"
    source_var: COMFYUI_SOURCE
    port_var: COMFYUI_PORT
    scale_var: COMFYUI_SCALE
    alias: comfyui.localhost
    description: "AI image generation & workflows."
    localhost_endpoint_var: COMFYUI_ENDPOINT
    localhost_port_var: COMFYUI_LOCALHOST_PORT

# ─────────────────────────────────────────────────────────
# Bootstrapper runtime data (migrated from the legacy
# bootstrapper/service-configs.yml). Slices owned by this
# manifest. Synthesized into the runtime dict by
# bootstrapper/services/sc_synthesizer.py.
# ─────────────────────────────────────────────────────────
runtime_sc:
  comfyui:
    container-cpu:
      scale: 1
      environment:
        COMFYUI_ARGS: --listen --cpu
        COMFYUI_ENDPOINT: http://comfyui:18188
        AUTO_UPDATE: 'false'
        WEB_ENABLE_AUTH: 'false'
        ENABLE_QUICKTUNNEL: 'false'
        SERVERLESS: 'false'
        IS_LOCAL_COMFYUI: 'false'
        COMFYUI_LOCAL_MODELS_PATH: ./empty
      deploy: {}
      extra_hosts: []
    container-gpu:
      scale: 1
      environment:
        COMFYUI_ARGS: --listen --force-fp16
        COMFYUI_ENDPOINT: http://comfyui:18188
        AUTO_UPDATE: 'true'
        NVIDIA_VISIBLE_DEVICES: all
        NVIDIA_DRIVER_CAPABILITIES: compute,utility
        WEB_ENABLE_AUTH: 'false'
        ENABLE_QUICKTUNNEL: 'false'
        SERVERLESS: 'false'
        IS_LOCAL_COMFYUI: 'false'
        COMFYUI_LOCAL_MODELS_PATH: ./empty
      deploy:
        resources:
          reservations:
            devices:
            - driver: nvidia
              count: 1
              capabilities:
              - gpu
          limits:
            cpus: ${PROD_ENV_COMFYUI_CPUS:-2}
            memory: ${PROD_ENV_COMFYUI_MEM_LIMIT:-4g}
      extra_hosts: []
    localhost:
      scale: 0
      environment:
        COMFYUI_ENDPOINT: http://host.docker.internal:${COMFYUI_LOCALHOST_PORT:-8000}
        IS_LOCAL_COMFYUI: 'true'
        COMFYUI_LOCAL_MODELS_PATH: ${COMFYUI_LOCAL_MODELS_PATH:-~/Documents/ComfyUI/models}
      deploy: {}
      extra_hosts:
      - host.docker.internal:host-gateway
    external:
      scale: 0
      environment:
        COMFYUI_ENDPOINT: http://external.comfyui.provider.com
      deploy: {}
      extra_hosts: []
    disabled:
      scale: 0
      environment:
        COMFYUI_ENDPOINT: http://comfyui:18188
        IS_LOCAL_COMFYUI: 'false'
      deploy: {}
      extra_hosts: []
  comfyui-init:
    container:
      scale: 1
      environment: {}
      deploy: {}
      extra_hosts: []
    disabled:
      scale: 0
      environment: {}
      deploy: {}
      extra_hosts: []
  comfyui-catalog-init:
    container:
      scale: 1
      environment: {}
      deploy: {}
      extra_hosts: []
    disabled:
      scale: 0
      environment: {}
      deploy: {}
      extra_hosts: []

runtime_adaptive:
  comfyui-init:
    adapts_to: comfyui
    environment_adaptation:
      COMFYUI_HOST_URL: ${COMFYUI_ENDPOINT}
    extra_hosts_adaptation: inherit from comfyui

data_flow:
  calls:
    - litellm

