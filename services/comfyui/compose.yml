# services/comfyui/compose.yml — ComfyUI + init pipeline
services:
  comfyui-init:
    image: ${COMFYUI_INIT_IMAGE}
    container_name: ${PROJECT_NAME}-comfyui-init
    restart: "no"
    depends_on:
      ollama-pull:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:${HOST_GATEWAY_IP}"
    environment:
      COMFYUI_MODELS_PATH: /models
      # Path to the bootstrapper-generated active-models TSV
      # (volumes/comfyui/active-models.tsv → bind-mounted at /comfyui-manifest).
      # download_models.sh reads this instead of the former public.comfyui_models DB query.
      COMFYUI_MANIFEST_TSV: /comfyui-manifest/active-models.tsv
    volumes:
      - ./init/scripts:/scripts
      - comfyui-models:/models
      # Bootstrapper-generated manifest dir (written at start by
      # bootstrapper/utils/comfyui_manifest_generator.py via comfyui_resolver).
      # Contains selected-models.yaml (canonical SoT) and active-models.tsv
      # (shell-consumable TSV for download_models.sh).
      - ../../volumes/comfyui:/comfyui-manifest:ro
    entrypoint: ["/scripts/download_models.sh"]
    deploy:
      replicas: ${COMFYUI_INIT_SCALE:-1}
    networks:
      - backend-network

  comfyui:
    image: ${COMFYUI_IMAGE}
    platform: ${COMFYUI_PLATFORM:-linux/amd64}
    container_name: ${PROJECT_NAME}-comfyui
    restart: unless-stopped
    # NOTE: comfyui does NOT depend_on comfyui-init here — the
    # bootstrapper's byte-equivalence test (tests/test_fragment_equivalence.py)
    # locks this fragment to the pre-refactor monolithic shape. ComfyUI
    # tolerates an empty /opt/ComfyUI/models on first boot (it serves the
    # UI but workflows fail until models arrive), and the model-staging
    # init runs in parallel anyway. Adding the gate is a real improvement
    # but belongs in a separate ticket that intentionally rebaselines
    # the equivalence fixture — see audit finding M-4.
    depends_on:
      supabase-db-init:
        condition: service_completed_successfully
      supabase-storage:
        condition: service_started
      redis:
        condition: service_started
    environment:
      - COMFYUI_ARGS=${COMFYUI_ARGS:---listen --cpu}
      - AUTO_UPDATE=${COMFYUI_AUTO_UPDATE:-false}
      - COMFYUI_PORT_HOST=8188
      - WEB_ENABLE_AUTH=false
      - ENABLE_QUICKTUNNEL=false
      - SERVERLESS=false
      - DISABLE_NATPMP=1
      - SUPABASE_URL=${COMFYUI_KONG_URL:-http://kong-api-gateway:8000}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_STORAGE_BUCKET=${COMFYUI_STORAGE_BUCKET:-comfyui-images}
      - COMFYUI_UPLOAD_TO_SUPABASE=${COMFYUI_UPLOAD_TO_SUPABASE:-true}
    ports:
      - "${HOST_BIND_IP:-}${COMFYUI_PORT}:18188"
    volumes:
      - comfyui-models:/opt/ComfyUI/models
      - comfyui-output:/opt/ComfyUI/output
      - comfyui-input:/opt/ComfyUI/input
      - comfyui-custom-nodes:/opt/ComfyUI/custom_nodes
      - ${COMFYUI_LOCAL_MODELS_PATH:-./empty}:/host_models
    deploy:
      replicas: ${COMFYUI_SCALE:-1}
      resources:
        limits:
          memory: ${COMFYUI_MEMORY_LIMIT:-4g}
          cpus: "${COMFYUI_CPU_LIMIT:-2.0}"
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18188/system_stats"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILE:-3}"
    labels:
      - "com.${PROJECT_NAME}.service=image-generation"
      - "com.${PROJECT_NAME}.category=ai"
      - "com.${PROJECT_NAME}.dependencies=litellm,supabase-storage"

volumes:
  comfyui-models:
    name: ${PROJECT_NAME}-comfyui-models
    driver: local
  comfyui-output:
    name: ${PROJECT_NAME}-comfyui-output
    driver: local
  comfyui-input:
    name: ${PROJECT_NAME}-comfyui-input
    driver: local
  comfyui-custom-nodes:
    name: ${PROJECT_NAME}-comfyui-custom-nodes
    driver: local
