# services/speaches/compose.yml — Speaches (unified TTS + STT)
services:
  speaches:
    profiles:
      - speaches-cpu
      - speaches-gpu
      - tts-cpu
      - tts-gpu
      - stt-cpu
      - stt-gpu
    image: ${SPEACHES_IMAGE:-ghcr.io/speaches-ai/speaches:0.9.0-rc.3-cpu}
    container_name: ${PROJECT_NAME}-speaches
    restart: unless-stopped
    deploy:
      replicas: ${SPEACHES_SCALE:-0}
    environment:
      # ⚠ Speaches does NOT auto-download models. Verified against
      # speaches-ai/speaches @ v0.9.0-rc.3: the /v1/audio/* handlers resolve
      # the requested model via cache-only lookups (get_model_card_data_or_raise
      # → scan_cache_dir) and raise HTTP 404 "Model is not installed locally"
      # when it is absent — "lazy-load" loads an already-DOWNLOADED model into
      # memory, it never fetches one. So with PRELOAD_MODELS='[]' and an empty
      # cache volume, every STT/TTS request 404s out of the box.
      #
      # To make STT/TTS work, preload the models. PRELOAD_MODELS is typed
      # ``list[str]`` on the upstream Config and decoded via ``json.loads``, so
      # it MUST be a JSON array literal (a bare CSV blows up at boot with
      # ``JSONDecodeError``). Entries are HuggingFace repo ids that satisfy the
      # executor filters — for Kokoro TTS that means the ONNX build
      # ``speaches-ai/Kokoro-82M-v1.0-ONNX`` (the PyTorch ``hexgrad/Kokoro-82M``
      # fails the onnx+{speaches,kokoro}-tags filter), e.g.
      #   PRELOAD_MODELS: '["speaches-ai/Kokoro-82M-v1.0-ONNX","Systran/faster-whisper-large-v3"]'
      # Note: preload downloads block startup and Speaches exits if a model
      # fails — bump start_period and pin valid ids before enabling. Alternative:
      # POST each id to /v1/models after boot. (Shipping a populated default is a
      # pending decision — see the README; it changes boot time + image size.)
      PRELOAD_MODELS: '[]'
      HF_TOKEN: ${HUGGING_FACE_HUB_TOKEN}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
    volumes:
      - speaches-cache:/home/ubuntu/.cache/huggingface
    ports:
      - "${HOST_BIND_IP:-}${SPEACHES_PORT:-63046}:8000"
    networks:
      - backend-network
    # Healthcheck mirrors upstream's own compose.yaml — Speaches ships
    # curl and serves /health that returns 200 as soon as Uvicorn is up
    # (lazy-load means models don't need to be ready). Verified against
    # speaches-ai/speaches @ 0.9.0-rc.3.
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILE:-3}"
    labels:
      - "com.${PROJECT_NAME}.service=speech-tts-stt"
      - "com.${PROJECT_NAME}.category=ai"

volumes:
  speaches-cache:
    name: ${PROJECT_NAME}-speaches-cache
    driver: local
