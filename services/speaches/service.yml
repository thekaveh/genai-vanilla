# services/speaches/service.yml — Speaches (unified TTS + STT, OpenAI-compatible)
#
# One container exposes BOTH /v1/audio/transcriptions (STT, Faster-Whisper)
# AND /v1/audio/speech (TTS, Kokoro + Piper voices). Activation is driven
# externally — by whichever of stt_provider OR tts_provider picks a
# speaches-* option. When both pick it, the bootstrapper dedupes to one
# running container.
#
# This manifest has NO `sources:` block. The activation logic lives in
# `bootstrapper/services/service_config.py::_generate_stt_provider_config`
# and `_generate_tts_provider_config`, which read both
# STT_PROVIDER_SOURCE and TTS_PROVIDER_SOURCE and write SPEACHES_SCALE.
name: speaches
label: "Speaches (unified TTS + STT)"
category: media
docs: docs/services/tts-provider.md

containers:
  - speaches

images:
  - var: SPEACHES_IMAGE
    default: "ghcr.io/speaches-ai/speaches:0.9.0-rc.3-cpu"
    container: speaches
    notes: "CPU build (default). GPU build is SPEACHES_GPU_IMAGE; the speaches-gpu profile selects it."

env:
  - name: SPEACHES_GPU_IMAGE
    default: "ghcr.io/speaches-ai/speaches:0.9.0-rc.3-cuda"
    description: "CUDA build of the same image; not yet wired to image var."
  - name: SPEACHES_TTS_MODEL
    default: "hexgrad/Kokoro-82M"
    description: "Model name Open WebUI sends in /v1/audio/speech requests."
  - name: SPEACHES_STT_MODEL
    default: "Systran/faster-distil-whisper-large-v3"
  - name: SPEACHES_PORT
    # default removed — computed by services/topology.py slot allocator
    description: "Slot +26."
  - name: SPEACHES_SCALE
    auto_managed: true
    description: "Computed by bootstrapper/services/service_config.py::_generate_stt_provider_config (or _generate_tts_provider_config) — set to 1 when STT_PROVIDER_SOURCE OR TTS_PROVIDER_SOURCE picks a speaches-* variant."

depends_on:
  required:
    - parakeet
    - tts-provider
  optional: []

exports: []

rows: []

# No runtime_sc / runtime_adaptive / runtime_deps blocks here — intentional.
# SPEACHES_SCALE is auto-managed by `_generate_stt_provider_config` /
# `_generate_tts_provider_config` in `bootstrapper/services/service_config.py`
# based on STT_PROVIDER_SOURCE / TTS_PROVIDER_SOURCE (speaches is dual-role
# and dedupes when both pick a speaches-* variant). The runtime contract
# lives in the parakeet / tts-provider manifests + the imperative
# source-config code, not in a per-service runtime block.
