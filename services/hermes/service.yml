# services/hermes/service.yml — Hermes (Nous Research AI agent runtime)
#
# Programmable agent that talks to LiteLLM at http://litellm:4000/v1 and
# exposes itself back to LiteLLM as the `hermes-agent` model (registered
# by litellm-init when HERMES_SOURCE != disabled). File-based persistence
# under /opt/data via the hermes-data named volume — no Postgres/Redis
# dependency.
#
# Routes:
#   API:       http://localhost:${HERMES_API_PORT}
#   Dashboard: http://localhost:${HERMES_DASHBOARD_PORT}
#   Kong:      http://hermes.localhost:${KONG_HTTP_PORT}  (after --setup-hosts)
name: hermes
label: "Hermes (programmable AI agent)"
category: agents
docs: docs/services/hermes.md

containers:
  - hermes
  - hermes-init

images:
  - var: HERMES_IMAGE
    default: "nousresearch/hermes-agent:latest"
    container: hermes
  - var: HERMES_INIT_IMAGE
    default: "alpine:latest"
    container: hermes-init

sources:
  var: HERMES_SOURCE
  default: container
  options:
    - id: container
      label: "Container (in-stack Hermes)"
    - id: localhost
      label: "Host (existing Hermes on this machine)"
    - id: disabled
      label: "Disabled"

env:
  - name: HERMES_SOURCE
    default: container
  - name: HERMES_API_PORT
    # default computed by services/topology.py slot allocator
    description: "Host port for the Hermes Agent OpenAI-compatible API (in-container listen port is 8642)."
  - name: HERMES_DASHBOARD_PORT
    # default computed by services/topology.py slot allocator
    description: "Host port for the Hermes Agent web dashboard (in-container listen port is 9119)."
  - name: HERMES_MEMORY_LIMIT
    default: 4g
  - name: HERMES_CPU_LIMIT
    default: "2.0"
  - name: HERMES_API_KEY
    default: ""
    secret: true
    description: "Auto-generated by bootstrapper. Forwarded to LiteLLM via API_SERVER_KEY."
  - name: HERMES_DEFAULT_MODEL
    default: ""
    description: "Empty = hermes-init picks from LiteLLM /v1/models priority list."
  - name: HERMES_CONTEXT_LENGTH
    default: 65536
  - name: HERMES_DASHBOARD_ENABLED
    default: true
  - name: HERMES_DASHBOARD_TUI
    default: 1
    description: "Embed PTY-backed Chat tab in dashboard. 1 = on, 0 = read-only."
  - name: HERMES_UID
    default: 10000
    description: "Container user — match a host UID to read hermes-data from outside."
  - name: HERMES_GID
    default: 10000
  - name: HERMES_LOCALHOST_URL
    default: "http://host.docker.internal:63028"
  - name: HERMES_INIT_SOURCE
    default: container
    description: "Auto-managed by hermes. Container/disabled."
  - name: HERMES_INIT_SCALE
    auto_managed: true
  - name: HERMES_SCALE
    auto_managed: true
  - name: HERMES_ENDPOINT
    auto_managed: true
    description: "Resolved per HERMES_SOURCE. Consumed by openclaw-gateway, LiteLLM model_list."
  # *_INTERNAL_URL — auto-managed by bootstrapper from other services'
  # SOURCE values; hermes-init reads these to render config.yaml with
  # graceful degradation (empty string = skip provider). Owned here
  # because hermes-init is the sole consumer.
  - name: TTS_INTERNAL_URL
    auto_managed: true
  - name: STT_INTERNAL_URL
    auto_managed: true
  - name: COMFYUI_INTERNAL_URL
    auto_managed: true
  - name: SEARXNG_INTERNAL_URL
    auto_managed: true

depends_on:
  required:
    - litellm
  optional: []

rows:
  - display_name: "Hermes Agent"
    source_var: HERMES_SOURCE
    port_var: HERMES_API_PORT
    scale_var: HERMES_SCALE
    alias: hermes.localhost
    description: "Programmable AI agent runtime (Nous Research)."
    localhost_endpoint_var: HERMES_ENDPOINT

exports: []

# ─────────────────────────────────────────────────────────
# Bootstrapper runtime data (migrated from the legacy
# bootstrapper/service-configs.yml). Slices owned by this
# manifest. Synthesized into the runtime dict by
# bootstrapper/services/sc_synthesizer.py.
# ─────────────────────────────────────────────────────────
runtime_sc:
  hermes:
    container:
      scale: 1
      environment:
        HERMES_ENDPOINT: http://hermes:8642
      deploy: {}
      extra_hosts: []
    localhost:
      scale: 0
      environment:
        HERMES_ENDPOINT: ${HERMES_LOCALHOST_URL:-http://host.docker.internal:63028}
      deploy: {}
      extra_hosts:
      - host.docker.internal:host-gateway
    disabled:
      scale: 0
      environment:
        HERMES_ENDPOINT: ''
      deploy: {}
      extra_hosts: []
  hermes-init:
    container:
      scale: 1
      environment: {}
      deploy: {}
      extra_hosts: []
    disabled:
      scale: 0
      environment: {}
      deploy: {}
      extra_hosts: []

runtime_adaptive:
  hermes-init:
    adapts_to:
    - stt_provider
    - tts_provider
    - comfyui
    - searxng
    environment_adaptation:
      TTS_INTERNAL_URL: ${TTS_ENDPOINT}
      STT_INTERNAL_URL: ${STT_ENDPOINT}
      COMFYUI_INTERNAL_URL: ${COMFYUI_ENDPOINT}
      SEARXNG_INTERNAL_URL: http://searxng:8080
    extra_hosts_adaptation: none
  hermes:
    adapts_to:
    - llm_provider
    environment_adaptation:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
    extra_hosts_adaptation: inherit from llm_provider

runtime_deps:
  hermes:
    optional:
    - parakeet
    - speaches
    - chatterbox
    - comfyui
    - searxng
    info_message: Hermes enabled - will wire optional services into /opt/data/config.yaml
      when available (parakeet, speaches, chatterbox, comfyui, searxng)

