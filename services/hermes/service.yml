# services/hermes/service.yml — Hermes (Nous Research AI agent runtime)
#
# Programmable agent that talks to LiteLLM at http://litellm:4000/v1 and
# exposes itself back to LiteLLM as the `hermes-agent` model (registered
# by litellm-init when HERMES_SOURCE != disabled). File-based persistence
# under /opt/data via the hermes-data named volume — no Postgres/Redis
# dependency.
#
# Routes:
#   API:       http://localhost:${HERMES_API_PORT}
#   Dashboard: http://localhost:${HERMES_DASHBOARD_PORT}
#   Kong:      http://hermes.localhost:${KONG_HTTP_PORT}  (after --setup-hosts)
name: hermes
label: "Hermes (programmable AI agent)"
category: ai
docs: docs/services/hermes.md

containers:
  - hermes
  - hermes-init

images:
  - var: HERMES_IMAGE
    default: "nousresearch/hermes-agent:latest"
    container: hermes
  - var: HERMES_INIT_IMAGE
    default: "alpine:latest"
    container: hermes-init

sources:
  var: HERMES_SOURCE
  default: container
  options:
    - id: container
      label: "Container (in-stack Hermes)"
      effects:
        HERMES_SCALE: 1
        HERMES_INIT_SCALE: 1
        HERMES_ENDPOINT: "http://hermes:8642"
    - id: localhost
      label: "Host (existing Hermes on this machine)"
      effects:
        HERMES_SCALE: 0
        HERMES_INIT_SCALE: 0
        HERMES_ENDPOINT: "${HERMES_LOCALHOST_URL}"
    - id: disabled
      label: "Disabled"
      effects:
        HERMES_SCALE: 0
        HERMES_INIT_SCALE: 0
        HERMES_ENDPOINT: ""

env:
  - name: HERMES_SOURCE
    default: container
  - name: HERMES_API_PORT
    default: 63028
    description: "OpenAI-compatible API. Slot +28."
  - name: HERMES_DASHBOARD_PORT
    default: 63029
    description: "Web dashboard. Slot +29."
  - name: HERMES_MEMORY_LIMIT
    default: 4g
  - name: HERMES_CPU_LIMIT
    default: "2.0"
  - name: HERMES_API_KEY
    default: ""
    secret: true
    description: "Auto-generated by bootstrapper. Forwarded to LiteLLM via API_SERVER_KEY."
  - name: HERMES_DEFAULT_MODEL
    default: ""
    description: "Empty = hermes-init picks from LiteLLM /v1/models priority list."
  - name: HERMES_CONTEXT_LENGTH
    default: 65536
  - name: HERMES_DASHBOARD_ENABLED
    default: true
  - name: HERMES_DASHBOARD_TUI
    default: 1
    description: "Embed PTY-backed Chat tab in dashboard. 1 = on, 0 = read-only."
  - name: HERMES_UID
    default: 10000
    description: "Container user — match a host UID to read hermes-data from outside."
  - name: HERMES_GID
    default: 10000
  - name: HERMES_LOCALHOST_URL
    default: "http://host.docker.internal:63028"
  - name: HERMES_INIT_SOURCE
    default: container
    description: "Auto-managed by hermes. Container/disabled."
  - name: HERMES_INIT_SCALE
    auto_managed: true
  - name: HERMES_SCALE
    auto_managed: true
  - name: HERMES_ENDPOINT
    auto_managed: true
    description: "Resolved per HERMES_SOURCE. Consumed by openclaw-gateway, LiteLLM model_list."
  # *_INTERNAL_URL — auto-managed by bootstrapper from other services'
  # SOURCE values; hermes-init reads these to render config.yaml with
  # graceful degradation (empty string = skip provider). Owned here
  # because hermes-init is the sole consumer.
  - name: TTS_INTERNAL_URL
    auto_managed: true
  - name: STT_INTERNAL_URL
    auto_managed: true
  - name: COMFYUI_INTERNAL_URL
    auto_managed: true
  - name: SEARXNG_INTERNAL_URL
    auto_managed: true

depends_on:
  required: []
  optional: []

exports: []
