# services/ollama/service.yml — Ollama local LLM engine + model puller
name: ollama
label: "Ollama (local LLM engine)"
category: llm
docs: services/ollama/README.md

containers:
  - ollama
  - ollama-pull

images:
  - var: LLM_PROVIDER_IMAGE
    default: "ollama/ollama:latest"
    container: ollama
  - var: OLLAMA_PULL_IMAGE
    default: "alpine:latest"
    container: ollama-pull

sources:
  var: LLM_PROVIDER_SOURCE
  default: ollama-container-cpu
  options:
    - id: ollama-container-cpu
      label: "Container (CPU)"
    - id: ollama-container-gpu
      label: "Container (GPU, NVIDIA)"
    - id: ollama-localhost
      label: "Host (existing Ollama on this machine)"
      profiles: [default]
    - id: none
      label: "Disabled (cloud-only)"

env:
  - name: LLM_PROVIDER_SOURCE
    default: ollama-container-cpu
  - name: OLLAMA_USER_MODELS
    default: ""
    description: "Comma-separated Ollama model names to activate/pull. Pre-filled by env_assembler from the catalog's default-active Ollama set (see services/ollama/models.yaml); the wizard overwrites it with the user's selection."
  - name: OLLAMA_CUSTOM_MODELS
    default: ""
    description: "Free-text extra Ollama models pulled in container-* sources."
  - name: OLLAMA_AUTO_IMPORT_LOCAL_MODELS
    default: true
    description: "When LLM_PROVIDER_SOURCE=ollama-localhost, litellm-init queries the upstream's /api/tags and auto-imports every model found, unioning with OLLAMA_USER_MODELS. Set false to keep strict wizard-only control."
  - name: OLLAMA_DEPLOY_RESOURCES
    default: "~"
    description: "Reserved for future GPU deploy block. Currently '~' (null)."
  - name: OLLAMA_SCALE
    auto_managed: true
  - name: OLLAMA_PULL_SCALE
    auto_managed: true
  - name: OLLAMA_NVIDIA_VISIBLE_DEVICES
    auto_managed: true
  - name: OLLAMA_ENDPOINT
    auto_managed: true
  - name: LITELLM_OLLAMA_UPSTREAM
    auto_managed: true
    description: "Ollama URL the LiteLLM gateway forwards Ollama-routed requests to. Owned by ollama because the value flips with LLM_PROVIDER_SOURCE; consumed by litellm-init when rendering its config.yaml."
  - name: OLLAMA_LOCALHOST_PORT
    default: "11434"
    description: "Host port for the ollama-localhost source variant. URL is derived at compose-render time as http://host.docker.internal:11434."

depends_on:
  # `litellm` is listed here NOT because the ollama container calls
  # LiteLLM (the call direction is the opposite), but because the
  # bootstrapper uses `depends_on.required` as the canonical-order
  # backbone for the wizard / overview-box display. Keeping ollama →
  # litellm here pins the rule that the LLM Engine row sits immediately
  # after LiteLLM in the wizard's LLM block (see
  # tests/test_row_order_stability.py). When a separate
  # `display_order:` field is added, this edge moves there.
  # `supabase` is the actual bootstrap blocker (supabase-db-init must
  # complete before ollama-pull can run).
  required:
    - supabase
    - litellm
  optional: []

rows:
  - display_name: "LLM Engine"
    source_var: LLM_PROVIDER_SOURCE
    scale_var: OLLAMA_SCALE
    alias: ollama.localhost
    description: "Local Ollama upstream the LiteLLM gateway forwards to."
    localhost_endpoint_var: LITELLM_OLLAMA_UPSTREAM
    localhost_port_var: OLLAMA_LOCALHOST_PORT

exports: []

# ─────────────────────────────────────────────────────────
# Bootstrapper runtime data (migrated from the legacy
# bootstrapper/service-configs.yml). Slices owned by this
# manifest. Synthesized into the runtime dict by
# bootstrapper/services/sc_synthesizer.py.
# ─────────────────────────────────────────────────────────
runtime_sc:
  llm_provider:
    ollama-container-cpu:
      scale: 1
      environment:
        OLLAMA_ENDPOINT: http://ollama:11434
      deploy: {}
      extra_hosts: []
    ollama-container-gpu:
      scale: 1
      environment:
        OLLAMA_ENDPOINT: http://ollama:11434
        NVIDIA_VISIBLE_DEVICES: all
      deploy:
        resources:
          reservations:
            devices:
            - driver: nvidia
              capabilities:
              - gpu
      extra_hosts: []
    ollama-localhost:
      scale: 0
      environment:
        OLLAMA_ENDPOINT: http://host.docker.internal:${OLLAMA_LOCALHOST_PORT:-11434}
      deploy: {}
      extra_hosts:
      - host.docker.internal:host-gateway
    none:
      scale: 0
      environment:
        OLLAMA_ENDPOINT: ''
      deploy: {}
      extra_hosts: []
  ollama-pull:
    container:
      scale: 1
      environment: {}
      deploy: {}
      extra_hosts: []
    disabled:
      scale: 0
      environment: {}
      deploy: {}
      extra_hosts: []

runtime_adaptive:
  ollama-pull:
    adapts_to: llm_provider
    environment_adaptation:
      OLLAMA_HOST_URL: ${LITELLM_OLLAMA_UPSTREAM}
    extra_hosts_adaptation: inherit from llm_provider

data_flow:
  # Ollama serves /api at runtime; it doesn't initiate outbound calls in
  # the request path. The historical supabase + litellm edges here were
  # init-time bootstrap contacts (ollama-pull reads OLLAMA_USER_MODELS /
  # OLLAMA_CUSTOM_MODELS and warms the Ollama engine), which the schema
  # explicitly excludes — those belong on the ollama-pull init manifest if anywhere.
  calls: []

