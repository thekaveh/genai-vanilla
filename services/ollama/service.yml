# services/ollama/service.yml — Ollama local LLM engine + model puller
name: ollama
label: "Ollama (local LLM engine)"
category: llm
docs: docs/services/ollama.md

containers:
  - ollama
  - ollama-pull

images:
  - var: LLM_PROVIDER_IMAGE
    default: "ollama/ollama:latest"
    container: ollama
  - var: OLLAMA_PULL_IMAGE
    default: "alpine:latest"
    container: ollama-pull

sources:
  var: LLM_PROVIDER_SOURCE
  default: ollama-container-cpu
  options:
    - id: ollama-container-cpu
      label: "Container (CPU)"
    - id: ollama-container-gpu
      label: "Container (GPU, NVIDIA)"
    - id: ollama-localhost
      label: "Host (existing Ollama on this machine)"
    - id: ollama-external
      label: "External (custom URL)"
      requires: [LLM_PROVIDER_EXTERNAL_URL]
    - id: none
      label: "Disabled (cloud-only)"

env:
  - name: LLM_PROVIDER_SOURCE
    default: ollama-container-cpu
  - name: LLM_PROVIDER_EXTERNAL_URL
    default: ""
    description: "Required when LLM_PROVIDER_SOURCE=ollama-external."
  - name: OLLAMA_USER_MODELS
    default: ""
    description: "Comma-separated Ollama model names the wizard activated."
  - name: OLLAMA_CUSTOM_MODELS
    default: ""
    description: "Free-text extra Ollama models pulled in container-* sources."
  - name: OLLAMA_AUTO_IMPORT_LOCAL_MODELS
    default: true
    description: "When LLM_PROVIDER_SOURCE=ollama-localhost or ollama-external, llm-catalog-init queries the upstream's /api/tags and auto-imports every model found, unioning with OLLAMA_USER_MODELS. Set false to keep strict wizard-only control."
  - name: OLLAMA_DEPLOY_RESOURCES
    default: "~"
    description: "Reserved for future GPU deploy block. Currently '~' (null)."
  - name: OLLAMA_SCALE
    auto_managed: true
  - name: OLLAMA_PULL_SCALE
    auto_managed: true
  - name: OLLAMA_NVIDIA_VISIBLE_DEVICES
    auto_managed: true
  - name: OLLAMA_ENDPOINT
    auto_managed: true
  - name: LITELLM_OLLAMA_UPSTREAM
    auto_managed: true
    description: "Ollama URL the LiteLLM gateway forwards Ollama-routed requests to. Owned by ollama because the value flips with LLM_PROVIDER_SOURCE; consumed by litellm-init when rendering its config.yaml."

depends_on:
  required: []
  optional: []

exports: []

# ─────────────────────────────────────────────────────────
# Bootstrapper runtime data (migrated from the legacy
# bootstrapper/service-configs.yml). Slices owned by this
# manifest. Synthesized into the runtime dict by
# bootstrapper/services/sc_synthesizer.py.
# ─────────────────────────────────────────────────────────
runtime_sc:
  llm_provider:
    ollama-container-cpu:
      scale: 1
      environment:
        OLLAMA_ENDPOINT: http://ollama:11434
      deploy: {}
      extra_hosts: []
    ollama-container-gpu:
      scale: 1
      environment:
        OLLAMA_ENDPOINT: http://ollama:11434
        NVIDIA_VISIBLE_DEVICES: all
      deploy:
        resources:
          reservations:
            devices:
            - driver: nvidia
              capabilities:
              - gpu
      extra_hosts: []
    ollama-localhost:
      scale: 0
      environment:
        OLLAMA_ENDPOINT: http://host.docker.internal:11434
      deploy: {}
      extra_hosts:
      - host.docker.internal:host-gateway
    ollama-external:
      scale: 0
      environment:
        OLLAMA_ENDPOINT: ${LLM_PROVIDER_EXTERNAL_URL}
      deploy: {}
      extra_hosts: []
    none:
      scale: 0
      environment:
        OLLAMA_ENDPOINT: ''
      deploy: {}
      extra_hosts: []
  ollama-pull:
    container:
      scale: 1
      environment: {}
      deploy: {}
      extra_hosts: []
    disabled:
      scale: 0
      environment: {}
      deploy: {}
      extra_hosts: []

runtime_adaptive:
  ollama-pull:
    adapts_to: llm_provider
    environment_adaptation:
      OLLAMA_HOST_URL: ${LITELLM_OLLAMA_UPSTREAM}
    extra_hosts_adaptation: inherit from llm_provider

