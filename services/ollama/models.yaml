# services/ollama/models.yaml
# Curated Ollama default catalog (maintainer-editable). Section = role,
# order = priority (first entry = highest priority), default: pre-selected
# in the wizard. The wizard also live-scrapes ollama.com/library for the
# full picker; this file provides the default trio and serves as the
# scrape-failure fallback.
#
# Schema: bootstrapper/schemas/models.schema.json (flat-sections variant).
# Sections: content | embeddings | vision
content:
  - name: qwen3.6:latest
    default: true
    description: "Qwen3.6 multimodal — strong content + vision, default content model"
    badges: [default]
embeddings:
  - name: qwen3-embedding:0.6b
    default: true
    description: "Qwen3 embeddings, 0.6B — top of MTEB multilingual leaderboard"
    badges: [default, embeddings]
  - name: nomic-embed-text
    default: true
    description: "Nomic text embeddings — small, fast"
    badges: [default, embeddings]
vision:
  - name: qwen3.6:latest
