# services/minio/service.yml — MinIO (S3-compatible artifact storage)
#
# Artifact-tier object storage complementing Supabase Storage. Five
# pre-provisioned buckets (comfyui, backend, n8n, jupyter, docling), each
# with its own scoped service-account credential. minio-init runs `mc`
# commands idempotently to create buckets + IAM policies on every start.
name: minio
label: "MinIO (S3-compatible object storage)"
category: data
docs: services/minio/README.md

containers:
  - minio
  - minio-init

images:
  - var: MINIO_IMAGE
    default: "minio/minio:RELEASE.2025-09-07T16-13-09Z"
    container: minio
    notes: "Pinned to latest stable Docker Hub tag. Bump when upstream releases a fixed image post-CVE-2025-XXX."
  - var: MINIO_INIT_IMAGE
    default: "minio/mc:RELEASE.2025-08-13T08-35-41Z"
    container: minio-init

sources:
  var: MINIO_SOURCE
  default: container
  options:
    - id: container
      label: "Container (in-stack MinIO)"
    - id: disabled
      label: "Disabled"

env:
  - name: MINIO_SOURCE
    default: container
  - name: MINIO_PORT
    # default computed by services/topology.py slot allocator
    description: "Host port for the MinIO S3 API (in-container listen port is 9000)."
  - name: MINIO_CONSOLE_PORT
    # default computed by services/topology.py slot allocator
    description: "Host port for the MinIO admin console (in-container listen port is 9001)."
  - name: MINIO_ROOT_USER
    default: minioadmin
  - name: MINIO_ROOT_PASSWORD
    default: ""
    secret: true
    description: "Auto-generated by bootstrapper KeyGenerator.generate_minio_root_password()."
  - name: MINIO_REGION
    default: us-east-1
  - name: MINIO_INIT_SOURCE
    default: container
    description: "Auto-managed by minio. Container/disabled."
  - name: MINIO_SCALE
    auto_managed: true
  - name: MINIO_INIT_SCALE
    auto_managed: true
  - name: MINIO_ENDPOINT
    auto_managed: true
    description: "In-network URL (S3 API)."
  - name: MINIO_PUBLIC_ENDPOINT
    auto_managed: true
    description: "Host-side URL (for browser redirects)."
  - name: MINIO_PUBLIC_CONSOLE_ENDPOINT
    auto_managed: true
  # Per-consumer buckets + scoped service accounts.
  # Each access/secret key is auto-generated by KeyGenerator.generate_minio_access_key()
  # and generate_minio_secret_key(). The bucket NAMES are user-configurable.
  - name: MINIO_BUCKET_COMFYUI
    default: comfyui
  - name: MINIO_COMFYUI_ACCESS_KEY
    default: ""
    secret: true
  - name: MINIO_COMFYUI_SECRET_KEY
    default: ""
    secret: true
  - name: MINIO_BUCKET_BACKEND
    default: backend
  - name: MINIO_BACKEND_ACCESS_KEY
    default: ""
    secret: true
  - name: MINIO_BACKEND_SECRET_KEY
    default: ""
    secret: true
  - name: MINIO_BUCKET_N8N
    default: n8n
  - name: MINIO_N8N_ACCESS_KEY
    default: ""
    secret: true
  - name: MINIO_N8N_SECRET_KEY
    default: ""
    secret: true
  - name: MINIO_BUCKET_JUPYTER
    default: jupyter
  - name: MINIO_JUPYTER_ACCESS_KEY
    default: ""
    secret: true
  - name: MINIO_JUPYTER_SECRET_KEY
    default: ""
    secret: true
  - name: MINIO_BUCKET_DOCLING
    default: docling
  - name: MINIO_DOCLING_ACCESS_KEY
    default: ""
    secret: true
  - name: MINIO_DOCLING_SECRET_KEY
    default: ""
    secret: true

depends_on:
  required:
    - supabase
  optional: []

rows:
  # Wizard / overview row points at MINIO_CONSOLE_PORT because the
  # `minio.localhost` alias routes to the admin console (port 9001
  # in-container, MINIO_CONSOLE_PORT host-side). The S3 API on
  # MINIO_PORT is NOT aliased — S3 clients use the direct port.
  - display_name: "MinIO Console"
    source_var: MINIO_SOURCE
    port_var: MINIO_CONSOLE_PORT
    scale_var: MINIO_SCALE
    alias: minio.localhost
    description: "S3-compatible artifact storage (admin console)."

exports: []

# ─────────────────────────────────────────────────────────
# Bootstrapper runtime data (migrated from the legacy
# bootstrapper/service-configs.yml). Slices owned by this
# manifest. Synthesized into the runtime dict by
# bootstrapper/services/sc_synthesizer.py.
# ─────────────────────────────────────────────────────────
runtime_sc:
  minio:
    container:
      scale: 1
      environment:
        MINIO_ENDPOINT: http://minio:9000
        MINIO_PUBLIC_ENDPOINT: http://localhost:${MINIO_PORT}
        MINIO_PUBLIC_CONSOLE_ENDPOINT: http://localhost:${MINIO_CONSOLE_PORT}
      deploy: {}
      extra_hosts: []
    disabled:
      scale: 0
      environment:
        MINIO_ENDPOINT: ''
        MINIO_PUBLIC_ENDPOINT: ''
        MINIO_PUBLIC_CONSOLE_ENDPOINT: ''
      deploy: {}
      extra_hosts: []
  minio-init:
    container:
      scale: 1
      environment: {}
      deploy: {}
      extra_hosts: []
    disabled:
      scale: 0
      environment: {}
      deploy: {}
      extra_hosts: []

runtime_deps:
  minio:
    requires: []
    optional: []

data_flow:
  calls: []

