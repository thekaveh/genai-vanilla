# services/local-deep-researcher/compose.yml — LangGraph deep-research workflow runner
services:
  local-deep-researcher:
    build:
      context: ./build
      args:
        BASE_IMAGE: ${LOCAL_DEEP_RESEARCHER_IMAGE}
    container_name: ${PROJECT_NAME}-local-deep-researcher
    restart: unless-stopped
    deploy:
      replicas: ${LOCAL_DEEP_RESEARCHER_SCALE:-1}
    depends_on:
      # No supabase dependency: LDR is DB-free. The research_* tables are
      # written by the BACKEND (services/backend/app/app/research_service.py),
      # which calls this LangGraph server over HTTP and persists sessions
      # itself. LDR only needs its search backend and the LLM gateway.
      searxng:
        condition: service_healthy
      litellm:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:${HOST_GATEWAY_IP}"
    environment:
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_API_KEY: ${LITELLM_MASTER_KEY}
      # Default content LLM — init-config.py reads this directly (no DB query).
      LITELLM_DEFAULT_MODEL: ${LITELLM_DEFAULT_MODEL:-ollama/qwen3.6:latest}
      SEARCH_API: ${LOCAL_DEEP_RESEARCHER_SEARCH_API:-searxng}
      SEARXNG_URL: http://searxng:8080
      MAX_WEB_RESEARCH_LOOPS: ${LOCAL_DEEP_RESEARCHER_LOOPS:-3}
      LOCAL_DEEP_RESEARCHER_WORKERS: ${LOCAL_DEEP_RESEARCHER_WORKERS:-3}
    ports:
      - "${HOST_BIND_IP:-}${LOCAL_DEEP_RESEARCHER_PORT}:2024"
    volumes:
      - local-deep-researcher-data:/app/data
      - local-deep-researcher-repo:/app/repo
    logging:
      driver: json-file
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILE:-3}"
    networks:
      - backend-network

volumes:
  local-deep-researcher-data:
    name: ${PROJECT_NAME}-local-deep-researcher-data
    driver: local
  local-deep-researcher-repo:
    name: ${PROJECT_NAME}-local-deep-researcher-repo
    driver: local
