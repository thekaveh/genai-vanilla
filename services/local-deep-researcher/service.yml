# services/local-deep-researcher/service.yml — Local Deep Researcher
name: local-deep-researcher
label: "Local Deep Researcher (LangGraph research agent)"
category: apps
docs: services/local-deep-researcher/README.md

containers:
  - local-deep-researcher

images:
  - var: LOCAL_DEEP_RESEARCHER_IMAGE
    default: "python:3.11-slim"
    container: local-deep-researcher

sources:
  var: LOCAL_DEEP_RESEARCHER_SOURCE
  default: container
  options:
    - id: container
      label: "Container"
    - id: disabled
      label: "Disabled"

env:
  - name: LOCAL_DEEP_RESEARCHER_SOURCE
    default: container
  - name: LOCAL_DEEP_RESEARCHER_PORT
    # default removed — computed by services/topology.py slot allocator
  - name: LOCAL_DEEP_RESEARCHER_LOOPS
    default: 3
  - name: LOCAL_DEEP_RESEARCHER_SEARCH_API
    default: searxng
  - name: LOCAL_DEEP_RESEARCHER_WORKERS
    default: 3
  - name: LOCAL_DEEP_RESEARCHER_SCALE
    auto_managed: true

depends_on:
  required:
    - searxng
    - litellm
  optional: []

rows:
  - display_name: "Local Deep Researcher"
    source_var: LOCAL_DEEP_RESEARCHER_SOURCE
    port_var: LOCAL_DEEP_RESEARCHER_PORT
    scale_var: LOCAL_DEEP_RESEARCHER_SCALE
    alias: research.localhost
    description: "LangGraph research agent."

exports: []

# ─────────────────────────────────────────────────────────
# Bootstrapper runtime data (migrated from the legacy
# bootstrapper/service-configs.yml). Slices owned by this
# manifest. Synthesized into the runtime dict by
# bootstrapper/services/sc_synthesizer.py.
# ─────────────────────────────────────────────────────────
runtime_sc:
  local-deep-researcher:
    container:
      scale: 1
      environment:
        LITELLM_BASE_URL: http://litellm:4000
        LITELLM_API_KEY: ${LITELLM_MASTER_KEY}
        # STT_ENDPOINT / TTS_ENDPOINT / DOCLING_ENDPOINT are owned by the
        # provider manifests (stt_provider, tts_provider, doc_processor) —
        # service_config.py reads them from THOSE runtime_sc dicts, not
        # this one. The local-deep-researcher container itself doesn't
        # consume STT/TTS at present (LangGraph research agent path is
        # text-only). If wiring lands later it must go into the compose
        # env block to actually reach the container — see
        # project_runtime_sc_vs_compose_env_dual_write.md.
      deploy: {}
      extra_hosts: []
    disabled:
      scale: 0
      environment: {}
      deploy: {}
      extra_hosts: []

runtime_deps:
  local-deep-researcher:
    optional:
    - neo4j-graph-db
    - searxng
    - n8n
    - weaviate
    - parakeet
    - speaches
    - chatterbox
    - docling
    info_message: Local Deep Researcher enabled - will connect to available optional
      services (neo4j, searxng, n8n, weaviate, parakeet, speaches, chatterbox, docling)

data_flow:
  calls:
    # LDR is DB-free: it calls only the LLM gateway and the search backend.
    # The research_* tables (research_sessions/results/sources/logs) are
    # persisted by the BACKEND (services/backend/app/app/research_service.py),
    # which calls this LangGraph server over HTTP — that supabase edge lives in
    # the backend manifest, not here. init-config.py reads the model from
    # LITELLM_DEFAULT_MODEL (set by litellm-init).
    - litellm
    - searxng

