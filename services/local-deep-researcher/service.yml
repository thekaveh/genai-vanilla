# services/local-deep-researcher/service.yml — Local Deep Researcher
name: local-deep-researcher
label: "Local Deep Researcher (LangGraph research agent)"
category: app
docs: docs/services/local-deep-researcher.md

containers:
  - local-deep-researcher

images:
  - var: LOCAL_DEEP_RESEARCHER_IMAGE
    default: "python:3.11-slim"
    container: local-deep-researcher

sources:
  var: LOCAL_DEEP_RESEARCHER_SOURCE
  default: container
  options:
    - id: container
      label: "Container"
    - id: disabled
      label: "Disabled"

env:
  - name: LOCAL_DEEP_RESEARCHER_SOURCE
    default: container
  - name: LOCAL_DEEP_RESEARCHER_PORT
    default: 63013
  - name: LOCAL_DEEP_RESEARCHER_LOOPS
    default: 3
  - name: LOCAL_DEEP_RESEARCHER_SEARCH_API
    default: searxng
  - name: LOCAL_DEEP_RESEARCHER_WORKERS
    default: 3
  - name: LOCAL_DEEP_RESEARCHER_SCALE
    auto_managed: true

depends_on:
  required: []
  optional: []

exports: []

# ─────────────────────────────────────────────────────────
# Bootstrapper runtime data (migrated from the legacy
# bootstrapper/service-configs.yml). Slices owned by this
# manifest. Synthesized into the runtime dict by
# bootstrapper/services/sc_synthesizer.py.
# ─────────────────────────────────────────────────────────
runtime_sc:
  local-deep-researcher:
    container:
      scale: 1
      environment:
        LITELLM_BASE_URL: http://litellm:4000
        LITELLM_API_KEY: ${LITELLM_MASTER_KEY}
        STT_ENDPOINT: ${STT_ENDPOINT}
        TTS_ENDPOINT: ${TTS_ENDPOINT}
        DOCLING_ENDPOINT: ${DOCLING_ENDPOINT}
      deploy: {}
      extra_hosts: []
    disabled:
      scale: 0
      environment: {}
      deploy: {}
      extra_hosts: []

runtime_deps:
  local-deep-researcher:
    optional:
    - neo4j-graph-db
    - searxng
    - n8n
    - weaviate
    - parakeet
    - xtts
    - docling
    info_message: Local Deep Researcher enabled - will connect to available optional
      services (neo4j, searxng, n8n, weaviate, parakeet, xtts, docling)

