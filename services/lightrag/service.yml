# services/lightrag/service.yml
# LightRAG — graph-augmented RAG server.
# Storage backends adapt to Supabase/Neo4j/Redis when enabled, fall back to
# in-process file backends when those sources are disabled. LLM + embedding
# bindings inherit from LiteLLM defaults (resolved at startup by lightrag-init).
name: lightrag
label: "LightRAG (graph-augmented RAG server)"
category: agents
docs: services/lightrag/README.md

containers:
  - lightrag
  - lightrag-init

images:
  - var: LIGHTRAG_IMAGE
    default: "ghcr.io/hkuds/lightrag:v1.5.4"
    container: lightrag
  - var: LIGHTRAG_INIT_IMAGE
    default: "alpine:3.24.1"
    container: lightrag-init

sources:
  var: LIGHTRAG_SOURCE
  default: disabled
  options:
    - id: container
      label: "Container (in-stack LightRAG)"
    - id: localhost
      label: "Host (existing LightRAG on this machine)"
      profiles: [default]
    - id: disabled
      label: "Disabled"

env:
  - name: LIGHTRAG_SOURCE
    default: disabled
  - name: LIGHTRAG_API_PORT
    # default computed by services/topology.py slot allocator
    description: "Host port for LightRAG (in-container 9621)."
  - name: LIGHTRAG_LOCALHOST_PORT
    default: "63068"
    description: "Host port for the localhost source variant."
  - name: LIGHTRAG_API_KEY
    default: ""
    secret: true
    description: "Auto-generated bearer key. Forwarded to LiteLLM as the model api_key."
  - name: LIGHTRAG_TOKEN_SECRET
    default: ""
    secret: true
    description: "Auto-generated JWT signing key for LightRAG's /login endpoint. Without this, LightRAG falls back to a hardcoded default key (security risk)."
  - name: LIGHTRAG_WORKERS
    default: 2
  - name: LIGHTRAG_MEMORY_LIMIT
    default: 6g
  - name: LIGHTRAG_CPU_LIMIT
    default: "2.0"
  - name: LIGHTRAG_LLM_BINDING
    default: openai
  - name: LIGHTRAG_LLM_BINDING_HOST
    default: "http://litellm:4000/v1"
  - name: LIGHTRAG_LLM_MODEL
    default: ""
    description: "Empty = lightrag-init resolves from LITELLM_DEFAULT_MODEL."
  - name: LIGHTRAG_EXTRACT_LLM_MODEL
    default: ""
    description: "Optional LightRAG EXTRACT role model. Empty = inherit LLM_MODEL."
  - name: LIGHTRAG_KEYWORD_LLM_MODEL
    default: ""
    description: "Optional LightRAG KEYWORD role model. Empty = inherit LLM_MODEL."
  - name: LIGHTRAG_QUERY_LLM_MODEL
    default: ""
    description: "Optional LightRAG QUERY role model. Empty = inherit LLM_MODEL."
  - name: LIGHTRAG_EXTRACT_LLM_BINDING
    default: ""
    description: "Optional EXTRACT role provider binding. Empty = inherit LLM_BINDING."
  - name: LIGHTRAG_KEYWORD_LLM_BINDING
    default: ""
    description: "Optional KEYWORD role provider binding. Empty = inherit LLM_BINDING."
  - name: LIGHTRAG_QUERY_LLM_BINDING
    default: ""
    description: "Optional QUERY role provider binding. Empty = inherit LLM_BINDING."
  - name: LIGHTRAG_EXTRACT_LLM_BINDING_HOST
    default: ""
    description: "Optional EXTRACT role provider endpoint. Empty = inherit LLM_BINDING_HOST."
  - name: LIGHTRAG_KEYWORD_LLM_BINDING_HOST
    default: ""
    description: "Optional KEYWORD role provider endpoint. Empty = inherit LLM_BINDING_HOST."
  - name: LIGHTRAG_QUERY_LLM_BINDING_HOST
    default: ""
    description: "Optional QUERY role provider endpoint. Empty = inherit LLM_BINDING_HOST."
  - name: LIGHTRAG_EXTRACT_LLM_BINDING_API_KEY
    default: ""
    secret: true
    description: "Optional EXTRACT role provider API key. Empty = inherit LLM_BINDING_API_KEY for same-provider roles."
  - name: LIGHTRAG_KEYWORD_LLM_BINDING_API_KEY
    default: ""
    secret: true
    description: "Optional KEYWORD role provider API key. Empty = inherit LLM_BINDING_API_KEY for same-provider roles."
  - name: LIGHTRAG_QUERY_LLM_BINDING_API_KEY
    default: ""
    secret: true
    description: "Optional QUERY role provider API key. Empty = inherit LLM_BINDING_API_KEY for same-provider roles."
  - name: LIGHTRAG_EXTRACT_MAX_ASYNC_LLM
    default: ""
    description: "Optional EXTRACT role LLM concurrency. Empty = inherit MAX_ASYNC_LLM."
  - name: LIGHTRAG_KEYWORD_MAX_ASYNC_LLM
    default: ""
    description: "Optional KEYWORD role LLM concurrency. Empty = inherit MAX_ASYNC_LLM."
  - name: LIGHTRAG_QUERY_MAX_ASYNC_LLM
    default: ""
    description: "Optional QUERY role LLM concurrency. Empty = inherit MAX_ASYNC_LLM."
  - name: LIGHTRAG_EXTRACT_LLM_TIMEOUT
    default: ""
    description: "Optional EXTRACT role LLM timeout in seconds. Empty = inherit LLM_TIMEOUT."
  - name: LIGHTRAG_KEYWORD_LLM_TIMEOUT
    default: ""
    description: "Optional KEYWORD role LLM timeout in seconds. Empty = inherit LLM_TIMEOUT."
  - name: LIGHTRAG_QUERY_LLM_TIMEOUT
    default: ""
    description: "Optional QUERY role LLM timeout in seconds. Empty = inherit LLM_TIMEOUT."
  - name: LIGHTRAG_QUERY_ENABLE_RERANK
    default: "false"
    description: "LightRAG query default for reranking. Atlas keeps this false by default because direct LightRAG→TEI rerank payloads are incompatible without an adapter."
  - name: LIGHTRAG_QUERY_TOP_K
    default: "10"
    description: "LightRAG query TOP_K. Atlas defaults this to a concrete integer because LightRAG v1.5.4 crashes when this env var is present but empty."
  - name: LIGHTRAG_QUERY_CHUNK_TOP_K
    default: "5"
    description: "LightRAG query CHUNK_TOP_K. Atlas defaults this to a concrete integer because LightRAG v1.5.4 crashes when this env var is present but empty."
  - name: LIGHTRAG_QUERY_MAX_TOTAL_TOKENS
    default: "12000"
    description: "LightRAG query MAX_TOTAL_TOKENS. Atlas defaults this to a concrete integer because LightRAG v1.5.4 crashes when this env var is present but empty."
  - name: LIGHTRAG_EMBEDDING_BINDING
    default: openai
  - name: LIGHTRAG_EMBEDDING_BINDING_HOST
    default: "http://litellm:4000/v1"
  - name: LIGHTRAG_EMBEDDING_MODEL
    default: ""
    description: "Empty = lightrag-init resolves from LITELLM_EMBEDDING_MODEL."
  - name: LIGHTRAG_EMBEDDING_DIM
    default: ""
    description: "Empty = auto (lightrag-init probes the embedding model's true dimension). Set ONLY to force a value — a wrong dim writes a mismatched PGVector index and every insert fails."
  - name: LIGHTRAG_VLM_PROCESS_ENABLE
    default: "true"
  - name: LIGHTRAG_KV_STORAGE
    default: RedisKVStorage
  - name: LIGHTRAG_VECTOR_STORAGE
    default: PGVectorStorage
  - name: LIGHTRAG_GRAPH_STORAGE
    default: Neo4JStorage
  - name: LIGHTRAG_DOC_STATUS_STORAGE
    default: RedisDocStatusStorage
  - name: LIGHTRAG_SCALE
    auto_managed: true
  - name: LIGHTRAG_INIT_SCALE
    auto_managed: true
  - name: LIGHTRAG_ENDPOINT
    auto_managed: true
    description: "Consumed by hermes/n8n/backend runtime_adaptive and LiteLLM model_list."
  - name: LIGHTRAG_RERANK_BINDING_HOST
    auto_managed: true
  - name: LIGHTRAG_RERANK_BINDING
    auto_managed: true
    description: "Always null by default. Direct LightRAG→TEI rerank payloads are incompatible without an adapter, and LightRAG crashes on an empty value."
  - name: LIGHTRAG_DOCLING_ENDPOINT
    auto_managed: true
  - name: LIGHTRAG_PG_URI
    auto_managed: true
  - name: LIGHTRAG_NEO4J_URI
    auto_managed: true
  - name: LIGHTRAG_NEO4J_USERNAME
    auto_managed: true
  - name: LIGHTRAG_NEO4J_PASSWORD
    auto_managed: true
  - name: LIGHTRAG_REDIS_URI
    auto_managed: true

depends_on:
  required:
    - litellm
  optional:
    - supabase
    - neo4j
    - redis
    - docling

rows:
  - display_name: "LightRAG"
    source_var: LIGHTRAG_SOURCE
    port_var: LIGHTRAG_API_PORT
    scale_var: LIGHTRAG_SCALE
    alias: lightrag.localhost
    description: "Graph-augmented RAG server with WebUI, KG extractor, multimodal ingestion."
    localhost_endpoint_var: LIGHTRAG_ENDPOINT
    localhost_port_var: LIGHTRAG_LOCALHOST_PORT

exports: []

runtime_sc:
  lightrag:
    container:
      scale: 1
      environment:
        LIGHTRAG_ENDPOINT: "http://lightrag:9621"
      deploy: {}
      extra_hosts: []
    localhost:
      scale: 0
      environment:
        LIGHTRAG_ENDPOINT: "http://host.docker.internal:${LIGHTRAG_LOCALHOST_PORT:-63068}"
      deploy: {}
      extra_hosts:
        - host.docker.internal:host-gateway
    disabled:
      scale: 0
      environment:
        LIGHTRAG_ENDPOINT: ""
      deploy: {}
      extra_hosts: []
  lightrag-init:
    container:
      scale: 1
      environment: {}
      deploy: {}
      extra_hosts: []
    disabled:
      scale: 0
      environment: {}
      deploy: {}
      extra_hosts: []

runtime_adaptive:
  lightrag:
    adapts_to:
      - doc_processor
      - supabase
      - neo4j
      - redis
    environment_adaptation:
      LIGHTRAG_DOCLING_ENDPOINT: ${DOCLING_ENDPOINT}
      # Direct LightRAG->TEI rerank is intentionally disabled: LightRAG's
      # jina/cohere clients send `{query, documents}`, while TEI's /rerank
      # endpoint expects `{query, texts}`. Keep this blank until Atlas ships
      # an adapter or a compatible rerank binding.
      LIGHTRAG_RERANK_BINDING_HOST: ""
      LIGHTRAG_PG_URI: "postgresql://${SUPABASE_DB_USER}:${SUPABASE_DB_PASSWORD}@supabase-db:5432/${SUPABASE_DB_NAME}"
      # Neo4j compose service id is `neo4j-graph-db`, not `neo4j` (memory:
      # reference_kong_compose_service_id documents the same pattern for Kong).
      LIGHTRAG_NEO4J_URI: "bolt://neo4j-graph-db:7687"
      LIGHTRAG_NEO4J_USERNAME: neo4j
      LIGHTRAG_NEO4J_PASSWORD: ${GRAPH_DB_PASSWORD}
      LIGHTRAG_REDIS_URI: "redis://:${REDIS_PASSWORD}@redis:6379/2"
    extra_hosts_adaptation: none
    failure_mode: "Storage falls back to NanoVectorDB / NetworkX / JsonKV when supabase/neo4j/redis source is disabled. Reranking remains off unless a compatible adapter is configured. Docling skipped → multimodal images become text-only."
  lightrag-init:
    adapts_to:
      - llm_provider
    environment_adaptation:
      LITELLM_DEFAULT_MODEL: ${LITELLM_DEFAULT_MODEL}
      LITELLM_EMBEDDING_MODEL: ${LITELLM_EMBEDDING_MODEL}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
    extra_hosts_adaptation: inherit from llm_provider
    failure_mode: "lightrag-init exits non-zero if no chat model can be resolved from LIGHTRAG_LLM_MODEL, LITELLM_DEFAULT_MODEL, or LiteLLM /v1/models. Embedding dims use known values or a probe, falling back to nomic-embed-text dim=768 with a warning only for unknown embedding models."

runtime_deps:
  lightrag:
    optional:
      - supabase
      - neo4j
      - redis
      - docling
    info_message: "LightRAG enabled — will wire optional storage and capability services when available."

data_flow:
  calls:
    - litellm
    - supabase
    - neo4j
    - redis
    - docling
