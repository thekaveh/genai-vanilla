# services/openclaw/service.yml — OpenClaw AI agent gateway + init
name: openclaw
label: "OpenClaw (AI agent gateway)"
category: agents
docs: services/openclaw/README.md

containers:
  - openclaw-gateway
  - openclaw-init

images:
  - var: OPENCLAW_IMAGE
    default: "ghcr.io/openclaw/openclaw:latest"
    container: openclaw-gateway
  - var: OPENCLAW_INIT_IMAGE
    default: "alpine:latest"
    container: openclaw-init

sources:
  var: OPENCLAW_SOURCE
  default: disabled
  options:
    - id: disabled
      label: "Disabled"
    - id: container
      label: "Container"
    - id: localhost
      label: "Host (existing OpenClaw on this machine)"

env:
  - name: OPENCLAW_SOURCE
    default: disabled
  - name: OPENCLAW_GATEWAY_PORT
    # default removed — computed by services/topology.py slot allocator
  - name: OPENCLAW_BRIDGE_PORT
    # default removed — computed by services/topology.py slot allocator
  - name: OPENCLAW_GATEWAY_TOKEN
    default: ""
    secret: true
  - name: OPENCLAW_LOCALHOST_PORT
    default: "63024"
    description: "Host port for the localhost source variant. URL is derived at compose-render time as http://host.docker.internal:63024."
  - name: OPENCLAW_INIT_SOURCE
    default: container
  - name: OPENCLAW_ANTHROPIC_API_KEY
    default: ""
    secret: true
    description: "Optional per-OpenClaw Anthropic override."
  - name: OPENCLAW_OPENAI_API_KEY
    default: ""
    secret: true
  - name: OPENCLAW_SCALE
    auto_managed: true
  - name: OPENCLAW_INIT_SCALE
    auto_managed: true
  - name: OPENCLAW_ENDPOINT
    auto_managed: true

depends_on:
  required:
    - litellm
  optional: []

rows:
  - display_name: "OpenClaw"
    source_var: OPENCLAW_SOURCE
    port_var: OPENCLAW_GATEWAY_PORT
    scale_var: OPENCLAW_SCALE
    alias: openclaw.localhost
    description: "AI agent gateway for messaging platforms."
    localhost_port_var: OPENCLAW_LOCALHOST_PORT

exports: []

# ─────────────────────────────────────────────────────────
# Bootstrapper runtime data (migrated from the legacy
# bootstrapper/service-configs.yml). Slices owned by this
# manifest. Synthesized into the runtime dict by
# bootstrapper/services/sc_synthesizer.py.
# ─────────────────────────────────────────────────────────
runtime_sc:
  openclaw:
    container:
      scale: 1
      environment:
        OPENCLAW_ENDPOINT: http://openclaw-gateway:18789
      deploy: {}
      extra_hosts: []
    localhost:
      scale: 0
      environment:
        OPENCLAW_ENDPOINT: http://host.docker.internal:${OPENCLAW_LOCALHOST_PORT:-63024}
      deploy: {}
      extra_hosts:
      - host.docker.internal:host-gateway
    disabled:
      scale: 0
      environment:
        OPENCLAW_ENDPOINT: ''
      deploy: {}
      extra_hosts: []
  openclaw-init:
    container:
      scale: 1
      environment: {}
      deploy: {}
      extra_hosts: []
    disabled:
      scale: 0
      environment: {}
      deploy: {}
      extra_hosts: []

runtime_deps:
  openclaw-gateway:
    optional: []
    info_message: OpenClaw enabled - reasons over the LiteLLM gateway (every active
      provider — Ollama / OpenAI / Anthropic / OpenRouter — appears in the routing
      table; OpenClaw never calls those upstreams directly).

data_flow:
  calls:
    - litellm
    - hermes
    - n8n

