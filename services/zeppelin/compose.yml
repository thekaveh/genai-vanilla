# services/zeppelin/compose.yml — Spark-first notebook UI
services:
  zeppelin:
    # Locally-built image — apache/zeppelin:0.12.0 ships the Spark
    # interpreter but lacks hadoop-aws + AWS SDK v2 bundle. The driver
    # runs in-container in client deploy-mode; `s3a://` access throws
    # ClassNotFoundException without these jars. Pass 45 caught this
    # as a sibling shipping bug to Pass 44 (spark image).
    build:
      context: ./build
      args:
        BASE_IMAGE: ${ZEPPELIN_IMAGE:-apache/zeppelin:0.12.0}
    image: ${PROJECT_NAME}-zeppelin:local
    container_name: ${PROJECT_NAME}-zeppelin
    restart: unless-stopped
    deploy:
      replicas: ${ZEPPELIN_SCALE:-0}
    ports:
      - "${ZEPPELIN_PORT}:8080"
    environment:
      ZEPPELIN_PORT: "8080"
      ZEPPELIN_LOG_DIR: /logs
      ZEPPELIN_NOTEBOOK_DIR: /notebook
      SPARK_MASTER: spark://spark-master:7077
      # NOTE: Zeppelin's Spark interpreter does NOT read SPARK_CONNECT_URL
      # — `SparkInterpreterLauncher` only honors SPARK_MASTER. Users who
      # want to drive Connect from Zeppelin set `spark.remote` in the
      # interpreter UI (Interpreter → spark → properties). Drop this var
      # rather than ship a misleading "configured" env.
      SPARK_SUBMIT_OPTIONS: >-
        --conf spark.hadoop.fs.s3a.endpoint=http://minio:9000
        --conf spark.hadoop.fs.s3a.access.key=${MINIO_ROOT_USER}
        --conf spark.hadoop.fs.s3a.secret.key=${MINIO_ROOT_PASSWORD}
        --conf spark.hadoop.fs.s3a.path.style.access=true
        --conf spark.eventLog.enabled=true
        --conf spark.eventLog.dir=s3a://spark-history/
      ZEPPELIN_JDBC_POSTGRES_URL: jdbc:postgresql://supabase-db:5432/${SUPABASE_DB_NAME}
      ZEPPELIN_JDBC_POSTGRES_USER: ${SUPABASE_DB_USER}
      ZEPPELIN_JDBC_POSTGRES_PASSWORD: ${SUPABASE_DB_PASSWORD}
    volumes:
      - ./notebooks:/notebook
      - zeppelin-logs:/logs
    depends_on:
      spark-master:
        condition: service_healthy
      # Same cold-start race as spark-connect — Zeppelin's first %spark
      # cell writes to s3a://spark-history/ via spark.eventLog.dir; the
      # bucket must exist before Spark's EventLogFileWriters runs
      # requireLogBaseDirAsDirectory().
      spark-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - backend-network

volumes:
  zeppelin-logs:
    name: ${PROJECT_NAME}-zeppelin-logs
    driver: local
