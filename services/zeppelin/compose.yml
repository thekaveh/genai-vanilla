# services/zeppelin/compose.yml — Spark-first notebook UI
services:
  zeppelin:
    # Stock apache/zeppelin:0.12.0. The image does NOT bundle a full
    # Spark distribution — its `interpreter/spark/` dir contains only
    # the interpreter shim (spark-interpreter-0.12.0.jar +
    # scala-2.13/), no spark-core, no SPARK_HOME. The %spark interpreter
    # therefore requires either (a) SPARK_HOME mounted from an external
    # Spark install, or (b) Spark Connect mode (the canonical 4.x
    # pattern). For S3A access in Zeppelin, configure the Spark
    # interpreter via the UI: Interpreter → spark → properties
    # `spark.remote = sc://spark-connect:15002`. The driver then runs
    # on spark-connect — which DOES have hadoop-aws + AWS SDK v2
    # bundle pre-installed via services/spark/build/Dockerfile
    # (Pass 44). Pass 45/47 attempted to install jars into the
    # Zeppelin image directly; that path was wrong because Zeppelin
    # never runs Spark locally without SPARK_HOME. Pass 48 retired
    # the misguided Dockerfile.
    image: ${ZEPPELIN_IMAGE:-apache/zeppelin:0.12.0}
    container_name: ${PROJECT_NAME}-zeppelin
    restart: unless-stopped
    deploy:
      replicas: ${ZEPPELIN_SCALE:-0}
      resources:
        limits:
          memory: ${ZEPPELIN_MEMORY_LIMIT:-2g}
          cpus: "${ZEPPELIN_CPU_LIMIT:-1.5}"
    ports:
      - "${HOST_BIND_IP:-}${ZEPPELIN_PORT}:8080"
    environment:
      ZEPPELIN_PORT: "8080"
      ZEPPELIN_LOG_DIR: /logs
      ZEPPELIN_NOTEBOOK_DIR: /notebook
      # SPARK_MASTER / SPARK_SUBMIT_OPTIONS apply only on the
      # spark-submit launch path, which needs a user-mounted SPARK_HOME
      # (the image ships no Spark distro). Kept for that opt-in path;
      # the supported out-of-the-box route is Spark Connect via the
      # interpreter UI (README §1).
      SPARK_MASTER: spark://spark-master:7077
      # NOTE: Zeppelin's Spark interpreter does NOT read SPARK_CONNECT_URL
      # — `SparkInterpreterLauncher` only honors SPARK_MASTER. Users who
      # want to drive Connect from Zeppelin set `spark.remote` in the
      # interpreter UI (Interpreter → spark → properties). Drop this var
      # rather than ship a misleading "configured" env.
      SPARK_SUBMIT_OPTIONS: >-
        --conf spark.hadoop.fs.s3a.endpoint=http://minio:9000
        --conf spark.hadoop.fs.s3a.access.key=${MINIO_ROOT_USER}
        --conf spark.hadoop.fs.s3a.secret.key=${MINIO_ROOT_PASSWORD}
        --conf spark.hadoop.fs.s3a.path.style.access=true
        --conf spark.eventLog.enabled=true
        --conf spark.eventLog.dir=s3a://spark-history/
      ZEPPELIN_JDBC_POSTGRES_URL: jdbc:postgresql://supabase-db:5432/${SUPABASE_DB_NAME}
      ZEPPELIN_JDBC_POSTGRES_USER: ${SUPABASE_DB_USER}
      ZEPPELIN_JDBC_POSTGRES_PASSWORD: ${SUPABASE_DB_PASSWORD}
    volumes:
      - ./notebooks:/notebook
      - zeppelin-logs:/logs
    depends_on:
      spark-master:
        condition: service_healthy
      # Same cold-start race as spark-connect — Zeppelin's first %spark
      # cell writes to s3a://spark-history/ via spark.eventLog.dir; the
      # bucket must exist before Spark's EventLogFileWriters runs
      # requireLogBaseDirAsDirectory().
      spark-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - backend-network

volumes:
  zeppelin-logs:
    name: ${PROJECT_NAME}-zeppelin-logs
    driver: local
