name: airflow
label: "Apache Airflow (DAG orchestrator)"
category: agents
docs: services/airflow/README.md

containers:
  - airflow-webserver
  - airflow-scheduler
  - airflow-init

images:
  - var: AIRFLOW_IMAGE
    default: "apache/airflow:3.2.2"
    container: airflow-webserver

sources:
  var: AIRFLOW_SOURCE
  default: disabled
  options:
    - id: container
      label: "Container (LocalExecutor + Supabase Postgres)"
    - id: disabled
      label: "Disabled"

env:
  - name: AIRFLOW_SOURCE
    default: disabled
  - name: AIRFLOW_PORT
    description: "Host port for the Airflow Web UI + REST API (in-container 8080)."
  - name: AIRFLOW_DB_USER
    default: airflow
  - name: AIRFLOW_DB_PASSWORD
    default: ""
    secret: true
    description: "Auto-generated by bootstrapper. Postgres role for the Airflow metadata DB."
  - name: AIRFLOW_FERNET_KEY
    default: ""
    secret: true
    description: "Auto-generated. Fernet key for encrypting Connection passwords."
  - name: AIRFLOW_SECRET_KEY
    default: ""
    secret: true
    description: "Auto-generated. Flask session secret."
  - name: AIRFLOW_ADMIN_PASSWORD
    default: ""
    secret: true
    description: "Auto-generated. Admin login. Username is hardcoded 'admin'."
  - name: AIRFLOW_WEBSERVER_SCALE
    auto_managed: true
  - name: AIRFLOW_SCHEDULER_SCALE
    auto_managed: true
  - name: AIRFLOW_INIT_SCALE
    auto_managed: true

depends_on:
  required:
    - supabase
    # LiteLLM + Redis are always-on per their service.yml; airflow-init
    # seeds litellm_default and redis_default Connections unconditionally,
    # so they belong in required (not optional) for ordering parity with
    # sibling consumers (n8n, jupyterhub).
    - litellm
    - redis
  optional:
    - spark
    - minio
    - weaviate
    - neo4j
    - prometheus

rows:
  - display_name: "Apache Airflow"
    source_var: AIRFLOW_SOURCE
    port_var: AIRFLOW_PORT
    scale_var: AIRFLOW_WEBSERVER_SCALE
    alias: airflow.localhost
    description: "Code-defined DAG orchestrator. LocalExecutor + LLM operators."

exports: []

runtime_sc:
  airflow-webserver:
    container:
      scale: 1
      environment:
        AIRFLOW__CORE__EXECUTOR: LocalExecutor
        AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@supabase-db:5432/airflow"
        AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
        # Airflow 3.x renamed [webserver]→[api] for secret_key, and moved
        # auth_backends out of [api] into [fab] inside the FAB provider.
        # Also defaults to SimpleAuthManager (no basic_auth); explicit
        # FabAuthManager required for HTTP basic auth on the REST API.
        AIRFLOW__API__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
        AIRFLOW__CORE__AUTH_MANAGER: "airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager"
        AIRFLOW__FAB__AUTH_BACKENDS: "airflow.providers.fab.auth_manager.api.auth.backend.basic_auth"
        AIRFLOW__CORE__LOAD_EXAMPLES: "false"
        AIRFLOW_UID: "50000"
      deploy: {}
      extra_hosts: []
    disabled:
      scale: 0
      environment: {}
      deploy: {}
      extra_hosts: []
  airflow-scheduler:
    container:
      scale: 1
      environment:
        AIRFLOW__CORE__EXECUTOR: LocalExecutor
        AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@supabase-db:5432/airflow"
        AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
        # Mirror of compose.yml — required for inter-process signed payloads.
        # Dual-write per project_runtime_sc_vs_compose_env_dual_write.md.
        # Airflow 3.x: was AIRFLOW__WEBSERVER__SECRET_KEY (section retired).
        AIRFLOW__API__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
        AIRFLOW__CORE__LOAD_EXAMPLES: "false"
        AIRFLOW_UID: "50000"
      deploy: {}
      extra_hosts: []
    disabled:
      scale: 0
      environment: {}
      deploy: {}
      extra_hosts: []
  airflow-init:
    container:
      scale: 1
      environment:
        AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
        AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@supabase-db:5432/airflow"
        _AIRFLOW_DB_MIGRATE: "true"
        AIRFLOW_UID: "50000"
        # Sibling-source vars consumed by init-airflow.sh for conditional
        # Connection seeding. Per project_runtime_sc_vs_compose_env_dual_write.md
        # these must mirror what compose.yml's environment block declares —
        # compose is the actual injection point; runtime_sc documents
        # what the container receives for the rendering pipeline.
        # LITELLM + REDIS are always-on per their service.yml; init script
        # seeds those Connections unconditionally and does not read the vars.
        # NEO4J_GRAPH_DB_SOURCE is the canonical name (not NEO4J_SOURCE).
        SPARK_SOURCE: ${SPARK_SOURCE:-disabled}
        MINIO_SOURCE: ${MINIO_SOURCE:-disabled}
        WEAVIATE_SOURCE: ${WEAVIATE_SOURCE:-disabled}
        NEO4J_GRAPH_DB_SOURCE: ${NEO4J_GRAPH_DB_SOURCE:-disabled}
        # Credentials passed through to airflow-init for use by the
        # connection-seeding helper (litellm + minio + supabase + the
        # dedicated airflow Postgres role).
        LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
        MINIO_ROOT_USER: ${MINIO_ROOT_USER}
        MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
        SUPABASE_DB_NAME: ${SUPABASE_DB_NAME}
        SUPABASE_DB_USER: ${SUPABASE_DB_USER}
        SUPABASE_DB_PASSWORD: ${SUPABASE_DB_PASSWORD}
        AIRFLOW_DB_USER: ${AIRFLOW_DB_USER}
        AIRFLOW_DB_PASSWORD: ${AIRFLOW_DB_PASSWORD}
        # Neo4j credentials for the neo4j_default Connection seed (Neo4j
        # is auth-on by default; canonical var names are GRAPH_DB_*).
        GRAPH_DB_USER: ${GRAPH_DB_USER}
        GRAPH_DB_PASSWORD: ${GRAPH_DB_PASSWORD}
      deploy: {}
      extra_hosts: []
    disabled:
      scale: 0
      environment: {}
      deploy: {}
      extra_hosts: []

data_flow:
  # Convention: focus.data_flow.calls = what FOCUS calls (upstream).
  # Kong routes traffic TO Airflow (UI + REST API at airflow.localhost);
  # Airflow does not call Kong. Hermes triggers DAGs via the REST API
  # but that's Hermes's outbound lane (hermes.data_flow.calls includes
  # airflow), not Airflow's.
  calls:
    - supabase
    - spark
    - minio
    - litellm
    - weaviate
    - neo4j
    - redis
