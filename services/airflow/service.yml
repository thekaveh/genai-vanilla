name: airflow
label: "Apache Airflow (DAG orchestrator)"
category: agents
docs: services/airflow/README.md

containers:
  - airflow-webserver
  - airflow-scheduler
  - airflow-init

images:
  - var: AIRFLOW_IMAGE
    default: "apache/airflow:3.2.2"
    container: airflow-webserver

sources:
  var: AIRFLOW_SOURCE
  default: disabled
  options:
    - id: container
      label: "Container (LocalExecutor + Supabase Postgres)"
    - id: disabled
      label: "Disabled"

env:
  - name: AIRFLOW_SOURCE
    default: disabled
  - name: AIRFLOW_PORT
    description: "Host port for the Airflow Web UI + REST API (in-container 8080)."
  - name: AIRFLOW_DB_USER
    default: airflow
  - name: AIRFLOW_DB_PASSWORD
    default: ""
    secret: true
    description: "Auto-generated by bootstrapper. Postgres role for the Airflow metadata DB."
  - name: AIRFLOW_FERNET_KEY
    default: ""
    secret: true
    description: "Auto-generated. Fernet key for encrypting Connection passwords."
  - name: AIRFLOW_SECRET_KEY
    default: ""
    secret: true
    description: "Auto-generated. Flask session secret."
  - name: AIRFLOW_ADMIN_PASSWORD
    default: ""
    secret: true
    description: "Auto-generated. Admin login. Username is hardcoded 'admin'."
  - name: AIRFLOW_WEBSERVER_SCALE
    auto_managed: true
  - name: AIRFLOW_SCHEDULER_SCALE
    auto_managed: true
  - name: AIRFLOW_INIT_SCALE
    auto_managed: true

depends_on:
  required:
    - supabase
  optional:
    - spark
    - minio
    - litellm
    - redis
    - weaviate
    - neo4j
    - prometheus

rows:
  - display_name: "Apache Airflow"
    source_var: AIRFLOW_SOURCE
    port_var: AIRFLOW_PORT
    scale_var: AIRFLOW_WEBSERVER_SCALE
    alias: airflow.localhost
    description: "Code-defined DAG orchestrator. LocalExecutor + LLM operators."

exports: []

runtime_sc:
  airflow-webserver:
    container:
      scale: 1
      environment:
        AIRFLOW__CORE__EXECUTOR: LocalExecutor
        AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@supabase-db:5432/airflow"
        AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
        AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
        AIRFLOW__API__AUTH_BACKENDS: "airflow.providers.fab.auth_manager.api.auth.backend.basic_auth"
        AIRFLOW__CORE__LOAD_EXAMPLES: "false"
        AIRFLOW_UID: "50000"
      deploy: {}
      extra_hosts: []
    disabled:
      scale: 0
      environment: {}
      deploy: {}
      extra_hosts: []
  airflow-scheduler:
    container:
      scale: 1
      environment:
        AIRFLOW__CORE__EXECUTOR: LocalExecutor
        AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@supabase-db:5432/airflow"
        AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
        AIRFLOW__CORE__LOAD_EXAMPLES: "false"
        AIRFLOW_UID: "50000"
      deploy: {}
      extra_hosts: []
    disabled:
      scale: 0
      environment: {}
      deploy: {}
      extra_hosts: []
  airflow-init:
    container:
      scale: 1
      environment:
        AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
        AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@supabase-db:5432/airflow"
        _AIRFLOW_DB_MIGRATE: "true"
        _AIRFLOW_WWW_USER_USERNAME: admin
        _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
        AIRFLOW_UID: "50000"
      deploy: {}
      extra_hosts: []
    disabled:
      scale: 0
      environment: {}
      deploy: {}
      extra_hosts: []

data_flow:
  calls:
    - supabase
    - spark
    - minio
    - litellm
    - weaviate
    - neo4j
    - redis
    - kong
