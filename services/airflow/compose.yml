services:
  airflow-webserver:
    build:
      context: ./build
      args:
        BASE_IMAGE: ${AIRFLOW_IMAGE:-apache/airflow:3.2.2}
    image: ${PROJECT_NAME}-airflow:local
    container_name: ${PROJECT_NAME}-airflow-webserver
    restart: unless-stopped
    deploy:
      replicas: ${AIRFLOW_WEBSERVER_SCALE:-0}
    ports:
      - "${AIRFLOW_PORT}:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@supabase-db:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      # Airflow 3.x renamed [webserver] secret_key → [api] secret_key (the
      # `airflow webserver` subcommand was removed alongside; api-server
      # now serves both UI and REST). Setting the old AIRFLOW__WEBSERVER__
      # SECRET_KEY name was a silent no-op.
      AIRFLOW__API__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      # Airflow 3.x defaults to SimpleAuthManager which does NOT support
      # HTTP basic_auth — the README's curl examples and the Hermes →
      # Airflow REST trigger pattern need the FAB auth manager.
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      # Airflow 3.x: basic_auth backend moved from [api] auth_backends
      # → [fab] auth_backends inside the apache-airflow-providers-fab
      # package. AIRFLOW__API__AUTH_BACKENDS is silently ignored in 3.x.
      AIRFLOW__FAB__AUTH_BACKENDS: airflow.providers.fab.auth_manager.api.auth.backend.basic_auth
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW_UID: "50000"
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
    # Airflow 3.x: the `webserver` subcommand was removed (split-CLI
    # AIP-81). The unified API + UI now ship under `airflow api-server`.
    command: ["airflow", "api-server"]
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - backend-network

  airflow-scheduler:
    # Same locally-built image as airflow-webserver. Compose only
    # auto-builds for services that DECLARE `build:`; without it, an
    # `up` command tries to PULL `${PROJECT_NAME}-airflow:local` from
    # a registry (which doesn't exist) and fails. Declaring `build:`
    # with the same context here makes Compose reuse the already-built
    # tag without rebuilding.
    build:
      context: ./build
      args:
        BASE_IMAGE: ${AIRFLOW_IMAGE:-apache/airflow:3.2.2}
    image: ${PROJECT_NAME}-airflow:local
    container_name: ${PROJECT_NAME}-airflow-scheduler
    restart: unless-stopped
    deploy:
      replicas: ${AIRFLOW_SCHEDULER_SCALE:-0}
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@supabase-db:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      # Required for inter-process signed-payload validation (DagFileProcessor
      # → scheduler RPC, deferrable triggers, JWT auth between schedulers in
      # an HA setup). Single-scheduler LocalExecutor mostly tolerates a
      # missing key today but pinning it now means scaling later doesn't
      # silently break. Mirrors the api-server block.
      # Airflow 3.x: was AIRFLOW__WEBSERVER__SECRET_KEY ([webserver] section
      # retired); canonical is now AIRFLOW__API__SECRET_KEY.
      AIRFLOW__API__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      # Parity with api-server + init: scheduler's DagFileProcessor calls
      # AuthManager.is_authorized_dag during DAG parsing. Without these,
      # it falls back to SimpleAuthManager and may emit auth warnings
      # into the scheduler log (no current functional break but a
      # dual-write boundary violation per project_runtime_sc_vs_compose_env).
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      AIRFLOW__FAB__AUTH_BACKENDS: airflow.providers.fab.auth_manager.api.auth.backend.basic_auth
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW_UID: "50000"
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
    command: ["airflow", "scheduler"]
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      # Airflow's recommended scheduler liveness probe — checks that THIS
      # host has a fresh SchedulerJob heartbeat in the metadata DB. Silent
      # scheduler death is the worst Airflow failure mode (UI still works,
      # DAGs sit queued forever); this catches it.
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$(hostname)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - backend-network

  airflow-init:
    # Same locally-built image; see comment above on airflow-scheduler.
    build:
      context: ./build
      args:
        BASE_IMAGE: ${AIRFLOW_IMAGE:-apache/airflow:3.2.2}
    image: ${PROJECT_NAME}-airflow:local
    container_name: ${PROJECT_NAME}-airflow-init
    deploy:
      replicas: ${AIRFLOW_INIT_SCALE:-0}
    environment:
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@supabase-db:5432/airflow
      _AIRFLOW_DB_MIGRATE: "true"
      # Parity with webserver/scheduler — keep examples off across the
      # entire family so a future Airflow version that reads this during
      # `db migrate` doesn't accidentally seed examples into our metadata DB.
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW_UID: "50000"
      # Sibling-source vars consumed by the init script for conditional
      # connection seeding (dual-write per project_runtime_sc_vs_compose_env).
      # LITELLM + REDIS are intentionally absent: both are always-on per their
      # service.yml and the init script seeds their Connections unconditionally.
      # NEO4J_GRAPH_DB_SOURCE is the canonical name (NEO4J_SOURCE does not exist).
      SPARK_SOURCE: ${SPARK_SOURCE:-disabled}
      MINIO_SOURCE: ${MINIO_SOURCE:-disabled}
      WEAVIATE_SOURCE: ${WEAVIATE_SOURCE:-disabled}
      NEO4J_GRAPH_DB_SOURCE: ${NEO4J_GRAPH_DB_SOURCE:-disabled}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      SUPABASE_DB_NAME: ${SUPABASE_DB_NAME}
      SUPABASE_DB_USER: ${SUPABASE_DB_USER}
      SUPABASE_DB_PASSWORD: ${SUPABASE_DB_PASSWORD}
      AIRFLOW_DB_USER: ${AIRFLOW_DB_USER}
      AIRFLOW_DB_PASSWORD: ${AIRFLOW_DB_PASSWORD}
      # Neo4j credentials consumed by init-airflow.sh when seeding
      # neo4j_default (Connection requires auth — Neo4j is auth-on by
      # default). Canonical var names are GRAPH_DB_USER / _PASSWORD
      # (NOT NEO4J_USER / _PASSWORD — the Neo4j manifest's username
      # field is GRAPH_DB_USER).
      GRAPH_DB_USER: ${GRAPH_DB_USER}
      GRAPH_DB_PASSWORD: ${GRAPH_DB_PASSWORD}
      # Redis is auth-on (services/redis/compose.yml passes --requirepass
      # ${REDIS_PASSWORD}). Without this, redis_default Connection auth-
      # fails with NOAUTH/WRONGPASS on every DAG that uses RedisHook.
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # Same Airflow 3.x section renames as webserver/scheduler — needed
      # so `airflow users create` (a FAB-provider CLI) actually finds
      # FabAuthManager and successfully writes the admin row. The init
      # script's `|| echo "skipping"` swallow would otherwise hide
      # failure, leaving the webserver auth-backend without an admin to
      # validate against (same 401 class as Pass 9's basic_auth bug).
      AIRFLOW__API__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      AIRFLOW__FAB__AUTH_BACKENDS: airflow.providers.fab.auth_manager.api.auth.backend.basic_auth
    volumes:
      - ./dags:/opt/airflow/dags
      - ./init/scripts:/scripts:ro
    command: ["/scripts/init-airflow.sh"]
    depends_on:
      supabase-db:
        condition: service_healthy
    networks:
      - backend-network

volumes:
  airflow-logs:
    name: ${PROJECT_NAME}-airflow-logs
    driver: local
