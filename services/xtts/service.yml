# services/xtts/service.yml — XTTS v2 TTS
name: xtts
label: "XTTS v2 (text-to-speech)"
category: ai
docs: docs/services/xtts.md

containers:
  - xtts-gpu

images:
  - var: XTTS_GPU_IMAGE
    default: "ghcr.io/matatonic/openedai-speech:latest"
    container: xtts-gpu

sources:
  var: TTS_PROVIDER_SOURCE
  default: disabled
  options:
    - id: disabled
      label: "Disabled"
      effects:
        XTTS_GPU_SCALE: 0
        XTTS_ENDPOINT: ""
    - id: xtts-localhost
      label: "Host (existing XTTS on this machine)"
      effects:
        XTTS_GPU_SCALE: 0
        XTTS_ENDPOINT: "${XTTS_LOCALHOST_URL}"
    - id: xtts-container-gpu
      label: "Container (GPU, NVIDIA)"
      effects:
        XTTS_GPU_SCALE: 1
        XTTS_ENDPOINT: "http://xtts-gpu:8000"

env:
  - name: TTS_PROVIDER_SOURCE
    default: disabled
  - name: TTS_PROVIDER_PORT
    default: 63023
  - name: XTTS_MODEL
    default: tts-1-hd
    description: "Options: tts-1 (Piper/fast) | tts-1-hd (XTTS v2/quality)."
  - name: XTTS_LOCALHOST_URL
    default: "http://host.docker.internal:63023"
  - name: XTTS_GPU_SCALE
    auto_managed: true
  - name: XTTS_ENDPOINT
    auto_managed: true

depends_on:
  required: []
  optional: []

exports: []
