# services/xtts/compose.yml — XTTS v2 TTS GPU container
services:
  xtts-gpu:
    profiles:
      - xtts-gpu
      - tts-gpu
    image: ${XTTS_GPU_IMAGE:-ghcr.io/matatonic/openedai-speech:latest}
    container_name: ${PROJECT_NAME}-xtts-gpu
    restart: unless-stopped
    runtime: nvidia
    deploy:
      replicas: ${XTTS_GPU_SCALE:-0}
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      TTS_HOME: /app/voices
      HF_HOME: /app/cache
      PRELOAD_MODEL: ${XTTS_MODEL:-tts-1-hd}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      HF_TOKEN: ${HUGGING_FACE_HUB_TOKEN}
    volumes:
      - tts-provider-gpu-cache:/app/cache
      - tts-voices:/app/voices
    ports:
      - "${TTS_PROVIDER_PORT:-10400}:8000"
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    labels:
      - "com.${PROJECT_NAME}.service=text-to-speech"
      - "com.${PROJECT_NAME}.category=ai"
      - "com.${PROJECT_NAME}.backend=cuda"

volumes:
  tts-provider-gpu-cache:
    name: ${PROJECT_NAME}-tts-gpu-cache
    driver: local
  tts-voices:
    name: ${PROJECT_NAME}-tts-voices
    driver: local
