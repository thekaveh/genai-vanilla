# services/open-webui/service.yml — Open WebUI + init
name: open-webui
label: "Open WebUI (chat interface)"
category: app
docs: docs/services/open-webui.md

containers:
  - open-web-ui
  - open-webui-init

images:
  - var: OPEN_WEB_UI_IMAGE
    default: "dyrnq/open-webui:latest"
    container: open-web-ui
  - var: OPEN_WEB_UI_INIT_IMAGE
    default: "python:3.11-slim"
    container: open-webui-init

sources:
  var: OPEN_WEB_UI_SOURCE
  default: container
  options:
    - id: container
      label: "Container"
    - id: disabled
      label: "Disabled"

env:
  - name: OPEN_WEB_UI_SOURCE
    default: container
  - name: OPEN_WEB_UI_PORT
    default: 63015
  - name: OPEN_WEB_UI_SECRET_KEY
    default: secret
    secret: true
  - name: OPEN_WEB_UI_ADMIN_EMAIL
    default: "admin@localhost"
  - name: OPEN_WEB_UI_ADMIN_PASSWORD
    default: admin
    secret: true
  - name: OPEN_WEB_UI_ADMIN_NAME
    default: Admin
  - name: OPEN_WEB_UI_WEBSOCKET_SUPPORT
    default: true
  - name: OPEN_WEB_UI_REDIS_DB
    default: 2
  - name: OPEN_WEB_UI_MODEL_CACHE_TTL
    default: 300
  - name: OPEN_WEB_UI_TTS_ENGINE
    default: ""
    description: "Set by bootstrapper when speaches/chatterbox are enabled."
  - name: OPEN_WEB_UI_STT_ENGINE
    default: ""
  - name: OPEN_WEB_UI_TTS_MODEL
    default: ""
    description: "Model name Open WebUI sends to /v1/audio/speech. Empty = engine default."
  - name: OPEN_WEB_UI_TTS_VOICE
    default: ""
    description: "Voice id. Empty = engine default."
  - name: OPEN_WEB_UI_TTS_API_URL
    auto_managed: true
  - name: OPEN_WEB_UI_STT_API_URL
    auto_managed: true
  - name: OPEN_WEB_UI_SCALE
    auto_managed: true
  - name: OPEN_WEB_UI_INIT_SCALE
    auto_managed: true

depends_on:
  required: []
  optional: []

exports: []

# ─────────────────────────────────────────────────────────
# Bootstrapper runtime data (migrated from the legacy
# bootstrapper/service-configs.yml). Slices owned by this
# manifest. Synthesized into the runtime dict by
# bootstrapper/services/sc_synthesizer.py.
# ─────────────────────────────────────────────────────────
runtime_sc:
  open-web-ui:
    container:
      scale: 1
      environment:
        OPENAI_API_BASE_URLS: http://litellm:4000/v1
        OPENAI_API_KEYS: ${LITELLM_MASTER_KEY}
        COMFYUI_BASE_URL: ${COMFYUI_ENDPOINT:-http://comfyui:18188}
        STT_ENDPOINT: ${STT_ENDPOINT}
        TTS_ENDPOINT: ${TTS_ENDPOINT}
        DOCLING_ENDPOINT: ${DOCLING_ENDPOINT}
      deploy: {}
      extra_hosts: []
    disabled:
      scale: 0
      environment: {}
      deploy: {}
      extra_hosts: []

runtime_deps:
  open-web-ui:
    optional:
    - weaviate
    - local-deep-researcher
    - parakeet
    - speaches
    - chatterbox
    - docling
    info_message: Open WebUI enabled - will connect to available optional services
      (weaviate, local-deep-researcher, parakeet, speaches, chatterbox, docling)

