# services/open-webui/service.yml — Open WebUI + init
name: open-webui
label: "Open WebUI (chat interface)"
category: apps
docs: services/open-webui/README.md

containers:
  - open-web-ui
  - open-webui-init

images:
  - var: OPEN_WEB_UI_IMAGE
    default: "dyrnq/open-webui:latest"
    container: open-web-ui
  - var: OPEN_WEB_UI_INIT_IMAGE
    # 3.12-slim matches the init Dockerfile's own default and every
    # other init container; the 3.11 pin was a half-finished migration
    # (.env.example overrode the Dockerfile back to 3.11).
    default: "python:3.12-slim"
    container: open-webui-init

sources:
  var: OPEN_WEB_UI_SOURCE
  default: container
  options:
    - id: container
      label: "Container"
    - id: disabled
      label: "Disabled"

env:
  - name: OPEN_WEB_UI_SOURCE
    default: container
  - name: OPEN_WEB_UI_PORT
    # default removed — computed by services/topology.py slot allocator
  - name: OPEN_WEB_UI_SECRET_KEY
    default: secret
    secret: true
  - name: OPEN_WEB_UI_ADMIN_EMAIL
    default: "admin@localhost"
  - name: OPEN_WEB_UI_ADMIN_PASSWORD
    default: admin
    secret: true
  - name: OPEN_WEB_UI_ADMIN_NAME
    default: Admin
  - name: OPEN_WEB_UI_WEBSOCKET_SUPPORT
    default: true
  - name: OPEN_WEB_UI_REDIS_DB
    default: 2
  - name: OPEN_WEB_UI_MODEL_CACHE_TTL
    default: 300
  - name: OPEN_WEB_UI_TTS_ENGINE
    default: ""
    description: "Set by bootstrapper when speaches/chatterbox are enabled."
  - name: OPEN_WEB_UI_STT_ENGINE
    default: ""
  - name: OPEN_WEB_UI_TTS_MODEL
    default: ""
    description: "Model name Open WebUI sends to /v1/audio/speech. Empty = engine default."
  - name: OPEN_WEB_UI_TTS_VOICE
    default: ""
    description: "Voice id. Empty = engine default."
  - name: OPEN_WEB_UI_TTS_API_URL
    auto_managed: true
  - name: OPEN_WEB_UI_STT_API_URL
    auto_managed: true
  - name: OPEN_WEB_UI_SCALE
    auto_managed: true
  - name: OPEN_WEB_UI_INIT_SCALE
    auto_managed: true

depends_on:
  # Open WebUI's real bootstrap gates (per compose.yml) are
  # supabase-db-init + supabase-{realtime,storage} + redis + litellm —
  # Hermes was over-claimed: Open WebUI reaches the `hermes-agent` model
  # through LiteLLM's catalog, so Hermes is a runtime-optional path, not
  # a startup blocker.
  required:
    - supabase
    - redis
    - litellm
  optional:
    - hermes

rows:
  - display_name: "Open WebUI"
    source_var: OPEN_WEB_UI_SOURCE
    port_var: OPEN_WEB_UI_PORT
    scale_var: OPEN_WEB_UI_SCALE
    alias: chat.localhost
    description: "Chat interface (consumes LiteLLM model list incl. hermes-agent)."

exports: []

# ─────────────────────────────────────────────────────────
# Bootstrapper runtime data (migrated from the legacy
# bootstrapper/service-configs.yml). Slices owned by this
# manifest. Synthesized into the runtime dict by
# bootstrapper/services/sc_synthesizer.py.
# ─────────────────────────────────────────────────────────
runtime_sc:
  open-web-ui:
    container:
      scale: 1
      environment:
        OPENAI_API_BASE_URLS: http://litellm:4000/v1
        OPENAI_API_KEYS: ${LITELLM_MASTER_KEY}
        COMFYUI_BASE_URL: ${COMFYUI_ENDPOINT:-http://comfyui:18188}
        # STT_ENDPOINT / TTS_ENDPOINT / DOCLING_ENDPOINT are owned by the
        # provider manifests (stt_provider, tts_provider, doc_processor) —
        # service_config.py reads them from THOSE runtime_sc dicts, not
        # this one. Open-WebUI itself plumbs them into AUDIO_*_OPENAI_API_*
        # variables in the compose env block (which is the actual injection
        # point — see project_runtime_sc_vs_compose_env_dual_write.md).
        # Listing them here is dead data on both axes.
      deploy: {}
      extra_hosts: []
    disabled:
      scale: 0
      environment: {}
      deploy: {}
      extra_hosts: []

runtime_deps:
  open-web-ui:
    optional:
    - weaviate
    - local-deep-researcher
    - parakeet
    - speaches
    - chatterbox
    - docling
    info_message: Open WebUI enabled - will connect to available optional services
      (weaviate, local-deep-researcher, parakeet, speaches, chatterbox, docling)

data_flow:
  # Open WebUI reaches every plugged-in media + agent feature at request
  # time. Media calls are guarded by their SOURCE being != disabled;
  # runtime_deps.open-web-ui.optional lists the same services from a
  # different angle (wizard hints + compose ordering). supabase is the
  # app DB (DATABASE_URL), redis backs the websocket manager, and the
  # bundled extras tools/functions call the backend's memory/research/
  # comfyui endpoints. searxng + weaviate are NOT wired today — they
  # live in README §5.4 Future pairs (ENABLE_RAG_WEB_SEARCH / vector
  # store) until someone adds the mechanism.
  calls:
    - litellm
    - supabase
    - redis
    - backend
    - comfyui
    - stt-provider
    - tts-provider
    - doc-processor
    - local-deep-researcher

