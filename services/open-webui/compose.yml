# services/open-webui/compose.yml — Open WebUI + init
services:
  open-web-ui:
    image: ${OPEN_WEB_UI_IMAGE}
    container_name: ${PROJECT_NAME}-open-web-ui
    restart: unless-stopped
    depends_on:
      supabase-db-init:
        condition: service_completed_successfully
      supabase-realtime:
        condition: service_started
      supabase-storage:
        condition: service_started
      redis:
        condition: service_healthy
      litellm:
        condition: service_healthy
    deploy:
      replicas: ${OPEN_WEB_UI_SCALE:-1}
    extra_hosts:
      - "host.docker.internal:${HOST_GATEWAY_IP}"
    environment:
      # Identifies outgoing HTTP requests (langchain_community emits a
      # `USER_AGENT environment variable not set` warning at boot if
      # unset; setting it silences the warning and lets upstreams attribute
      # the traffic to the stack).
      USER_AGENT: GenAI-Vanilla/Open-WebUI
      # Open WebUI's OpenAI-compatible client points at the LiteLLM gateway.
      # The gateway exposes every provider behind one /v1 surface.
      OPENAI_API_BASE_URLS: http://litellm:4000/v1
      OPENAI_API_KEYS: ${LITELLM_MASTER_KEY}
      ENABLE_OPENAI_API: "true"
      ENABLE_OLLAMA_API: "false"
      DATABASE_URL: postgresql://${SUPABASE_DB_USER}:${SUPABASE_DB_PASSWORD}@supabase-db:5432/${SUPABASE_DB_NAME}
      WEBUI_SECRET_KEY: ${OPEN_WEB_UI_SECRET_KEY}
      WEBUI_ADMIN_EMAIL: ${OPEN_WEB_UI_ADMIN_EMAIL:-admin@localhost}
      WEBUI_ADMIN_PASSWORD: ${OPEN_WEB_UI_ADMIN_PASSWORD:-admin}
      WEBUI_ADMIN_NAME: ${OPEN_WEB_UI_ADMIN_NAME:-Admin}
      COMFYUI_BASE_URL: ${COMFYUI_ENDPOINT:-http://comfyui:18188}
      ENABLE_IMAGE_GENERATION: true
      IMAGE_GENERATION_ENGINE: comfyui
      # TTS integration (openai-compatible via openedai-speech)
      AUDIO_TTS_ENGINE: ${OPEN_WEB_UI_TTS_ENGINE:-}
      AUDIO_TTS_OPENAI_API_BASE_URL: ${OPEN_WEB_UI_TTS_API_URL:-}
      AUDIO_TTS_OPENAI_API_KEY: "sk-unused"
      AUDIO_TTS_MODEL: ${OPEN_WEB_UI_TTS_MODEL:-}
      AUDIO_TTS_VOICE: ${OPEN_WEB_UI_TTS_VOICE:-}
      # STT integration (openai-compatible via parakeet)
      AUDIO_STT_ENGINE: ${OPEN_WEB_UI_STT_ENGINE:-}
      AUDIO_STT_OPENAI_API_BASE_URL: ${OPEN_WEB_UI_STT_API_URL:-}
      AUDIO_STT_OPENAI_API_KEY: "sk-unused"
      AUDIO_STT_MODEL: "whisper-1"
      # WebSocket Redis Integration
      ENABLE_WEBSOCKET_SUPPORT: "true"
      WEBSOCKET_MANAGER: "redis"
      WEBSOCKET_REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/2"
      REDIS_KEY_PREFIX: "openwebui"
      MODEL_LIST_CACHE_TTL: "300"
    volumes:
      - open-web-ui-data:/app/backend/data
      - ./extras/tools:/app/backend/data/tools
      - ./extras/functions:/app/backend/data/functions
    ports:
      - "${OPEN_WEB_UI_PORT}:8080"
    networks:
      - backend-network

  open-webui-init:
    build:
      context: ./init
      args:
        BASE_IMAGE: ${OPEN_WEB_UI_INIT_IMAGE:-python:3.11-slim}
    container_name: ${PROJECT_NAME}-open-webui-init
    restart: "no"
    deploy:
      replicas: ${OPEN_WEB_UI_INIT_SCALE:-1}
    depends_on:
      open-web-ui:
        condition: service_started
      supabase-db-init:
        condition: service_completed_successfully
    environment:
      WEBUI_URL: http://open-web-ui:8080
      WEBUI_SECRET_KEY: ${OPEN_WEB_UI_SECRET_KEY}
      DATABASE_URL: postgresql://${SUPABASE_DB_USER}:${SUPABASE_DB_PASSWORD}@supabase-db:5432/${SUPABASE_DB_NAME}
      ADMIN_EMAIL: ${OPEN_WEB_UI_ADMIN_EMAIL:-admin@localhost}
      ADMIN_PASSWORD: ${OPEN_WEB_UI_ADMIN_PASSWORD:-admin}
      ADMIN_NAME: ${OPEN_WEB_UI_ADMIN_NAME:-Admin}
      TOOLS_DIR: /tools
      FUNCTIONS_DIR: /functions
    volumes:
      - ./extras/tools:/tools:ro
      - ./extras/functions:/functions:ro
    networks:
      - backend-network

volumes:
  open-web-ui-data:
    name: ${PROJECT_NAME}-open-web-ui-data
    driver: local
