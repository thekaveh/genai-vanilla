# services/parakeet/service.yml — NVIDIA Parakeet STT
#
# Parakeet is one of three STT engines. The STT_PROVIDER_SOURCE var lives
# here (its historic home) and enumerates ALL valid STT options across
# engines: parakeet-*, speaches-*, whisper-cpp-localhost, disabled. Some
# of these options activate sibling services (speaches-* turns on the
# speaches container via _generate_stt_provider_config; whisper-cpp-localhost
# is host-only).
#
# Engine-neutral consumers (n8n, backend, jupyterhub, open-webui,
# hermes-init) reference `${STT_ENDPOINT}` — set by whichever option is
# active.
name: parakeet
label: "Parakeet (NVIDIA STT engine)"
category: ai
docs: docs/services/parakeet.md

containers:
  - parakeet-gpu

images:
  - var: PARAKEET_GPU_IMAGE
    default: "nvcr.io/nvidia/pytorch:25.01-py3"
    container: parakeet-gpu
    notes: "Used as BASE_IMAGE in stt-provider/gpu/Dockerfile."

# STT source set — enumerates EVERY STT option, not just parakeet's own.
# Mirrors how the legacy `bootstrapper/service-configs.yml` grouped them
# under one `stt_provider:` key. Per-source bootstrapper-runtime data
# (scale, environment, deploy, extra_hosts — e.g. speaches-* setting
# STT_ENDPOINT to the speaches container URL) lives in the `runtime_sc:`
# block below. SPEACHES_SCALE is set by
# `bootstrapper/services/service_config.py::_generate_stt_provider_config`
# (multi-input — reads both STT_PROVIDER_SOURCE and TTS_PROVIDER_SOURCE).
sources:
  var: STT_PROVIDER_SOURCE
  default: speaches-container-cpu
  options:
    - id: speaches-container-cpu
      label: "Speaches (CPU, unified TTS + STT)"
    - id: speaches-container-gpu
      label: "Speaches (GPU, NVIDIA)"
    - id: parakeet-container-gpu
      label: "Parakeet (NVIDIA, container GPU)"
    - id: parakeet-localhost
      label: "Parakeet (host, Mac MLX or Linux CPU/GPU)"
    - id: whisper-cpp-localhost
      label: "whisper.cpp (host, Apple Silicon Metal/ANE)"
    - id: disabled
      label: "Disabled"

env:
  - name: STT_PROVIDER_SOURCE
    default: speaches-container-cpu
  - name: STT_PROVIDER_PORT
    default: 63022
    description: "Wizard display slot. Real per-engine ports live on their own manifests (PARAKEET_*, SPEACHES_*, etc.)."
  - name: STT_PROVIDER_SCALE
    auto_managed: true
    description: "Aggregate STT scale across all engines. Reserved for future use."
  - name: PARAKEET_MODEL
    default: "nvidia/parakeet-tdt-0.6b-v3"
  - name: PARAKEET_GPU_DEVICE
    default: cuda
  - name: PARAKEET_GPU_COMPUTE_TYPE
    default: float16
  - name: PARAKEET_LOCALHOST_URL
    default: "http://host.docker.internal:63022"
  - name: WHISPER_CPP_LOCALHOST_URL
    default: "http://host.docker.internal:63025"
    description: "Used when STT_PROVIDER_SOURCE=whisper-cpp-localhost."
  - name: HUGGING_FACE_HUB_TOKEN
    default: ""
    secret: true
    description: "Shared by parakeet, speaches, chatterbox, docling for model downloads. Consumed by ${HUGGING_FACE_HUB_TOKEN} interpolation in those services' compose blocks; owned here as its historic home."
  - name: PARAKEET_GPU_SCALE
    auto_managed: true
  - name: STT_ENDPOINT
    auto_managed: true
    description: "Resolved per STT_PROVIDER_SOURCE. Consumed by n8n, backend, jupyterhub, open-webui, hermes-init (the latter as STT_INTERNAL_URL — owned by services/hermes/)."

depends_on:
  required: []
  optional: []

exports: []

# ─────────────────────────────────────────────────────────
# Bootstrapper runtime data (migrated from the legacy
# bootstrapper/service-configs.yml). Slices owned by this
# manifest. Synthesized into the runtime dict by
# bootstrapper/services/sc_synthesizer.py.
# ─────────────────────────────────────────────────────────
runtime_sc:
  stt_provider:
    speaches-container-cpu:
      scale: 1
      environment:
        STT_ENDPOINT: http://speaches:8000
      deploy: {}
      extra_hosts: []
    speaches-container-gpu:
      scale: 1
      environment:
        STT_ENDPOINT: http://speaches:8000
      deploy:
        resources:
          reservations:
            devices:
            - driver: nvidia
              count: 1
              capabilities:
              - gpu
      extra_hosts: []
    parakeet-container-gpu:
      scale: 1
      environment:
        STT_ENDPOINT: http://parakeet-gpu:8000
        PARAKEET_DEVICE: ${PARAKEET_GPU_DEVICE:-cuda}
        PARAKEET_COMPUTE_TYPE: ${PARAKEET_GPU_COMPUTE_TYPE:-float16}
        PARAKEET_MODEL: ${PARAKEET_MODEL:-nvidia/parakeet-tdt-0.6b-v3}
        NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
        HF_TOKEN: ${HUGGING_FACE_HUB_TOKEN}
      deploy:
        resources:
          reservations:
            devices:
            - driver: nvidia
              count: 1
              capabilities:
              - gpu
      extra_hosts: []
    parakeet-localhost:
      scale: 0
      environment:
        STT_ENDPOINT: ${PARAKEET_LOCALHOST_URL:-http://host.docker.internal:63022}
      deploy: {}
      extra_hosts:
      - host.docker.internal:host-gateway
    whisper-cpp-localhost:
      scale: 0
      environment:
        STT_ENDPOINT: ${WHISPER_CPP_LOCALHOST_URL:-http://host.docker.internal:63025}
      deploy: {}
      extra_hosts:
      - host.docker.internal:host-gateway
    disabled:
      scale: 0
      environment:
        STT_ENDPOINT: ''
      deploy: {}
      extra_hosts: []

