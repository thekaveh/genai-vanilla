# services/cloud-providers/service.yml — virtual manifest (no compose fragment)
#
# Cloud providers (OpenAI, Anthropic, OpenRouter) are routed through the
# LiteLLM gateway — there is no container backing them. This virtual manifest
# owns the toggles, API keys, and user-model selections so they have a clear
# home in the modular layout.
# `bootstrapper/services/service_config.py::_generate_cloud_providers_config`
# derives the LITELLM_*_ENABLED flags and LITELLM_ENABLED_PROVIDERS list
# from the three CLOUD_*_SOURCE toggles.
name: cloud-providers
label: "Cloud LLM providers (OpenAI, Anthropic, OpenRouter)"
category: llm
docs: services/litellm/README.md  # cloud-provider routing is documented in the LiteLLM service doc

# Virtual manifest: no containers, no compose fragment. The bootstrapper
# skips virtual manifests when assembling the include list.
virtual: true
containers: []

env:
  # OpenAI
  - name: CLOUD_OPENAI_SOURCE
    default: disabled
    description: "Options: enabled, disabled."
  - name: OPENAI_API_KEY
    default: ""
    secret: true
  - name: OPENAI_USER_MODELS
    default: ""
    description: "Comma-separated OpenAI model names the wizard activated."
  # Anthropic
  - name: CLOUD_ANTHROPIC_SOURCE
    default: disabled
    description: "Options: enabled, disabled."
  - name: ANTHROPIC_API_KEY
    default: ""
    secret: true
  - name: ANTHROPIC_USER_MODELS
    default: ""
    description: "Comma-separated Anthropic model names the wizard activated."
  # OpenRouter
  - name: CLOUD_OPENROUTER_SOURCE
    default: disabled
    description: "Options: enabled, disabled."
  - name: OPENROUTER_API_KEY
    default: ""
    secret: true
  - name: OPENROUTER_USER_MODELS
    default: ""
    description: "Comma-separated OpenRouter model names the wizard activated."
  # Aggregates derived from the three sources
  - name: LITELLM_OPENAI_ENABLED
    auto_managed: true
    description: "Derived from CLOUD_OPENAI_SOURCE."
  - name: LITELLM_ANTHROPIC_ENABLED
    auto_managed: true
    description: "Derived from CLOUD_ANTHROPIC_SOURCE."
  - name: LITELLM_OPENROUTER_ENABLED
    auto_managed: true
    description: "Derived from CLOUD_OPENROUTER_SOURCE."
  - name: LITELLM_ENABLED_PROVIDERS
    auto_managed: true
    description: "Comma-separated lowercase list of enabled cloud providers."

# The aggregation logic spans three SOURCE vars (one per provider). The
# multi-input computation lives in
# bootstrapper/services/service_config.py::_generate_cloud_providers_config.

depends_on:
  required:
    - litellm
  optional: []

rows: []

exports: []

# ─────────────────────────────────────────────────────────
# Bootstrapper runtime data (migrated from the legacy
# bootstrapper/service-configs.yml). Slices owned by this
# manifest. Synthesized into the runtime dict by
# bootstrapper/services/sc_synthesizer.py.
# ─────────────────────────────────────────────────────────
runtime_sc:
  cloud_openai:
    enabled:
      scale: 0
      environment:
        LITELLM_OPENAI_ENABLED: 'true'
      deploy: {}
      extra_hosts: []
    disabled:
      scale: 0
      environment:
        LITELLM_OPENAI_ENABLED: 'false'
      deploy: {}
      extra_hosts: []
  cloud_anthropic:
    enabled:
      scale: 0
      environment:
        LITELLM_ANTHROPIC_ENABLED: 'true'
      deploy: {}
      extra_hosts: []
    disabled:
      scale: 0
      environment:
        LITELLM_ANTHROPIC_ENABLED: 'false'
      deploy: {}
      extra_hosts: []
  cloud_openrouter:
    enabled:
      scale: 0
      environment:
        LITELLM_OPENROUTER_ENABLED: 'true'
      deploy: {}
      extra_hosts: []
    disabled:
      scale: 0
      environment:
        LITELLM_OPENROUTER_ENABLED: 'false'
      deploy: {}
      extra_hosts: []

data_flow:
  calls: []

