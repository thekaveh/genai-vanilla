# services/spark/service.yml — Apache Spark standalone cluster
# master + N workers + history server. Distinct from Ray.
name: spark
label: "Apache Spark (standalone cluster)"
category: data
docs: services/spark/README.md

containers:
  - spark-master
  - spark-worker
  - spark-history
  - spark-init
  - spark-connect

images:
  - var: SPARK_IMAGE
    default: "apache/spark:4.1.2"
    container: spark-master

sources:
  var: SPARK_SOURCE
  default: disabled
  options:
    - id: container
      label: "Container (standalone cluster)"
    - id: disabled
      label: "Disabled"

env:
  - name: SPARK_SOURCE
    default: disabled
  - name: SPARK_MASTER_UI_PORT
    # default removed — computed by services/topology.py slot allocator
    description: "Host port for the Spark Master Web UI (in-container 8080)."
  - name: SPARK_HISTORY_PORT
    # default removed — computed by services/topology.py slot allocator
    description: "Host port for the Spark History Server (in-container 18080)."
  - name: SPARK_WORKER_COUNT
    default: "2"
    description: "Number of spark-worker replicas alongside the master. 1-8."
  - name: SPARK_MASTER_SCALE
    auto_managed: true
  - name: SPARK_WORKER_SCALE
    auto_managed: true
    description: "Resolved by the bootstrapper from SPARK_WORKER_COUNT when source=container; 0 otherwise."
  - name: SPARK_HISTORY_SCALE
    auto_managed: true
  - name: SPARK_INIT_SCALE
    auto_managed: true
  - name: SPARK_CONNECT_SCALE
    auto_managed: true
    description: "Resolved by the bootstrapper from SPARK_SOURCE; spark-connect runs as a sidecar to spark-master."

depends_on:
  required:
    - minio
  optional:
    - supabase

rows:
  - display_name: "Apache Spark"
    source_var: SPARK_SOURCE
    port_var: SPARK_MASTER_UI_PORT
    scale_var: SPARK_MASTER_SCALE
    alias: spark.localhost
    description: "Standalone Spark cluster for batch / SQL / DataFrame workloads."
  # Second row needed so Topology.aliases includes spark-history.localhost
  # for /etc/hosts setup. Same SOURCE drives both surfaces.
  - display_name: "Apache Spark — History Server"
    source_var: SPARK_SOURCE
    port_var: SPARK_HISTORY_PORT
    scale_var: SPARK_HISTORY_SCALE
    alias: spark-history.localhost
    description: "Spark History Server — post-mortem job inspection for completed Spark jobs."

exports: []

runtime_sc:
  # apache/spark images don't use SPARK_MODE — each role is started by an
  # explicit `/opt/spark/bin/spark-class` command in compose.yml. The env
  # blocks below mirror what compose.yml's `environment:` declares per
  # service (dual-write per project_runtime_sc_vs_compose_env_dual_write.md).
  spark-master:
    container:
      scale: 1
      environment:
        SPARK_MASTER_HOST: spark-master
      deploy: {}
      extra_hosts: []
    disabled:
      scale: 0
      environment: {}
      deploy: {}
      extra_hosts: []
  spark-worker:
    container:
      scale: 2   # overridden by SPARK_WORKER_COUNT via auto_managed SPARK_WORKER_SCALE
      environment: {}
      deploy: {}
      extra_hosts: []
    disabled:
      scale: 0
      environment: {}
      deploy: {}
      extra_hosts: []
  spark-history:
    container:
      scale: 1
      environment:
        SPARK_HISTORY_OPTS: >-
          -Dspark.history.fs.logDirectory=s3a://spark-history/
          -Dspark.hadoop.fs.s3a.endpoint=http://minio:9000
          -Dspark.hadoop.fs.s3a.access.key=${MINIO_ROOT_USER}
          -Dspark.hadoop.fs.s3a.secret.key=${MINIO_ROOT_PASSWORD}
          -Dspark.hadoop.fs.s3a.path.style.access=true
      deploy: {}
      extra_hosts: []
    disabled:
      scale: 0
      environment: {}
      deploy: {}
      extra_hosts: []
  spark-connect:
    # Spark Connect gRPC server (apache/spark's start-connect-server.sh).
    # Sidecar to spark-master — earlier attempts at in-master plugin
    # loading via SPARK_DAEMON_JAVA_OPTS didn't actually bind the
    # listener. Backend-only; no host port.
    container:
      scale: 1
      environment: {}
      deploy: {}
      extra_hosts: []
    disabled:
      scale: 0
      environment: {}
      deploy: {}
      extra_hosts: []

data_flow:
  # Convention: focus.data_flow.calls = what FOCUS calls (upstream).
  # Kong routes traffic TO Spark; that's Kong's outbound lane, not Spark's.
  # Same for the other in-stack services routed via *.localhost aliases.
  # NOTE: supabase is intentionally absent here even though the README
  # describes JDBC reads from inside jobs — the image ships no Postgres
  # JDBC driver and compose injects no SUPABASE_* vars, so the call is
  # user-driven, not part of the runtime topology (same rule as
  # zeppelin's litellm exclusion).
  calls:
    - minio      # s3a:// history + user data
