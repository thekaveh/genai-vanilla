# services/spark/compose.yml — Spark master + workers + history + init
#
# Image note (2026-06-04): switched from bitnami/spark to apache/spark
# because Bitnami's image library moved behind the Broadcom paywall
# post-acquisition — bitnami/spark:4.x has no public tags on Docker Hub.
# apache/spark is the upstream-maintained alternative.
#
# apache/spark does NOT provide the SPARK_MODE=master|worker|history env
# convenience that bitnami's entrypoint shipped. Instead each role uses
# an explicit `spark-class` invocation that runs the Java process
# directly in the foreground (no daemonization, signals propagate).
services:
  # spark-master keeps container_name because SPARK_MASTER_SCALE is
  # hard-bounded to 0 or 1 by _generate_spark_config — no HA path today.
  # If master HA is ever introduced, drop container_name and switch to
  # Compose's auto-naming (see the spark-worker block below for the
  # container_name-vs-replicas>1 conflict).
  spark-master:
    image: ${SPARK_IMAGE:-apache/spark:4.1.2}
    container_name: ${PROJECT_NAME}-spark-master
    restart: unless-stopped
    deploy:
      replicas: ${SPARK_MASTER_SCALE:-0}
    ports:
      - "${SPARK_MASTER_UI_PORT}:8080"
    environment:
      SPARK_MASTER_HOST: spark-master
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"
    healthcheck:
      # apache/spark image ships curl; the master's REST/UI on 8080 is
      # the readiness signal. Don't probe the standalone-master REST API
      # (port 6066) — it's off by default.
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    networks:
      - backend-network

  spark-worker:
    image: ${SPARK_IMAGE:-apache/spark:4.1.2}
    # NO container_name: ${PROJECT_NAME}-spark-worker — Compose forbids
    # container_name when deploy.replicas > 1 (which is the default for
    # SPARK_WORKER_COUNT=2..8). Workers are auto-named by Compose:
    # `${PROJECT_NAME}-spark-worker-1`, `-2`, etc. Mirrors Ray's ray-worker.
    restart: unless-stopped
    deploy:
      replicas: ${SPARK_WORKER_SCALE:-0}
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
      - --webui-port
      - "8081"
    depends_on:
      spark-master:
        condition: service_healthy
    networks:
      - backend-network

  # Spark Connect gRPC server. Standalone process — runs against the
  # cluster via --master. apache/spark ships start-connect-server.sh +
  # the spark-connect jars in /opt/spark/jars by default.
  #
  # Earlier drafts tried to enable Connect "inside" spark-master via
  # SPARK_DAEMON_JAVA_OPTS=-Dspark.connect.grpc.binding.port=15002. That
  # set a JVM system property but did NOT load the Connect plugin or
  # bind the listener — `spark-class Master` ignores --conf and does
  # not honor spark.plugins. The dedicated sidecar is the only path
  # that produces a working `sc://...:15002` URL.
  #
  # Clients connect at sc://spark-connect:15002 (NOT spark-master:15002).
  spark-connect:
    image: ${SPARK_IMAGE:-apache/spark:4.1.2}
    container_name: ${PROJECT_NAME}-spark-connect
    restart: unless-stopped
    deploy:
      replicas: ${SPARK_CONNECT_SCALE:-0}
    # Intentionally NO `ports:` block. Spark Connect is backend-only —
    # in-Compose clients (Zeppelin's interpreter, Airflow DAGs running in
    # the scheduler) reach it at `sc://spark-connect:15002` via the
    # backend-network. External client access can be added later by
    # publishing the port; not in scope for the in-stack-only baseline.
    command:
      - /opt/spark/sbin/start-connect-server.sh
      # `--wait` is the first arg → start-connect-server.sh shifts it and
      # sets SPARK_NO_DAEMONIZE=1, which makes spark-daemon.sh's submit
      # branch run in the foreground instead of `nohup ... &`. Without
      # this, the script exits immediately → Docker exits the container
      # → `restart: unless-stopped` puts it into a perpetual restart loop
      # → the gRPC listener on 15002 never serves. (Pass 2 introduced the
      # sidecar; Pass 37 caught that it never actually stays up.)
      - --wait
      - --master
      - spark://spark-master:7077
      - --conf
      - spark.connect.grpc.binding.address=0.0.0.0
      - --conf
      - spark.connect.grpc.binding.port=15002
      - --conf
      - spark.hadoop.fs.s3a.endpoint=http://minio:9000
      - --conf
      - spark.hadoop.fs.s3a.access.key=${MINIO_ROOT_USER}
      - --conf
      - spark.hadoop.fs.s3a.secret.key=${MINIO_ROOT_PASSWORD}
      - --conf
      - spark.hadoop.fs.s3a.path.style.access=true
      # Spark History needs DRIVERS to write event logs — spark-history's
      # read-side config alone produces nothing to read. Connect-driven
      # sessions inherit the server's defaults, so writing eventLog.enabled
      # here means every sc://spark-connect:15002 client emits events
      # without any per-job config.
      - --conf
      - spark.eventLog.enabled=true
      - --conf
      - spark.eventLog.dir=s3a://spark-history/
    depends_on:
      spark-master:
        condition: service_healthy
      # MUST wait for spark-init too — it creates the spark-history MinIO
      # bucket. Spark 4.x's EventLogFileWriters does NOT auto-create the
      # base eventLog directory; the first job at cold start would throw
      # `IllegalArgumentException: Log directory s3a://spark-history/ is
      # not a directory` if spark-init hasn't completed yet.
      spark-init:
        condition: service_completed_successfully
    networks:
      - backend-network

  spark-history:
    image: ${SPARK_IMAGE:-apache/spark:4.1.2}
    container_name: ${PROJECT_NAME}-spark-history
    restart: unless-stopped
    deploy:
      replicas: ${SPARK_HISTORY_SCALE:-0}
    ports:
      - "${SPARK_HISTORY_PORT}:18080"
    environment:
      # NOTE: dual-write per project_runtime_sc_vs_compose_env_dual_write.md.
      # Same SPARK_HISTORY_OPTS must appear in service.yml::runtime_sc.
      SPARK_HISTORY_OPTS: >-
        -Dspark.history.fs.logDirectory=s3a://spark-history/
        -Dspark.hadoop.fs.s3a.endpoint=http://minio:9000
        -Dspark.hadoop.fs.s3a.access.key=${MINIO_ROOT_USER}
        -Dspark.hadoop.fs.s3a.secret.key=${MINIO_ROOT_PASSWORD}
        -Dspark.hadoop.fs.s3a.path.style.access=true
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.history.HistoryServer
    depends_on:
      spark-init:
        condition: service_completed_successfully
    networks:
      - backend-network

  # Use the same minio/mc image as minio-init. The vanilla-alpine + inline
  # apk pattern (project_init_container_pattern.md) FAILS here because
  # Alpine's `mc` package is GNU Midnight Commander (a TUI file manager),
  # NOT MinIO Client — `mc alias set` would error and spark-history would
  # never start. minio-init solves this by pinning minio/mc; spark-init
  # does the same so the two stay in lockstep on the upstream mc release.
  spark-init:
    image: ${MINIO_INIT_IMAGE:-minio/mc:RELEASE.2025-08-13T08-35-41Z}
    container_name: ${PROJECT_NAME}-spark-init
    deploy:
      replicas: ${SPARK_INIT_SCALE:-0}
    depends_on:
      minio-init:
        condition: service_completed_successfully
    entrypoint: ["sh", "-c"]
    command:
      - |
        mc alias set minio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}
        mc mb --ignore-existing minio/spark-history
        echo "spark-init: spark-history bucket ready"
    networks:
      - backend-network
